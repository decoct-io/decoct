meta:
  subject: system-services
  description: Miscellaneous system-wide services and configurations.
  source_type: iosxr-rr
  total_instances: 4
base_class:
  clock: timezone UTC 0
  control-plane.management-plane.inband.interface.all.allow.SNMP: 'true'
  domain.lookup: disable
  domain.name-server.10.255.2.1: 'true'
  domain.name-server.10.255.2.2: 'true'
  router.static.address-family.ipv4-unicast.0.0.0.0/0: MgmtEth0/RP0/CPU0/0 
    192.168.100.254
  service.timestamps.debug: datetime msec localtime show-timezone
  service.timestamps.log: datetime msec localtime show-timezone
  snmp-server.community.S3cr3tRO_c0mmunity: RO
  snmp-server.community.S3cr3tRW_c0mmunity: RW
  snmp-server.enable.traps.bgp: 'true'
  snmp-server.enable.traps.isis: 'true'
  snmp-server.enable.traps.snmp: linkdown linkup
  snmp-server.host: '[REDACTED]'
  snmp-server.trap-source: Loopback0
class_assignments:
  _base_only:
    instances:
    - RR-01..RR-04
instance_data:
  schema:
  - hostname
  records:
    RR-01:
    - RR-01
    RR-02:
    - RR-02
    RR-03:
    - RR-03
    RR-04:
    - RR-04
