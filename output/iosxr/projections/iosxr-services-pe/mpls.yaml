meta:
  subject: mpls
  description: MPLS LDP configuration including discovery timers, graceful 
    restart, and address family
  source_type: iosxr-services-pe
  total_instances: 8
base_class:
  mpls: ldp
  mpls.address-family: ipv4
  mpls.discovery.hello.hold-time: '15'
  mpls.discovery.hello.interval: '5'
  mpls.discovery.targeted-hello.hold-time: '90'
  mpls.discovery.targeted-hello.interval: '10'
  mpls.graceful-restart: 'true'
  mpls.log: neighbor
class_assignments:
  _base_only:
    instances:
    - SVC-PE-01..SVC-PE-08
instance_data:
  schema:
  - hostname
  - mpls.router-id
  records:
    SVC-PE-01:
    - SVC-PE-01
    - 10.0.3.1
    SVC-PE-02:
    - SVC-PE-02
    - 10.0.3.2
    SVC-PE-03:
    - SVC-PE-03
    - 10.0.3.3
    SVC-PE-04:
    - SVC-PE-04
    - 10.0.3.4
    SVC-PE-05:
    - SVC-PE-05
    - 10.0.3.5
    SVC-PE-06:
    - SVC-PE-06
    - 10.0.3.6
    SVC-PE-07:
    - SVC-PE-07
    - 10.0.3.7
    SVC-PE-08:
    - SVC-PE-08
    - 10.0.3.8
