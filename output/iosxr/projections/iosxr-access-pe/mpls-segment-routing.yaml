meta:
  subject: mpls-segment-routing
  description: General MPLS settings and Segment Routing block definitions.
  source_type: iosxr-access-pe
  total_instances: 60
base_class:
  mpls: ldp
  mpls.address-family: ipv4
  mpls.discovery.hello.hold-time: '15'
  mpls.discovery.hello.interval: '5'
  mpls.discovery.targeted-hello.hold-time: '90'
  mpls.discovery.targeted-hello.interval: '10'
  mpls.graceful-restart: 'true'
  mpls.log: neighbor
  segment-routing.global-block: 16000 23999
  segment-routing.local-block: 15000 15999
class_assignments:
  _base_only:
    instances:
    - APE-R1-01..APE-R1-20
    - APE-R2-01..APE-R2-20
    - APE-R3-01..APE-R3-20
