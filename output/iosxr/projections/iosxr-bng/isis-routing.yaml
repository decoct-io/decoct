meta:
  subject: isis-routing
  description: ISIS routing protocol configuration, including interface 
    settings, address families, and segment routing.
  source_type: iosxr-bng
  total_instances: 8
base_class:
  mpls.address-family: ipv4
  mpls.discovery.hello.hold-time: '15'
  mpls.discovery.hello.interval: '5'
  mpls.discovery.targeted-hello.hold-time: '90'
  mpls.discovery.targeted-hello.interval: '10'
  mpls.graceful-restart: 'true'
  mpls.log: neighbor
  router.isis.CORE.address-family.ipv4-unicast.metric-style: wide
  router.isis.CORE.address-family.ipv4-unicast.mpls.traffic-eng.level-2-only: 'true'
  router.isis.CORE.address-family.ipv4-unicast.mpls.traffic-eng.router-id: 
    Loopback0
  router.isis.CORE.address-family.ipv4-unicast.router-id: Loopback0
  router.isis.CORE.address-family.ipv4-unicast.segment-routing: mpls sr-prefer
  router.isis.CORE.address-family.ipv6-unicast.metric-style: wide
  router.isis.CORE.address-family.ipv6-unicast.segment-routing: mpls sr-prefer
  router.isis.CORE.interface.Loopback0.address-family: ipv6 unicast
  router.isis.CORE.interface.Loopback0.passive: 'true'
  router.isis.CORE.interface.TenGigE0/0/0/0.address-family.ipv4-unicast.metric: '10'
  router.isis.CORE.interface.TenGigE0/0/0/0.address-family.ipv6-unicast.metric: '10'
  router.isis.CORE.interface.TenGigE0/0/0/0.csnp-interval: '10'
  router.isis.CORE.interface.TenGigE0/0/0/0.hello-interval: '10'
  router.isis.CORE.interface.TenGigE0/0/0/0.hello-multiplier: '3'
  router.isis.CORE.interface.TenGigE0/0/0/0.point-to-point: 'true'
  router.isis.CORE.interface.TenGigE0/0/0/0.retransmit-interval: '5'
  router.isis.CORE.interface.TenGigE0/0/0/1.address-family.ipv4-unicast.metric: '10'
  router.isis.CORE.interface.TenGigE0/0/0/1.address-family.ipv6-unicast.metric: '10'
  router.isis.CORE.interface.TenGigE0/0/0/1.csnp-interval: '10'
  router.isis.CORE.interface.TenGigE0/0/0/1.hello-interval: '10'
  router.isis.CORE.interface.TenGigE0/0/0/1.hello-multiplier: '3'
  router.isis.CORE.interface.TenGigE0/0/0/1.point-to-point: 'true'
  router.isis.CORE.interface.TenGigE0/0/0/1.retransmit-interval: '5'
  router.isis.CORE.is-type: level-2-only
  router.isis.CORE.log: adjacency changes
  router.isis.CORE.lsp-lifetime: '1200'
  router.isis.CORE.lsp-mtu: '1497'
  router.isis.CORE.lsp-refresh-interval: '900'
  segment-routing.global-block: 16000 23999
  segment-routing.local-block: 15000 15999
class_assignments:
  _base_only:
    instances:
    - BNG-01..BNG-08
instance_data:
  schema:
  - hostname
  - mpls.router-id
  - router.isis.CORE.interface.Loopback0.address-family.ipv4-unicast.prefix-sid
  - router.isis.CORE.net
