    selection (shorter confederation path preferred), but with iBGP-like 
    behavior for attributes. This means inter-sub-AS routes have 
    AS_CONFED_SEQUENCE in the path, affecting tiebreakers. The 6 sub-AS design 
    allows each role to have independent ASN for route-target schemes while 
    maintaining confederation-wide route exchange.
  evidence_locations:
  - access-pe-r1-01.cfg → confederation identifier 64512, confederation peers
  reasoning_required: Analyze confederation impact on BGP path selection
