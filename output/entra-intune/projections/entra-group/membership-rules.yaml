meta:
  subject: membership-rules
  description: Attributes related to dynamic membership rules for Entra groups.
  source_type: entra-group
  total_instances: 25
class_assignments:
  _base_only:
    instances:
    - DG-All-Corp-Android
    - DG-All-Corp-Windows
    - DG-All-Corp-iOS
    - DG-All-Corp-macOS
    - DG-All-Licensed-Users
    - DG-Dept-Engineering
    - DG-Dept-Sales
    - DG-Remote-Workers
    - M365-AllCompany-Comms
    - M365-Leadership-Team
    - M365-Project-Alpha
    - M365-Project-Beta
    - RAG-Compliance-Admin-Role
    - RAG-Global-Admin-Role
    - RAG-Security-Admin-Role
    - SG-Compliance-Officers
    - SG-Engineering
    - SG-Executive-Team
    - SG-External-Contractors
    - SG-Finance-Users
    - SG-HR-Users
    - SG-Helpdesk-Staff
    - SG-IT-Admins
    - SG-Marketing-Users
    - SG-Security-Team
instance_attrs:
  DG-All-Corp-Android:
    membershipRule: (device.deviceOSType -eq "AndroidEnterprise")
  DG-All-Corp-Windows:
    membershipRule: (device.deviceOSType -eq "Windows")
  DG-All-Corp-iOS:
    membershipRule: (device.deviceOSType -eq "iOS")
  DG-All-Corp-macOS:
    membershipRule: (device.deviceOSType -eq "macOS")
  DG-All-Licensed-Users:
    membershipRule: '[REDACTED]'
  DG-Dept-Engineering:
    membershipRule: (user.department -eq "Engineering")
  DG-Dept-Sales:
    membershipRule: (user.department -eq "Sales")
  DG-Remote-Workers:
    membershipRule: (user.extensionAttribute1 -eq "Remote")
