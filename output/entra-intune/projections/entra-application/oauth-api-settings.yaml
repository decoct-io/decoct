meta:
  subject: oauth-api-settings
  description: API-specific OAuth2 and publisher domain settings.
  source_type: entra-application
  total_instances: 12
base_class:
  oauth2RequiredPostResponse: 'false'
  publisherDomain: contoso.com
  web.implicitGrantSettings.enableAccessTokenIssuance: 'false'
  web.implicitGrantSettings.enableIdTokenIssuance: 'false'
class_assignments:
  _base_only:
    instances:
    - App-API-Backend
    - App-API-Gateway
    - App-B2C-Customer-Portal
    - App-Daemon-Service
    - App-DevTest-Sandbox
    - App-Legacy-WinApp
    - App-Mobile-Android
    - App-Mobile-iOS
    - App-Portal-SPA
    - App-Portal-Web
    - App-PowerBI-Embedded
    - App-Teams-Bot
instance_attrs:
  App-API-Backend:
    api.oauth2PermissionScopes:
      access_as_user:
        adminConsentDescription: Allow the application to access App-API-Backend
          on behalf of the signed-in user.
        adminConsentDisplayName: access_as_user
        isEnabled: 'true'
        type: User
        userConsentDescription: Allow the application to access App-API-Backend 
          on your behalf.
        userConsentDisplayName: access_as_user
      read_all:
        adminConsentDescription: Allow the application to access App-API-Backend
          on behalf of the signed-in user.
        adminConsentDisplayName: read_all
        isEnabled: 'true'
        type: User
        userConsentDescription: Allow the application to access App-API-Backend 
          on your behalf.
        userConsentDisplayName: read_all
      write_all:
        adminConsentDescription: Allow the application to access App-API-Backend
          on behalf of the signed-in user.
        adminConsentDisplayName: write_all
        isEnabled: 'true'
        type: User
        userConsentDescription: Allow the application to access App-API-Backend 
          on your behalf.
        userConsentDisplayName: write_all
  App-API-Gateway:
    api.oauth2PermissionScopes:
      gateway.read:
        adminConsentDescription: Allow the application to access App-API-Gateway
          on behalf of the signed-in user.
        adminConsentDisplayName: gateway.read
        isEnabled: 'true'
        type: User
        userConsentDescription: Allow the application to access App-API-Gateway 
          on your behalf.
        userConsentDisplayName: gateway.read
      gateway.write:
        adminConsentDescription: Allow the application to access App-API-Gateway
          on behalf of the signed-in user.
        adminConsentDisplayName: gateway.write
        isEnabled: 'true'
        type: User
        userConsentDescription: Allow the application to access App-API-Gateway 
          on your behalf.
        userConsentDisplayName: gateway.write
  App-DevTest-Sandbox:
    api.oauth2PermissionScopes:
      test.read:
        adminConsentDescription: Allow the application to access 
          App-DevTest-Sandbox on behalf of the signed-in user.
        adminConsentDisplayName: test.read
        isEnabled: 'true'
        type: User
        userConsentDescription: Allow the application to access 
          App-DevTest-Sandbox on your behalf.
        userConsentDisplayName: test.read
      test.write:
        adminConsentDescription: Allow the application to access 
          App-DevTest-Sandbox on behalf of the signed-in user.
        adminConsentDisplayName: test.write
        isEnabled: 'true'
        type: User
