meta:
  subject: web-and-spa
  description: Web and SPA redirect URIs, implicit grant settings, and optional 
    claims
  source_type: entra-application
  total_instances: 12
base_class:
  oauth2RequiredPostResponse: 'false'
  web.implicitGrantSettings.enableAccessTokenIssuance: 'false'
  web.implicitGrantSettings.enableIdTokenIssuance: 'false'
class_assignments:
  _base_only:
    instances:
    - App-API-Backend
    - App-API-Gateway
    - App-B2C-Customer-Portal
    - App-Daemon-Service
    - App-DevTest-Sandbox
    - App-Legacy-WinApp
    - App-Mobile-Android
    - App-Mobile-iOS
    - App-Portal-SPA
    - App-Portal-Web
    - App-PowerBI-Embedded
    - App-Teams-Bot
instance_attrs:
  App-API-Gateway:
    web.redirectUris: https://gateway.contoso.com/oauth2/callback
  App-B2C-Customer-Portal:
    spa.redirectUris: https://customers.contoso.com/spa-callback
    web.redirectUris: https://customers.contoso.com/auth/redirect
  App-DevTest-Sandbox:
    spa.redirectUris: https://localhost:5173/spa-auth
    web.redirectUris: https://localhost:3000/callback, 
      https://localhost:5173/auth
  App-Portal-SPA:
    spa.redirectUris: https://spa.contoso.com/auth, 
      https://spa.contoso.com/callback
  App-Portal-Web:
    web.redirectUris: https://portal.contoso.com/auth/callback, 
      https://portal.contoso.com/silent-callback
  App-PowerBI-Embedded:
    web.redirectUris: https://reports.contoso.com/auth/callback
  App-Teams-Bot:
    web.redirectUris: https://teams-bot.contoso.com/auth/callback
