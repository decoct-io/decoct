meta:
  subject: b2b-collaboration-outbound
  description: Settings for outbound B2B collaboration, including application 
    and user access.
  source_type: entra-cross-tenant
  total_instances: 3
base_class:
  b2bCollaborationOutbound.applications.accessType: allowed
  b2bCollaborationOutbound.applications.targets:
  - target: AllApplications
    targetType: application
  b2bCollaborationOutbound.usersAndGroups.accessType: allowed
  b2bCollaborationOutbound.usersAndGroups.targets:
  - target: AllUsers
    targetType: user
class_assignments:
  _base_only:
    instances:
    - CTA-Default-Settings
    - CTA-Partner-Contoso
    - CTA-Partner-Fabrikam
