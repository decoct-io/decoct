meta:
  subject: b2b-collaboration
  description: B2B collaboration inbound and outbound settings for applications 
    and users
  source_type: entra-cross-tenant
  total_instances: 3
base_class:
  b2bCollaborationInbound.applications.accessType: allowed
  b2bCollaborationInbound.applications.targets:
  - target: AllApplications
    targetType: application
  b2bCollaborationInbound.usersAndGroups.accessType: allowed
  b2bCollaborationInbound.usersAndGroups.targets:
  - target: AllUsers
    targetType: user
  b2bCollaborationOutbound.applications.accessType: allowed
  b2bCollaborationOutbound.applications.targets:
  - target: AllApplications
    targetType: application
  b2bCollaborationOutbound.usersAndGroups.accessType: allowed
  b2bCollaborationOutbound.usersAndGroups.targets:
  - target: AllUsers
    targetType: user
class_assignments:
  _base_only:
    instances:
    - CTA-Default-Settings
    - CTA-Partner-Contoso
    - CTA-Partner-Fabrikam
