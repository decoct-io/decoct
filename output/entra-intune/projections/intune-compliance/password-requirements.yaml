meta:
  subject: password-requirements
  description: Password and passcode requirements across platforms
  source_type: intune-compliance
  total_instances: 10
classes:
  configurationManagerComplianceRequired_false_early:
    inherits: base
    own_attrs:
      passwordRequiredToUnlockFromIdle: 'false'
    instance_count_inclusive: 3
class_assignments:
  configurationManagerComplianceRequired_false_early:
    instances:
    - CP-Win-Advanced-Security
    - CP-Win-Basic-Security
    - CP-Win-Kiosk-Devices
  _base_only:
    instances:
    - CP-Android-Corporate
    - CP-Android-Standard
    - CP-iOS-BYOD
    - CP-iOS-Corporate-Managed
    - CP-iOS-Standard
    - CP-macOS-Secure-Workstation
    - CP-macOS-Standard
instance_attrs:
  CP-Android-Corporate:
    passwordMinimumLength: '6'
    passwordRequired: 'true'
    passwordRequiredType: alphanumeric
  CP-Android-Standard:
    passwordRequired: 'false'
    passwordRequiredType: deviceDefault
  CP-Win-Advanced-Security:
    passwordBlockSimple: 'true'
    passwordMinimumLength: '8'
    passwordRequired: 'true'
    passwordRequiredType: alphanumeric
  CP-Win-Basic-Security:
    passwordBlockSimple: 'false'
    passwordRequired: 'false'
    passwordRequiredType: deviceDefault
  CP-Win-Kiosk-Devices:
    passwordBlockSimple: 'false'
    passwordRequired: 'false'
    passwordRequiredType: deviceDefault
  CP-iOS-BYOD:
    passcodeBlockSimple: 'false'
    passcodeRequired: 'false'
    passcodeRequiredType: deviceDefault
  CP-iOS-Corporate-Managed:
    passcodeBlockSimple: 'true'
    passcodeRequired: 'true'
    passcodeRequiredType: numeric
  CP-iOS-Standard:
    passcodeBlockSimple: 'false'
    passcodeRequired: 'false'
    passcodeRequiredType: deviceDefault
  CP-macOS-Secure-Workstation:
    passwordBlockSimple: 'true'
    passwordMinimumLength: '12'
    passwordRequired: 'true'
    passwordRequiredType: alphanumeric
  CP-macOS-Standard:
    passwordBlockSimple: 'false'
    passwordRequired: 'false'
    passwordRequiredType: deviceDefault
