instance_attrs:
  CA-Compliant-Device-Azure:
    conditions.platforms.includePlatforms: windows, macOS
  CA-Compliant-Device-Internal:
    conditions.platforms.includePlatforms: windows
    conditions.users.includeGroups: SG-Engineering, SG-Finance-Users
  CA-Compliant-Device-Office365:
    conditions.platforms.includePlatforms: windows, iOS, android
    conditions.users.excludeUsers: SG-External-Contractors
  CA-Disabled-Draft-TestPolicy:
    sessionControls.persistentBrowser.mode: never
  CA-Location-Block-Countries:
    conditions.locations.includeLocations: NL-Blocked-Countries
    conditions.users.excludeUsers: SG-IT-Admins
  CA-Location-Require-MFA-External:
    conditions.locations.includeLocations: AllTrusted
    sessionControls.signInFrequency.value: '4'
  CA-MFA-Azure-Management:
    conditions.users.excludeUsers: SG-IT-Admins
  CA-MFA-Global-Admins:
    conditions.users.includeGroups: SG-IT-Admins
  CA-MFA-Privileged-Roles:
    conditions.users.includeGroups: SG-Security-Team, SG-IT-Admins
  CA-MFA-Security-Admins:
    conditions.users.includeGroups: SG-Security-Team
  CA-Named-Location-Corporate:
    conditions.locations.includeLocations: NL-Corporate-HQ
  CA-Report-Only-AllUsers-MFA:
    sessionControls.persistentBrowser.mode: always
    sessionControls.signInFrequency.value: '8'
  CA-SignIn-Risk-High-Block:
    conditions.signInRiskLevels: high
    conditions.users.excludeUsers: SG-IT-Admins
  CA-SignIn-Risk-Medium-MFA:
    conditions.signInRiskLevels: medium, low
  CA-User-Risk-High-PasswordChange:
    conditions.userRiskLevels: high
  CA-User-Risk-Medium-MFA:
    conditions.userRiskLevels: medium
    conditions.users.excludeUsers: SG-External-Contractors
overrides:
  CA-Compliant-Device-Azure:
    owner: _base_only
    delta:
      conditions.applications.includeApplications: 
        797f4846-ba00-4fd7-ba43-dac1f8f63013
      conditions.clientAppTypes: browser, mobileAppsAndDesktopClients
      conditions.users.includeUsers: All
      grantControls.builtInControls: compliantDevice, mfa
      grantControls.operator: AND
      sessionControls.disableResilienceDefaults: 'false'
      state: enabled
  CA-SignIn-Risk-High-Block:
    owner: _base_only
    delta:
      conditions.applications.includeApplications: All
      conditions.clientAppTypes: browser, mobileAppsAndDesktopClients
      conditions.users.includeUsers: All
      grantControls.builtInControls: block
      grantControls.operator: OR
      sessionControls.disableResilienceDefaults: 'true'
      state: enabled
  CA-Compliant-Device-Internal:
    owner: includeApplications_All_clientAppTypes
    delta:
      conditions.applications.excludeApplications: 
        00000003-0000-0ff1-ce00-000000000000
      grantControls.builtInControls: compliantDevice
      grantControls.operator: OR
      state: enabled
  CA-Location-Block-Countries:
    owner: includeApplications_All_clientAppTypes
    delta:
      conditions.users.includeUsers: All
      grantControls.builtInControls: block
      grantControls.operator: OR
      state: enabled
  CA-MFA-Security-Admins:
    owner: includeApplications_All_clientAppTypes
    delta:
      grantControls.builtInControls: mfa, compliantDevice
      grantControls.operator: AND
      state: enabled
  CA-Report-Only-AllUsers-MFA:
    owner: includeApplications_All_clientAppTypes
    delta:
      conditions.users.includeUsers: All
      grantControls.builtInControls: mfa
      grantControls.operator: OR
      sessionControls.persistentBrowser.isEnabled: 'true'
      sessionControls.signInFrequency.authenticationType: 
        primaryAndSecondaryAuthentication
      sessionControls.signInFrequency.frequencyInterval: timeBased
      sessionControls.signInFrequency.isEnabled: 'true'
      sessionControls.signInFrequency.type: hours
      state: enabledForReportingButNotEnforced
  CA-User-Risk-High-PasswordChange:
    owner: includeApplications_All_clientAppTypes
    delta:
      conditions.users.includeUsers: All
      grantControls.builtInControls: passwordChange
      grantControls.operator: OR
      state: enabled
  CA-Compliant-Device-Office365:
    owner: includeUsers_All_operator_OR
    delta:
      conditions.applications.includeApplications: Office365
      conditions.clientAppTypes: browser, mobileAppsAndDesktopClients
      grantControls.builtInControls: compliantDevice
      state: enabled
  CA-Disabled-Draft-TestPolicy:
    owner: includeUsers_All_operator_OR
    delta:
      conditions.applications.includeApplications: All
      conditions.clientAppTypes: browser
      grantControls.builtInControls: mfa
      sessionControls.persistentBrowser.isEnabled: 'true'
      state: disabled
  CA-MFA-Azure-Management:
    owner: includeUsers_All_operator_OR
    delta:
      conditions.applications.includeApplications: 
        797f4846-ba00-4fd7-ba43-dac1f8f63013
      conditions.clientAppTypes: browser, mobileAppsAndDesktopClients
      grantControls.builtInControls: mfa
      state: enabled
  CA-Location-Require-MFA-External:
    owner: includeApplications_All_clientAppTypes_builtInControls_mfa_operator_O
    delta:
      conditions.users.includeUsers: All
      sessionControls.signInFrequency.authenticationType: 
        primaryAndSecondaryAuthentication
      sessionControls.signInFrequency.frequencyInterval: timeBased
      sessionControls.signInFrequency.isEnabled: 'true'
      sessionControls.signInFrequency.type: hours
