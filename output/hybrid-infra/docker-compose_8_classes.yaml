  networks.app-network.enable_ipv6: 'false'
  networks.app-network.external: 'false'
  networks.app-network.internal: 'false'
  networks.edge-network.attachable: 'false'
  networks.edge-network.driver: bridge
  networks.edge-network.enable_ipv6: 'false'
  networks.edge-network.external: 'false'
  networks.edge-network.internal: 'false'
  services.docs-site.cpus: '0.1'
  services.docs-site.deploy.replicas: '1'
  services.docs-site.deploy.restart_policy.condition: any
  services.docs-site.deploy.restart_policy.max_attempts: '0'
  services.docs-site.deploy.rollback_config.order: stop-first
  services.docs-site.deploy.rollback_config.parallelism: '1'
