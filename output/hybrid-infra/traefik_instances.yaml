overrides:
  traefik-dev:
    owner: _base_only
    delta:
      accessLog.addInternals: 'true'
      log.noColor: 'true'
  traefik-prod-dynamic:
    owner: addInternals_false_noColor_false
    delta:
      http.middlewares:
        rate-limit:
          enabled: 'true'
        compress:
          enabled: 'true'
        headers-security:
          enabled: 'true'
      http.routers:
        core-api:
          rule: Host(`api.ridgeline.io`)
          service: core-api
          entryPoints: websecure
        web-app:
          rule: Host(`app.ridgeline.io`)
          service: web-app
          entryPoints: websecure
        billing:
          rule: Host(`billing.ridgeline.io`)
          service: billing
          entryPoints: websecure
        admin:
          rule: Host(`admin.ridgeline.io`)
          service: admin
          entryPoints: websecure
        docs:
          rule: Host(`docs.ridgeline.io`)
          service: docs
          entryPoints: websecure
      providers.file.directory: /etc/traefik/dynamic
      providers.file.watch: 'true'
  traefik-prod-static:
    owner: addInternals_false_noColor_false
