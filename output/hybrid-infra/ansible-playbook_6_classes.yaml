meta:
  entity_type: ansible-playbook_6
  total_instances: 1
  max_inheritance_depth: 2
  tier_c_ref: ansible-playbook_6_instances.yaml
base_class:
  any_errors_fatal: 'false'
  become: 'true'
  become_user: root
  check_mode: 'false'
  gather_facts: 'true'
  handlers:
  - name: restart_sshd
    ansible.builtin.systemd.name: "{{ service_name | default('ridgeline') }}"
    ansible.builtin.systemd.state: restarted
    ansible.builtin.systemd.daemon_reload: 'false'
    ansible.builtin.systemd.daemon_reexec: 'false'
    ansible.builtin.systemd.no_block: 'false'
    ansible.builtin.systemd.scope: system
  hosts: all
  ignore_errors: 'false'
  name: Harden SSH Configuration
  no_log: 'false'
  order: inventory
  run_once: 'false'
  tasks:
  - name: Copy configuration files
    ansible.builtin.copy.src: '{{ item.src }}'
    ansible.builtin.copy.dest: '{{ item.dest }}'
    ansible.builtin.copy.owner: root
    ansible.builtin.copy.group: root
    ansible.builtin.copy.mode: '0644'
    ansible.builtin.copy.backup: 'false'
    ansible.builtin.copy.decrypt: 'true'
    ansible.builtin.copy.follow: 'false'
    ansible.builtin.copy.force: 'true'
    ansible.builtin.copy.remote_src: 'false'
    ansible.builtin.copy.unsafe_writes: 'false'
    loop.0.src: files/config.conf
    loop.0.dest: /etc/ridgeline/config.conf
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Configure sshd settings
    ansible.builtin.lineinfile.path: /etc/ssh/sshd_config
    ansible.builtin.lineinfile.regexp: '{{ item.regexp }}'
    ansible.builtin.lineinfile.line: '{{ item.line }}'
    ansible.builtin.lineinfile.state: present
    ansible.builtin.lineinfile.create: 'false'
    ansible.builtin.lineinfile.backup: 'false'
    ansible.builtin.lineinfile.backrefs: 'false'
    ansible.builtin.lineinfile.firstmatch: 'false'
    ansible.builtin.lineinfile.unsafe_writes: 'false'
    loop.0.regexp: ^PermitRootLogin
    loop.0.line: PermitRootLogin no
    loop.1.regexp: ^PasswordAuthentication
    loop.1.line: PasswordAuthentication no
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Set file permissions
    ansible.builtin.file.path: /opt/ridgeline
    ansible.builtin.file.state: directory
    ansible.builtin.file.owner: ridgeline
    ansible.builtin.file.group: ridgeline
    ansible.builtin.file.mode: '0755'
    ansible.builtin.file.follow: 'true'
    ansible.builtin.file.force: 'false'
    ansible.builtin.file.recurse: 'false'
    ansible.builtin.file.unsafe_writes: 'false'
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Enable and start service
    ansible.builtin.systemd.name: "{{ service_name | default('ridgeline') }}"
    ansible.builtin.systemd.state: started
    ansible.builtin.systemd.enabled: 'true'
    ansible.builtin.systemd.daemon_reload: 'false'
    ansible.builtin.systemd.daemon_reexec: 'false'
    ansible.builtin.systemd.no_block: 'false'
    ansible.builtin.systemd.scope: system
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  vars.password_auth: no
  vars.permit_root: no
  vars.ssh_port: '22'
classes:
  _base_only:
    inherits: base
    own_attrs: {}
    instance_count_inclusive: 1
subclasses: {}
assertions:
  base_only_ratio: 1.0
