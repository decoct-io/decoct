  networks.app-network.driver: bridge
  networks.app-network.enable_ipv6: 'false'
  networks.app-network.external: 'false'
  networks.app-network.internal: 'false'
  services.report-generator.cpus: '1.0'
  services.report-generator.deploy.replicas: '1'
  services.report-generator.deploy.restart_policy.condition: any
  services.report-generator.deploy.restart_policy.max_attempts: '0'
  services.report-generator.deploy.rollback_config.order: stop-first
  services.report-generator.deploy.rollback_config.parallelism: '1'
