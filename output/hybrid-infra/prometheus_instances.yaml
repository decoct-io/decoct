overrides:
  prometheus-prod:
    owner: _base_only
    delta:
      alerting.alertmanagers:
      - scheme: http
        timeout: 10s
        api_version: v2
        follow_redirects: 'true'
        enable_http2: 'true'
        static_configs.0.targets: "['mon-prod-01:9093']"
      remote_write:
      - url: http://remote-write.ridgeline.io/api/v1/write
        remote_timeout: 30s
        send_exemplars: 'false'
        send_native_histograms: 'false'
        follow_redirects: 'true'
        enable_http2: 'false'
        queue_config.capacity: '10000'
        queue_config.max_shards: '50'
        queue_config.min_shards: '1'
        queue_config.max_samples_per_send: '2000'
        queue_config.batch_send_deadline: 5s
        queue_config.min_backoff: 30ms
        queue_config.max_backoff: 5s
        queue_config.retry_on_http_429: 'false'
        metadata_config.send: 'true'
        metadata_config.send_interval: 1m
        metadata_config.max_samples_per_send: '2000'
      rule_files: /etc/prometheus/rules/*.yaml
  prometheus-staging:
    owner: _base_only
    delta:
      rule_files: /etc/prometheus/rules/*.yaml
foreign_keys: {}
