topology: {}
guide:
  corpus_description: This infrastructure corpus contains 100 entities across 17
    distinct types, representing a hybrid infrastructure stack for the 
    "ridgeline" platform. It spans configuration management (Ansible), 
    containerization (Docker Compose, Docker daemon), databases (PostgreSQL, 
    MariaDB), reverse proxying (Traefik), monitoring (Prometheus), OS-level 
    tuning (sysctl, sshd, systemd, cloud-init), IaC variables (Terraform 
    tfvars), and application configuration (JSON and YAML app configs, 
    package.json).
  how_to_use:
  - Start with this Tier A file for a high-level orientation of all 17 entity 
    types, their instance counts, and class/subclass structure.
  - For detailed class definitions, shared attributes, and inheritance 
    hierarchies for each type, consult the Tier B files referenced by 
    `tier_b_ref` (e.g., `docker-compose_classes.yaml`).
  - To find per-entity differences and unique attribute values for individual 
    instances, refer to the Tier C files referenced by `tier_c_ref` (e.g., 
    `docker-compose_instances.yaml`).
  - A `base_only_ratio` of 1.0 in the assertions means all instances of that 
    type share identical attributes; lower ratios indicate more variation 
    captured by additional classes and subclasses.
  - Types with `composite_templates` in Tier B (ansible-playbook, 
    docker-compose) contain structured sub-objects (tasks, handlers, services, 
    networks, volumes) that are templated separately from flat attributes.
  reconstruction: 'To reconstruct any entity: start with base_class attributes from
    Tier B, overlay class own_attrs, then overlay subclass own_attrs (if assigned),
    then apply Tier C instance-specific overrides and instance_attrs.'
