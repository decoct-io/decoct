meta:
  entity_type: docker-compose_10
  total_instances: 1
  max_inheritance_depth: 2
  tier_c_ref: docker-compose_10_instances.yaml
base_class:
  networks.edge-network.attachable: 'false'
  networks.edge-network.driver: bridge
  networks.edge-network.enable_ipv6: 'false'
  networks.edge-network.external: 'false'
  networks.edge-network.internal: 'false'
  networks.monitoring.attachable: 'false'
  networks.monitoring.driver: bridge
  networks.monitoring.enable_ipv6: 'false'
  networks.monitoring.external: 'false'
  networks.monitoring.internal: 'false'
  services.alertmanager.cpus: '0.25'
  services.alertmanager.deploy.replicas: '1'
  services.alertmanager.deploy.restart_policy.condition: any
  services.alertmanager.deploy.restart_policy.max_attempts: '0'
  services.alertmanager.deploy.rollback_config.order: stop-first
  services.alertmanager.deploy.rollback_config.parallelism: '1'
  services.alertmanager.deploy.update_config.order: stop-first
  services.alertmanager.deploy.update_config.parallelism: '1'
  services.alertmanager.environment.SLACK_WEBHOOK_URL: 
    https://hooks.slack.com/services/T00000/B00000/xxxxxxxxxxxx
  services.alertmanager.healthcheck.interval: 30s
  services.alertmanager.healthcheck.retries: '3'
  services.alertmanager.healthcheck.start_interval: 5s
  services.alertmanager.healthcheck.start_period: 0s
  services.alertmanager.healthcheck.test: CMD-SHELL,curl -f 
    http://localhost:9093/-/healthy
  services.alertmanager.healthcheck.timeout: 30s
  services.alertmanager.image: prom/alertmanager:v0.27.0
  services.alertmanager.init: 'false'
  services.alertmanager.logging.driver: json-file
  services.alertmanager.mem_limit: 256m
  services.alertmanager.networks: monitoring
  services.alertmanager.ports: 9093:9093
  services.alertmanager.privileged: 'false'
  services.alertmanager.read_only: 'false'
  services.alertmanager.restart: unless-stopped
  services.alertmanager.stdin_open: 'false'
  services.alertmanager.tty: 'false'
  services.alertmanager.volumes: /opt/ridgeline/alertmanager:/etc/alertmanager
  services.grafana.cpus: '0.5'
  services.grafana.deploy.replicas: '1'
  services.grafana.deploy.restart_policy.condition: any
  services.grafana.deploy.restart_policy.max_attempts: '0'
  services.grafana.deploy.rollback_config.order: stop-first
  services.grafana.deploy.rollback_config.parallelism: '1'
  services.grafana.deploy.update_config.order: stop-first
  services.grafana.deploy.update_config.parallelism: '1'
  services.grafana.environment.GF_SECURITY_ADMIN_PASSWORD: Gr@fanaAdm1n!
  services.grafana.environment.GF_SERVER_ROOT_URL: https://grafana.ridgeline.io
  services.grafana.healthcheck.interval: 30s
  services.grafana.healthcheck.retries: '3'
  services.grafana.healthcheck.start_interval: 5s
  services.grafana.healthcheck.start_period: 15s
  services.grafana.healthcheck.test: CMD-SHELL,curl -f 
    http://localhost:3000/api/health
  services.grafana.healthcheck.timeout: 30s
  services.grafana.image: grafana/grafana:10.4.0
  services.grafana.init: 'false'
  services.grafana.labels.traefik.enable: 'true'
  services.grafana.labels.traefik.http.routers.grafana.rule: 
    Host(`grafana.ridgeline.io`)
  services.grafana.logging.driver: json-file
  services.grafana.mem_limit: 1g
  services.grafana.networks: monitoring,edge-network
  services.grafana.ports: 3000:3000
  services.grafana.privileged: 'false'
  services.grafana.read_only: 'false'
  services.grafana.restart: unless-stopped
  services.grafana.stdin_open: 'false'
  services.grafana.tty: 'false'
  services.grafana.volumes: grafana-data:/var/lib/grafana
  services.prometheus.cpus: '1.0'
  services.prometheus.deploy.replicas: '1'
  services.prometheus.deploy.restart_policy.condition: any
  services.prometheus.deploy.restart_policy.max_attempts: '0'
  services.prometheus.deploy.rollback_config.order: stop-first
  services.prometheus.deploy.rollback_config.parallelism: '1'
  services.prometheus.deploy.update_config.order: stop-first
  services.prometheus.deploy.update_config.parallelism: '1'
  services.prometheus.healthcheck.interval: 30s
  services.prometheus.healthcheck.retries: '3'
  services.prometheus.healthcheck.start_interval: 5s
  services.prometheus.healthcheck.start_period: 15s
  services.prometheus.healthcheck.test: CMD-SHELL,curl -f 
    http://localhost:9090/-/healthy
  services.prometheus.healthcheck.timeout: 30s
