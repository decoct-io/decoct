  services.prometheus.init: 'false'
  services.prometheus.logging.driver: json-file
  services.prometheus.mem_limit: 2g
  services.prometheus.networks: monitoring
  services.prometheus.ports: 9090:9090
  services.prometheus.privileged: 'false'
  services.prometheus.read_only: 'false'
  services.prometheus.restart: unless-stopped
  services.prometheus.stdin_open: 'false'
  services.prometheus.tty: 'false'
  services.prometheus.volumes: 
    /opt/ridgeline/prometheus:/etc/prometheus,prom-data:/prometheus
  volumes.grafana-data.external: 'false'
  volumes.prom-data.external: 'false'
classes:
