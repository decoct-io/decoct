meta:
  entity_type: ansible-playbook_9
  total_instances: 1
  max_inheritance_depth: 2
  tier_c_ref: ansible-playbook_9_instances.yaml
base_class:
  any_errors_fatal: 'false'
  become: 'true'
  become_user: root
  check_mode: 'false'
  gather_facts: 'true'
  handlers:
  - name: restart_grafana
    ansible.builtin.systemd.name: "{{ service_name | default('ridgeline') }}"
    ansible.builtin.systemd.state: restarted
    ansible.builtin.systemd.daemon_reload: 'false'
    ansible.builtin.systemd.daemon_reexec: 'false'
    ansible.builtin.systemd.no_block: 'false'
    ansible.builtin.systemd.scope: system
  hosts: monitoring_servers
  ignore_errors: 'false'
  name: Setup Grafana
  no_log: 'false'
  order: inventory
  run_once: 'false'
  tasks:
  - name: Install packages via apt
    ansible.builtin.apt.name: '{{ item }}'
    ansible.builtin.apt.state: present
    ansible.builtin.apt.update_cache: 'false'
    ansible.builtin.apt.force: 'false'
    ansible.builtin.apt.purge: 'false'
    ansible.builtin.apt.autoremove: 'false'
    ansible.builtin.apt.autoclean: 'false'
    ansible.builtin.apt.only_upgrade: 'false'
    ansible.builtin.apt.force_apt_get: 'false'
    ansible.builtin.apt.allow_unauthenticated: 'false'
    ansible.builtin.apt.allow_downgrade: 'false'
    ansible.builtin.apt.fail_on_autoremove: 'false'
    ansible.builtin.apt.lock_timeout: '60'
    ansible.builtin.apt.cache_valid_time: '0'
    loop: curl,wget
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Copy configuration files
    ansible.builtin.copy.src: '{{ item.src }}'
    ansible.builtin.copy.dest: '{{ item.dest }}'
    ansible.builtin.copy.owner: root
    ansible.builtin.copy.group: root
    ansible.builtin.copy.mode: '0644'
    ansible.builtin.copy.backup: 'false'
    ansible.builtin.copy.decrypt: 'true'
    ansible.builtin.copy.follow: 'false'
    ansible.builtin.copy.force: 'true'
    ansible.builtin.copy.remote_src: 'false'
    ansible.builtin.copy.unsafe_writes: 'false'
    loop.0.src: files/config.conf
    loop.0.dest: /etc/ridgeline/config.conf
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Enable and start service
    ansible.builtin.systemd.name: "{{ service_name | default('ridgeline') }}"
    ansible.builtin.systemd.state: started
    ansible.builtin.systemd.enabled: 'true'
    ansible.builtin.systemd.daemon_reload: 'false'
    ansible.builtin.systemd.daemon_reexec: 'false'
    ansible.builtin.systemd.no_block: 'false'
    ansible.builtin.systemd.scope: system
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Wait for service to be ready
    ansible.builtin.wait_for.port: "{{ app_port | default('8000') }}"
    ansible.builtin.wait_for.host: 127.0.0.1
    ansible.builtin.wait_for.connect_timeout: '5'
    ansible.builtin.wait_for.delay: '0'
    ansible.builtin.wait_for.sleep: '1'
    ansible.builtin.wait_for.state: started
    ansible.builtin.wait_for.timeout: '300'
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'false'
  - name: Verify service health endpoint
    ansible.builtin.uri.url: http://localhost:{{ app_port | default('8000') 
      }}/health
    ansible.builtin.uri.method: GET
    ansible.builtin.uri.follow_redirects: safe
    ansible.builtin.uri.force: 'false'
    ansible.builtin.uri.force_basic_auth: 'false'
    ansible.builtin.uri.return_content: 'false'
    ansible.builtin.uri.timeout: '30'
    ansible.builtin.uri.use_proxy: 'true'
    ansible.builtin.uri.validate_certs: 'true'
    ansible.builtin.uri.status_code: '200'
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'false'
  vars.admin_password: Gr@fanaAdm1n!
  vars.grafana_version: 10.4.0
classes:
  _base_only:
    inherits: base
    own_attrs: {}
    instance_count_inclusive: 1
subclasses: {}
assertions:
  base_only_ratio: 1.0
