meta:
  entity_type: ansible-playbook_8
  total_instances: 1
  max_inheritance_depth: 2
  tier_c_ref: ansible-playbook_8_instances.yaml
base_class:
  any_errors_fatal: 'false'
  become: 'true'
  become_user: root
  check_mode: 'false'
  gather_facts: 'true'
  hosts: all
  ignore_errors: 'false'
  name: Setup Cloud-Init Configs
  no_log: 'false'
  order: inventory
  run_once: 'false'
  tasks:
  - name: Install packages via apt
    ansible.builtin.apt.name: '{{ item }}'
    ansible.builtin.apt.state: present
    ansible.builtin.apt.update_cache: 'false'
    ansible.builtin.apt.force: 'false'
    ansible.builtin.apt.purge: 'false'
    ansible.builtin.apt.autoremove: 'false'
    ansible.builtin.apt.autoclean: 'false'
    ansible.builtin.apt.only_upgrade: 'false'
    ansible.builtin.apt.force_apt_get: 'false'
    ansible.builtin.apt.allow_unauthenticated: 'false'
    ansible.builtin.apt.allow_downgrade: 'false'
    ansible.builtin.apt.fail_on_autoremove: 'false'
    ansible.builtin.apt.lock_timeout: '60'
    ansible.builtin.apt.cache_valid_time: '0'
    loop: curl,wget
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Copy configuration files
    ansible.builtin.copy.src: '{{ item.src }}'
    ansible.builtin.copy.dest: '{{ item.dest }}'
    ansible.builtin.copy.owner: root
    ansible.builtin.copy.group: root
    ansible.builtin.copy.mode: '0644'
    ansible.builtin.copy.backup: 'false'
    ansible.builtin.copy.decrypt: 'true'
    ansible.builtin.copy.follow: 'false'
    ansible.builtin.copy.force: 'true'
    ansible.builtin.copy.remote_src: 'false'
    ansible.builtin.copy.unsafe_writes: 'false'
    loop.0.src: files/config.conf
    loop.0.dest: /etc/ridgeline/config.conf
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  - name: Deploy templated configuration
    ansible.builtin.template.src: '{{ item.src }}'
    ansible.builtin.template.dest: '{{ item.dest }}'
    ansible.builtin.template.owner: root
    ansible.builtin.template.group: root
    ansible.builtin.template.mode: '0644'
    ansible.builtin.template.backup: 'false'
    ansible.builtin.template.follow: 'false'
    ansible.builtin.template.force: 'true'
    ansible.builtin.template.lstrip_blocks: 'false'
    ansible.builtin.template.trim_blocks: 'true'
    ansible.builtin.template.unsafe_writes: 'false'
    ansible.builtin.template.output_encoding: utf-8
    loop.0.src: templates/app.conf.j2
    loop.0.dest: /etc/ridgeline/app.conf
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'true'
  vars.cloud_init_version: '24.1'
classes:
  _base_only:
    inherits: base
    own_attrs: {}
    instance_count_inclusive: 1
subclasses: {}
assertions:
  base_only_ratio: 1.0
