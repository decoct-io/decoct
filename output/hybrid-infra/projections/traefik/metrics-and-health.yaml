meta:
  subject: metrics-and-health
  description: Prometheus metrics endpoint, ping health check, and global 
    settings
  source_type: traefik
  total_instances: 4
base_class:
  global.checkNewVersion: 'true'
  global.sendAnonymousUsage: 'false'
  ping.entryPoint: traefik
  ping.manualRouting: 'false'
  ping.terminatingStatusCode: '503'
classes:
  addInternals_false_noColor_false:
    inherits: base
    own_attrs:
      metrics:
        prometheus:
          addEntryPointsLabels: 'true'
          addRoutersLabels: 'false'
          addServicesLabels: 'true'
          entryPoint: traefik
          manualRouting: 'false'
          addInternals: 'false'
    instance_count_inclusive: 3
class_assignments:
  addInternals_false_noColor_false:
    instances:
    - traefik-prod-dynamic
    - traefik-prod-static
    - traefik-staging
  _base_only:
    instances:
    - traefik-dev
