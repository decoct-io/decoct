meta:
  subject: logging-and-access-log
  description: Log format, level, access log configuration, and filtering
  source_type: traefik
  total_instances: 4
base_class:
  accessLog.bufferingSize: '0'
  accessLog.fields.defaultMode: keep
  accessLog.fields.headers.defaultMode: drop
  accessLog.filters.minDuration: '0'
  accessLog.filters.retryAttempts: 'false'
  accessLog.format: common
  log.compress: 'false'
  log.format: common
  log.maxAge: '0'
  log.maxBackups: '0'
  log.maxSize: '100'
classes:
  addInternals_false_noColor_false:
    inherits: base
    own_attrs:
      accessLog.addInternals: 'false'
      log.noColor: 'false'
    instance_count_inclusive: 3
class_assignments:
  addInternals_false_noColor_false:
    instances:
    - traefik-prod-dynamic
    - traefik-prod-static
    - traefik-staging
  _base_only:
    instances:
    - traefik-dev
instance_data:
  schema:
  - log.level
  records:
    traefik-dev:
    - DEBUG
    traefik-prod-dynamic:
    - ERROR
    traefik-prod-static:
    - ERROR
    traefik-staging:
    - DEBUG
