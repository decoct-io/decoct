meta:
  subject: forwarding-and-tunneling
  description: Agent forwarding, TCP forwarding, X11 forwarding, and tunneling 
    settings
  source_type: sshd
  total_instances: 4
base_class:
  GatewayPorts: 'false'
  PermitTunnel: 'false'
  X11DisplayOffset: '10'
  X11UseLocalhost: 'true'
class_assignments:
  _base_only:
    instances:
    - sshd-bastion
    - sshd-dev
    - sshd-prod
    - sshd-staging
instance_data:
  schema:
  - AllowStreamLocalForwarding
  records:
    sshd-bastion:
    - 'false'
    sshd-dev:
    - 'true'
    sshd-prod:
    - 'false'
    sshd-staging:
    - 'true'
