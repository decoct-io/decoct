meta:
  subject: authentication
  description: Authentication methods including pubkey, password, 
    keyboard-interactive, and Kerberos
  source_type: sshd
  total_instances: 4
base_class:
  HostbasedAuthentication: 'false'
  KerberosAuthentication: 'false'
  PermitEmptyPasswords: 'false'
  PubkeyAuthentication: 'true'
class_assignments:
  _base_only:
    instances:
    - sshd-bastion
    - sshd-dev
    - sshd-prod
    - sshd-staging
instance_data:
  schema:
  - KbdInteractiveAuthentication
  - LoginGraceTime
  - MaxAuthTries
  - PasswordAuthentication
  records:
    sshd-bastion:
    - 'false'
    - '30'
    - '3'
    - 'false'
    sshd-dev:
    - 'true'
    - '120'
    - '6'
    - 'true'
    sshd-prod:
    - 'false'
    - '60'
    - '3'
    - 'false'
    sshd-staging:
    - 'true'
    - '120'
    - '6'
    - 'true'
instance_attrs:
  sshd-bastion:
    AllowUsers: deploy ops
  sshd-prod:
    AllowUsers: deploy ops admins
