meta:
  subject: credentials
  description: Sensitive credentials including API keys, database passwords, and
    secrets
  source_type: ansible-vars
  total_instances: 3
base_class:
  api_key: '[REDACTED]'
  db_password: '[REDACTED]'
class_assignments:
  _base_only:
    instances:
    - ansible-vars-dev
    - ansible-vars-prod
    - ansible-vars-staging
instance_data:
  schema:
  - backup_encryption_key
  - jwt_secret
  - redis_password
  - smtp_password
  - vault_password
  records:
    ansible-vars-dev:
    - devbackup
    - dev-jwt-secret
    - devredis
    - devsmtp
    - devvault
    ansible-vars-prod:
    - Bkup3ncryptK3y!
    - '[REDACTED]'
    - R3disP@ss!
    - SmtpP@ss123
    - V@ultP@ssw0rd!
    ansible-vars-staging:
    - StagingBkupK3y
    - staging-jwt-secret-not-secure
    - StagingR3dis
    - StagingSmtpP@ss
    - St@gingV@ult
