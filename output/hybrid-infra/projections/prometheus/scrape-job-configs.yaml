meta:
  subject: scrape-job-configs
  description: Detailed configurations for scraping metrics from targets.
  source_type: prometheus
  total_instances: 3
class_assignments:
  _base_only:
    instances:
    - prometheus-dev
    - prometheus-prod
    - prometheus-staging
instance_attrs:
  prometheus-dev:
    scrape_configs:
    - job_name: prometheus
      scrape_interval: 1m
      scrape_timeout: 10s
      metrics_path: /metrics
      scheme: http
      honor_labels: 'false'
      honor_timestamps: 'true'
      track_timestamps_staleness: 'false'
      enable_compression: 'true'
      follow_redirects: 'true'
      enable_http2: 'true'
      body_size_limit: '0'
      sample_limit: '0'
      label_limit: '0'
      label_name_length_limit: '0'
      label_value_length_limit: '0'
      target_limit: '0'
      keep_dropped_targets: '0'
      static_configs.0.targets: "['localhost:9090']"
