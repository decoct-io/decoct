meta:
  subject: runtime-commands-and-metadata
  description: Commands to run on first boot and metadata service settings.
  source_type: cloud-init
  total_instances: 6
base_class:
  disable_ec2_metadata: 'false'
class_assignments:
  _base_only:
    instances:
    - cloud-init-app-server
    - cloud-init-db-server
    - cloud-init-dev-server
    - cloud-init-edge-server
    - cloud-init-monitoring
    - cloud-init-worker-server
instance_data:
  schema:
  - hostname
  records:
    cloud-init-app-server:
    - app-prod-01
    cloud-init-db-server:
    - db-prod-01
    cloud-init-dev-server:
    - dev-01
    cloud-init-edge-server:
    - edge-prod-01
    cloud-init-monitoring:
    - mon-prod-01
    cloud-init-worker-server:
    - worker-prod-01
instance_attrs:
  cloud-init-app-server:
    runcmd: systemctl enable docker,systemctl start docker
  cloud-init-db-server:
    runcmd: sysctl -p,systemctl enable postgresql,systemctl start postgresql
  cloud-init-edge-server:
    runcmd: systemctl enable traefik
  cloud-init-worker-server:
    runcmd: systemctl enable docker,systemctl start docker
