meta:
  subject: ssh-security
  description: SSH key management and related security settings.
  source_type: cloud-init
  total_instances: 6
base_class:
  allow_public_ssh_keys: 'true'
  ssh.emit_keys_to_console: 'true'
  ssh_deletekeys: 'true'
  ssh_quiet_keygen: 'false'
class_assignments:
  _base_only:
    instances:
    - cloud-init-app-server
    - cloud-init-db-server
    - cloud-init-dev-server
    - cloud-init-edge-server
    - cloud-init-monitoring
    - cloud-init-worker-server
instance_data:
  schema:
  - hostname
  records:
    cloud-init-app-server:
    - app-prod-01
    cloud-init-db-server:
    - db-prod-01
    cloud-init-dev-server:
    - dev-01
    cloud-init-edge-server:
    - edge-prod-01
    cloud-init-monitoring:
    - mon-prod-01
    cloud-init-worker-server:
    - worker-prod-01
