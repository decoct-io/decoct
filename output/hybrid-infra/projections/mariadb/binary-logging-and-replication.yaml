meta:
  subject: binary-logging-and-replication
  description: Settings related to binary logging, replication behavior, and log
    expiration.
  source_type: mariadb
  total_instances: 5
base_class:
  mysqld.binlog_expire_logs_seconds: '2592000'
  mysqld.binlog_row_image: FULL
  mysqld.binlog_rows_query_log_events: 'false'
  mysqld.max_binlog_size: '1073741824'
  mysqld.relay_log_purge: 'true'
  mysqld.relay_log_recovery: 'false'
class_assignments:
  _base_only:
    instances:
    - maria-dev
    - maria-galera-node
    - maria-legacy-billing
    - maria-legacy-main
    - maria-staging
