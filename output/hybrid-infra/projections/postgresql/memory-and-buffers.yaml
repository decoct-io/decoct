meta:
  subject: memory-and-buffers
  description: Shared buffers, work memory, effective cache size, and temporary 
    buffer settings
  source_type: postgresql
  total_instances: 6
base_class:
  autovacuum_work_mem: '-1'
  huge_page_size: '0'
  logical_decoding_work_mem: 64MB
  vacuum_buffer_usage_limit: 2MB
classes:
  hash_mem_multiplier_2_0_max_parallel_workers_8:
    inherits: base
    own_attrs:
      hash_mem_multiplier: '2.0'
    instance_count_inclusive: 5
class_assignments:
  hash_mem_multiplier_2_0_max_parallel_workers_8:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
  _base_only:
    instances:
    - pg-prod-analytics
instance_data:
  schema:
  - maintenance_work_mem
  - shared_buffers
  records:
    pg-dev:
    - 64MB
    - 128MB
    pg-migration:
    - 1GB
    - 128MB
    pg-prod-analytics:
    - 2GB
    - 16GB
    pg-prod-primary:
    - 512MB
    - 2GB
    pg-prod-replica:
    - 64MB
    - 256MB
    pg-staging:
    - 128MB
    - 512MB
