meta:
  subject: security-and-authentication
  description: Settings related to security, authentication, and SSL/TLS.
  source_type: postgresql
  total_instances: 6
base_class:
  authentication_timeout: 1min
  bonjour: 'false'
  gss_accept_delegation: 'false'
  krb_caseins_users: 'false'
  password_encryption: scram-sha-256
  scram_iterations: '4096'
  ssl_min_protocol_version: TLSv1.2
  ssl_passphrase_command_supports_reload: 'false'
  ssl_prefer_server_ciphers: 'true'
class_assignments:
  _base_only:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-analytics
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
instance_data:
  schema:
  - ssl
  records:
    pg-dev:
    - 'false'
    pg-migration:
    - 'false'
    pg-prod-analytics:
    - 'true'
    pg-prod-primary:
    - 'true'
    pg-prod-replica:
    - 'false'
    pg-staging:
    - 'false'
