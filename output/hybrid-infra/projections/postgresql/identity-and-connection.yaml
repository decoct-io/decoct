meta:
  subject: identity-and-connection
  description: Core identification and basic connection settings for PostgreSQL 
    instances.
  source_type: postgresql
  total_instances: 6
base_class:
  port: '5432'
class_assignments:
  _base_only:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-analytics
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
instance_data:
  schema:
  - max_connections
  records:
    pg-dev:
    - '100'
    pg-migration:
    - '20'
    pg-prod-analytics:
    - '50'
    pg-prod-primary:
    - '200'
    pg-prod-replica:
    - '200'
    pg-staging:
    - '100'
