meta:
  subject: storage-and-io
  description: Background writer, I/O settings, temp file limits, and file 
    management
  source_type: postgresql
  total_instances: 6
base_class:
  backend_flush_after: '0'
  bgwriter_delay: 200ms
  bgwriter_lru_maxpages: '100'
  bgwriter_lru_multiplier: '2.0'
  max_files_per_process: '1000'
  max_prepared_transactions: '0'
  max_stack_depth: 2MB
  temp_file_limit: '-1'
class_assignments:
  _base_only:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-analytics
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
