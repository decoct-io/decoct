meta:
  subject: checkpoint-tuning
  description: Parameters controlling checkpoint behavior.
  source_type: postgresql
  total_instances: 6
base_class:
  bgwriter_delay: 200ms
  bgwriter_lru_maxpages: '100'
  bgwriter_lru_multiplier: '2.0'
  checkpoint_completion_target: '0.9'
  checkpoint_warning: 30s
  fsync: 'true'
  full_page_writes: 'true'
class_assignments:
  _base_only:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-analytics
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
