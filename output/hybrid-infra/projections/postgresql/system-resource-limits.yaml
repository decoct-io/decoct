meta:
  subject: system-resource-limits
  description: System-level resource limits configuration.
  source_type: postgresql
  total_instances: 6
base_class:
  backend_flush_after: '0'
  client_connection_check_interval: '0'
  huge_page_size: '0'
  max_files_per_process: '1000'
  max_prepared_transactions: '0'
  max_stack_depth: 2MB
  reserved_connections: '0'
  superuser_reserved_connections: '3'
  tcp_keepalives_count: '0'
  tcp_keepalives_idle: '0'
  tcp_keepalives_interval: '0'
  tcp_user_timeout: '0'
  temp_file_limit: '-1'
class_assignments:
  _base_only:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-analytics
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
