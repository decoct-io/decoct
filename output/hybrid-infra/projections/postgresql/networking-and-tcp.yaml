meta:
  subject: networking-and-tcp
  description: TCP keepalive, timeout, syslog, and Bonjour settings
  source_type: postgresql
  total_instances: 6
base_class:
  bonjour: 'false'
  client_connection_check_interval: '0'
  syslog_facility: LOCAL0
  syslog_ident: postgres
  syslog_sequence_numbers: 'true'
  syslog_split_messages: 'true'
  tcp_keepalives_count: '0'
  tcp_keepalives_idle: '0'
  tcp_keepalives_interval: '0'
  tcp_user_timeout: '0'
class_assignments:
  _base_only:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-analytics
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
