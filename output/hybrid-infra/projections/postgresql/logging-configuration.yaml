meta:
  subject: logging-configuration
  description: Parameters related to PostgreSQL server logging behavior and 
    output.
  source_type: postgresql
  total_instances: 6
base_class:
  log_autovacuum_min_duration: 10min
  log_checkpoints: 'true'
  log_destination: "'stderr'"
  log_duration: 'false'
  log_error_verbosity: DEFAULT
  log_file_mode: '600'
  log_hostname: 'false'
  log_min_duration_sample: '-1'
  log_min_error_statement: ERROR
  log_min_messages: WARNING
  log_parameter_max_length: '-1'
  log_parameter_max_length_on_error: '0'
  log_recovery_conflict_waits: 'false'
  log_replication_commands: 'false'
  log_rotation_age: 24h
  log_rotation_size: 10MB
  log_startup_progress_interval: 10s
  log_statement_sample_rate: '1.0'
  log_temp_files: '-1'
  log_transaction_sample_rate: '0'
  log_truncate_on_rotation: 'false'
  syslog_facility: LOCAL0
  syslog_ident: postgres
  syslog_sequence_numbers: 'true'
  syslog_split_messages: 'true'
class_assignments:
  _base_only:
    instances:
    - pg-dev
    - pg-migration
    - pg-prod-analytics
    - pg-prod-primary
    - pg-prod-replica
    - pg-staging
