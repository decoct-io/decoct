meta:
  subject: services
  description: Service definitions including images, ports, resource limits, and
    restart policies
  source_type: docker-compose
  total_instances: 16
base_class:
  services: docker-compose.services.T0
class_assignments:
  _base_only:
    instances:
    - compose-app-prod-01..compose-app-prod-03
    - compose-billing-prod
    - compose-ci
    - compose-cron-prod
    - compose-dev
    - compose-dr
    - compose-edge-prod
    - compose-load-test
    - compose-monitoring-prod
    - compose-notification-prod
    - compose-report-prod
    - compose-search-prod
    - compose-staging
    - compose-worker-prod
b_composite_deltas:
  compose-app-prod-01:
    services:
      delta:
        core-api:
          image: ridgeline/core-api:2.1.0
          restart: always
          environment.DATABASE_URL: '[REDACTED]'
          environment.API_KEY: '[REDACTED]'
          environment.JWT_SECRET: '[REDACTED]'
          environment.REDIS_URL: redis://:R3disP@ss!@redis:6379
          volumes: 
            /opt/ridgeline/core-api/data:/app/data,/opt/ridgeline/core-api/logs:/app/logs
          depends_on.redis.condition: service_started
          depends_on.redis.required: 'true'
          depends_on.redis.restart: 'true'
          labels.traefik.enable: 'true'
          labels.traefik.http.routers.core-api.rule: Host(`api.ridgeline.io`)
          networks: app-network,monitoring
          healthcheck.test: "['CMD-SHELL', 'curl -f http://localhost:8000/health']"
          healthcheck.start_period: 10s
          deploy.replicas: '2'
          mem_limit: 2g
          cpus: '1.0'
        auth-service:
          image: ridgeline/auth-service:1.8.0
          restart: always
          ports: 8001:8001
          environment.DATABASE_URL: '[REDACTED]'
          environment.JWT_SECRET: '[REDACTED]'
          environment.OAUTH_CLIENT_SECRET: ocs_Xm9pL7kR2vN4wQ8jT5
          labels.traefik.enable: 'true'
          labels.traefik.http.routers.auth.rule: Host(`auth.ridgeline.io`)
          networks: app-network,monitoring
          healthcheck.test: "['CMD-SHELL', 'curl -f http://localhost:8001/health']"
          healthcheck.start_period: 10s
