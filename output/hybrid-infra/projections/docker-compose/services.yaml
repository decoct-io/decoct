  compose-worker-prod:
    services:
      delta:
        analytics-worker:
          image: ridgeline/analytics-worker:2.1.0
          restart: always
          command: celery -A analytics.tasks worker --loglevel=info 
            --concurrency=4
          environment.DATABASE_URL: '[REDACTED]'
          environment.REDIS_PASSWORD: R3disP@ss!
          environment.CELERY_BROKER_URL: redis://:R3disP@ss!@redis:6379/0
          volumes: worker-data:/app/data
          depends_on.redis.condition: service_started
          depends_on.redis.required: 'true'
          depends_on.redis.restart: 'true'
          networks: app-network,monitoring
          healthcheck.test: "['CMD-SHELL', 'celery inspect ping']"
          healthcheck.interval: 60s
          healthcheck.start_period: 30s
          deploy.replicas: '4'
          mem_limit: 4g
          cpus: '2.0'
          ports:
        redis:
          environment.REDIS_PASSWORD: R3disP@ss!
          volumes: redis-worker-data:/data
          mem_limit: 256m
          cpus: '0.25'
          ports:
        flower:
          image: mher/flower:2.0
          ports: 5555:5555
          environment.CELERY_BROKER_URL: redis://:R3disP@ss!@redis:6379/0
          environment.FLOWER_BASIC_AUTH: admin:Fl0werP@ss!
          depends_on.redis.condition: service_started
          depends_on.redis.required: 'true'
          depends_on.redis.restart: 'true'
          mem_limit: 256m
          cpus: '0.25'
          healthcheck.test:
          volumes:
composite_templates:
  services:
    docker-compose.services.T0:
      elements:
        cpus: '0.5'
        deploy.replicas: '1'
        deploy.restart_policy.condition: any
        deploy.restart_policy.max_attempts: '0'
        deploy.rollback_config.order: stop-first
        deploy.rollback_config.parallelism: '1'
        deploy.update_config.order: stop-first
        deploy.update_config.parallelism: '1'
        healthcheck.interval: 30s
        healthcheck.retries: '3'
        healthcheck.start_interval: 5s
        healthcheck.start_period: 0s
        healthcheck.test: "['CMD-SHELL', 'redis-cli ping']"
        healthcheck.timeout: 30s
        image: redis:7-alpine
        init: 'false'
        logging.driver: json-file
        mem_limit: 512m
        networks: app-network
        ports: 8000:8000
        privileged: 'false'
        read_only: 'false'
        restart: unless-stopped
        stdin_open: 'false'
        tty: 'false'
        volumes: search-data:/app/data
