meta:
  entity_type: sshd
  tier_b_ref: sshd_classes.yaml
  total_instances: 4
class_assignments:
  AddressFamily_any_ClientAliveCountMax_3:
    instances:
    - sshd-dev
    - sshd-prod
    - sshd-staging
  _base_only:
    instances:
    - sshd-bastion
instance_data:
  schema:
  - AllowStreamLocalForwarding
  - ClientAliveInterval
  - Compression
  - KbdInteractiveAuthentication
  - LogLevel
  - LoginGraceTime
  - MaxAuthTries
  - MaxSessions
  - PasswordAuthentication
  - PermitUserRC
  - PrintMotd
  records:
    sshd-bastion:
    - 'false'
    - '120'
    - 'false'
    - 'false'
    - VERBOSE
    - '30'
    - '3'
    - '1'
    - 'false'
    - 'false'
    - 'false'
    sshd-dev:
    - 'true'
    - '0'
    - 'true'
    - 'true'
    - INFO
    - '120'
    - '6'
    - '10'
    - 'true'
    - 'true'
    - 'true'
    sshd-prod:
    - 'false'
    - '300'
    - 'false'
    - 'false'
    - VERBOSE
    - '60'
    - '3'
    - '2'
    - 'false'
    - 'false'
    - 'false'
    sshd-staging:
    - 'true'
    - '0'
    - 'true'
    - 'true'
    - INFO
    - '120'
    - '6'
    - '10'
    - 'true'
    - 'true'
    - 'true'
instance_attrs:
  sshd-bastion:
    AllowUsers: deploy ops
  sshd-prod:
    AllowUsers: deploy ops admins
overrides:
  sshd-dev:
    owner: AddressFamily_any_ClientAliveCountMax_3
    delta:
      AllowAgentForwarding: 'true'
      AllowTcpForwarding: 'true'
      PermitRootLogin: prohibit-password
      X11Forwarding: 'true'
  sshd-prod:
    owner: AddressFamily_any_ClientAliveCountMax_3
    delta:
      AllowAgentForwarding: 'false'
      AllowTcpForwarding: 'false'
      Banner: /etc/ssh/banner.txt
      PermitRootLogin: 'false'
      X11Forwarding: 'false'
  sshd-staging:
    owner: AddressFamily_any_ClientAliveCountMax_3
    delta:
      AllowAgentForwarding: 'true'
      AllowTcpForwarding: 'true'
      PermitRootLogin: 'false'
      X11Forwarding: 'false'
  sshd-bastion:
    owner: _base_only
    delta:
      AddressFamily: inet
      AllowAgentForwarding: 'true'
      AllowTcpForwarding: 'true'
      Banner: /etc/ssh/banner.txt
      ClientAliveCountMax: '2'
      PermitRootLogin: 'false'
      Port: '2222'
      X11Forwarding: 'false'
foreign_keys: {}
