meta:
  entity_type: docker-compose
  total_instances: 16
  max_inheritance_depth: 2
  tier_c_ref: docker-compose_instances.yaml
base_class:
  networks: docker-compose.networks.T0
  services: docker-compose.services.T0
classes:
  _base_only:
    inherits: base
    own_attrs: {}
    instance_count_inclusive: 10
  volumes_docker_compose_volumes_T0:
    inherits: base
    own_attrs:
      volumes: docker-compose.volumes.T0
    instance_count_inclusive: 6
subclasses: {}
composite_templates:
  networks:
    docker-compose.networks.T0:
      elements:
        attachable: 'false'
        driver: bridge
        enable_ipv6: 'false'
        external: 'false'
        internal: 'false'
  services:
    docker-compose.services.T0:
      elements:
        cpus: '0.5'
        deploy.replicas: '1'
        deploy.restart_policy.condition: any
        deploy.restart_policy.max_attempts: '0'
        deploy.rollback_config.order: stop-first
        deploy.rollback_config.parallelism: '1'
        deploy.update_config.order: stop-first
        deploy.update_config.parallelism: '1'
        healthcheck.interval: 30s
        healthcheck.retries: '3'
        healthcheck.start_interval: 5s
        healthcheck.start_period: 0s
        healthcheck.test: "['CMD-SHELL', 'redis-cli ping']"
        healthcheck.timeout: 30s
        image: redis:7-alpine
        init: 'false'
        logging.driver: json-file
        mem_limit: 512m
        networks: app-network
        ports: 8000:8000
        privileged: 'false'
        read_only: 'false'
        restart: unless-stopped
        stdin_open: 'false'
        tty: 'false'
        volumes: search-data:/app/data
  volumes:
    docker-compose.volumes.T0:
      elements:
        external: 'false'
assertions:
  base_only_ratio: 0.625
