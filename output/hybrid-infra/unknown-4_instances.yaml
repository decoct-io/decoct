meta:
  entity_type: unknown-4
  tier_b_ref: unknown-4_classes.yaml
  total_instances: 2
class_assignments:
  _base_only:
    instances:
    - yaml-app-logging-config
    - yaml-app-service-mesh
instance_data:
  schema:
  - app.version
  - cache.ttl
  - database.pool_size
  - database.pool_timeout
  - logging.level
  records:
    yaml-app-logging-config:
    - v2
    - '300'
    - '20'
    - '30'
    - INFO
    yaml-app-service-mesh:
    - v1
    - '60'
    - '10'
    - '15'
    - WARNING
overrides:
  yaml-app-logging-config:
    owner: _base_only
    delta:
      cors.allow_credentials: 'true'
      cors.enabled: 'true'
      cors.methods: GET,POST,PUT,DELETE
      cors.origins: https://app.ridgeline.io,https://admin.ridgeline.io
      features.analytics_v2: 'true'
      features.dark_mode: 'true'
      features.new_billing: 'false'
      rate_limiting.burst: '50'
      rate_limiting.by: ip
      rate_limiting.enabled: 'true'
      rate_limiting.requests_per_minute: '1000'
  yaml-app-service-mesh:
    owner: _base_only
    delta:
      services:
        core-api:
          url: http://core-api:8000
          timeout: '30'
          retries: '3'
        auth-service:
          url: http://auth-service:8001
          timeout: '10'
          retries: '2'
        billing-api:
          url: http://billing-api:8002
          timeout: '30'
          retries: '3'
        search-svc:
          url: http://search-svc:8004
          timeout: '15'
          retries: '2'
        notification-svc:
          url: http://notification-svc:8003
          timeout: '10'
          retries: '1'
foreign_keys: {}
