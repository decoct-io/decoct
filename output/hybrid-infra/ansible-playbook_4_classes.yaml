meta:
  entity_type: ansible-playbook_4
  total_instances: 1
  max_inheritance_depth: 2
  tier_c_ref: ansible-playbook_4_instances.yaml
base_class:
  any_errors_fatal: 'false'
  become: 'false'
  check_mode: 'false'
  gather_facts: 'true'
  handlers:
  - name: restart_web_app
    ansible.builtin.systemd.name: "{{ service_name | default('ridgeline') }}"
    ansible.builtin.systemd.state: restarted
    ansible.builtin.systemd.daemon_reload: 'false'
    ansible.builtin.systemd.daemon_reexec: 'false'
    ansible.builtin.systemd.no_block: 'false'
    ansible.builtin.systemd.scope: system
  hosts: web_servers
  ignore_errors: 'false'
  name: Deploy Web App
  no_log: 'false'
  order: inventory
  run_once: 'false'
  tasks:
  - name: Install packages via dnf
    ansible.builtin.dnf.name: '{{ item }}'
    ansible.builtin.dnf.state: present
    ansible.builtin.dnf.update_cache: 'false'
    ansible.builtin.dnf.allow_downgrade: 'false'
    ansible.builtin.dnf.autoremove: 'false'
    ansible.builtin.dnf.disable_gpg_check: 'false'
    ansible.builtin.dnf.download_only: 'false'
    ansible.builtin.dnf.install_weak_deps: 'true'
    ansible.builtin.dnf.lock_timeout: '30'
    ansible.builtin.dnf.security: 'false'
    ansible.builtin.dnf.skip_broken: 'false'
    ansible.builtin.dnf.sslverify: 'true'
    ansible.builtin.dnf.update_only: 'false'
    ansible.builtin.dnf.validate_certs: 'true'
    loop: nodejs,npm,curl
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'false'
  - name: Clone application repository
    ansible.builtin.git.repo: https://github.com/ridgeline-data/{{ app_name | 
      default('app') }}.git
    ansible.builtin.git.dest: /opt/ridgeline/{{ app_name | default('app') }}
    ansible.builtin.git.bare: 'false'
    ansible.builtin.git.clone: 'true'
    ansible.builtin.git.force: 'false'
    ansible.builtin.git.recursive: 'true'
    ansible.builtin.git.remote: origin
    ansible.builtin.git.track_submodules: 'false'
    ansible.builtin.git.update: 'true'
    ansible.builtin.git.verify_commit: 'false'
    ansible.builtin.git.version: HEAD
    ansible.builtin.git.accept_hostkey: 'false'
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'false'
  - name: Copy configuration files
    ansible.builtin.copy.src: '{{ item.src }}'
    ansible.builtin.copy.dest: '{{ item.dest }}'
    ansible.builtin.copy.owner: root
    ansible.builtin.copy.group: root
    ansible.builtin.copy.mode: '0644'
    ansible.builtin.copy.backup: 'false'
    ansible.builtin.copy.decrypt: 'true'
    ansible.builtin.copy.follow: 'false'
    ansible.builtin.copy.force: 'true'
    ansible.builtin.copy.remote_src: 'false'
    ansible.builtin.copy.unsafe_writes: 'false'
    loop.0.src: files/config.conf
    loop.0.dest: /etc/ridgeline/config.conf
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'false'
  - name: Enable and start service
    ansible.builtin.systemd.name: "{{ service_name | default('ridgeline') }}"
    ansible.builtin.systemd.state: started
    ansible.builtin.systemd.enabled: 'true'
    ansible.builtin.systemd.daemon_reload: 'false'
    ansible.builtin.systemd.daemon_reexec: 'false'
    ansible.builtin.systemd.no_block: 'false'
    ansible.builtin.systemd.scope: system
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'false'
  - name: Wait for service to be ready
    ansible.builtin.wait_for.port: "{{ app_port | default('8000') }}"
    ansible.builtin.wait_for.host: 127.0.0.1
    ansible.builtin.wait_for.connect_timeout: '5'
    ansible.builtin.wait_for.delay: '0'
    ansible.builtin.wait_for.sleep: '1'
    ansible.builtin.wait_for.state: started
    ansible.builtin.wait_for.timeout: '300'
    ignore_errors: 'false'
    check_mode: 'false'
    no_log: 'false'
    run_once: 'false'
    become: 'false'
  vars.app_port: '3000'
  vars.app_version: 3.0.0
  vars.node_version: '20'
classes:
  _base_only:
    inherits: base
    own_attrs: {}
    instance_count_inclusive: 1
subclasses: {}
assertions:
  base_only_ratio: 1.0
