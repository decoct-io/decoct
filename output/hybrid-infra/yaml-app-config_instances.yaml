meta:
  entity_type: yaml-app-config
  tier_b_ref: yaml-app-config_classes.yaml
  total_instances: 3
class_assignments:
  _base_only:
    instances:
    - yaml-app-feature-flags
    - yaml-app-logging-config
    - yaml-app-service-mesh
instance_data:
  schema:
  - app.version
  - logging.level
  records:
    yaml-app-feature-flags:
    - v2
    - INFO
    yaml-app-logging-config:
    - v2
    - INFO
    yaml-app-service-mesh:
    - v1
    - WARNING
instance_attrs:
  yaml-app-logging-config:
    cache.ttl: '300'
    database.pool_size: '20'
    database.pool_timeout: '30'
  yaml-app-service-mesh:
    cache.ttl: '60'
    database.pool_size: '10'
    database.pool_timeout: '15'
overrides:
  yaml-app-feature-flags:
    owner: _base_only
    delta:
      features.admin_audit_log: 'false'
      features.analytics_v2: 'true'
      features.dark_mode: 'true'
      features.legacy_compat: 'true'
      features.new_billing: 'false'
      features.notification_batching: 'true'
      features.report_scheduling: 'true'
      features.search_v2: 'true'
  yaml-app-logging-config:
    owner: _base_only
    delta:
      cache.backend: redis
      cache.enabled: 'true'
      cache.redis_url: redis://:R3disP@ss!@redis:6379/1
      cors.allow_credentials: 'true'
      cors.enabled: 'true'
      cors.methods: GET,POST,PUT,DELETE
      cors.origins: https://app.ridgeline.io,https://admin.ridgeline.io
      database.echo: 'false'
      database.pool_recycle: '3600'
      features.analytics_v2: 'true'
      features.dark_mode: 'true'
      features.new_billing: 'false'
      rate_limiting.burst: '50'
      rate_limiting.by: ip
      rate_limiting.enabled: 'true'
      rate_limiting.requests_per_minute: '1000'
  yaml-app-service-mesh:
    owner: _base_only
    delta:
      cache.backend: redis
      cache.enabled: 'true'
      cache.redis_url: redis://:R3disP@ss!@redis:6379/1
      database.echo: 'false'
      database.pool_recycle: '3600'
      services:
        core-api:
          url: http://core-api:8000
          timeout: '30'
          retries: '3'
        auth-service:
          url: http://auth-service:8001
          timeout: '10'
          retries: '2'
        billing-api:
          url: http://billing-api:8002
          timeout: '30'
          retries: '3'
        search-svc:
          url: http://search-svc:8004
          timeout: '15'
          retries: '2'
        notification-svc:
          url: http://notification-svc:8003
          timeout: '10'
          retries: '1'
foreign_keys: {}
