Cisco-IOS-XR-ifmgr-cfg:interface-configurations:
  interface-configuration:
  - active: act
    interface-name: Null0
    ipv4-network:
      icmp-unreach-disable: ''
  - active: act
    description: Loopback
    interface-name: Loopback0
    interface-virtual: ''
    ipv4-network:
      addresses:
        primary:
          address: 10.0.0.1
          netmask: 255.255.255.255
    ipv6-network:
      addresses:
        regular-addresses:
          regular-address:
            address: fc00:0:1::1
            prefix-length: '128'
            zone: '0'
  - active: act
    interface-name: MgmtEth0/RP0/CPU0/0
    ipv4-network:
      addresses:
        primary:
          address: 198.18.1.101
          netmask: 255.255.255.0
  - active: act
    description: to p-rdg-2
    interface-name: GigabitEthernet0/0/0/0
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.0
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
  - active: act
    description: to p-bas-1
    interface-name: GigabitEthernet0/0/0/1
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.2
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
  - active: act
    description: to p-bas-2
    interface-name: GigabitEthernet0/0/0/2
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.4
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
  - active: act
    description: to trr-rdg
    interface-name: GigabitEthernet0/0/0/3
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.13
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
  - active: act
    description: to srr-rdg
    interface-name: GigabitEthernet0/0/0/4
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.21
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
  - active: act
    description: to pe-nby
    interface-name: GigabitEthernet0/0/0/5
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.28
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
