Cisco-IOS-XR-ifmgr-cfg:interface-configurations:
  interface-configuration:
  - active: act
    interface-name: Null0
    ipv4-network:
      icmp-unreach-disable: ''
  - active: act
    description: Loopback
    interface-name: Loopback0
    interface-virtual: ''
    ipv4-network:
      addresses:
        primary:
          address: 10.0.0.14
          netmask: 255.255.255.255
    ipv6-network:
      addresses:
        regular-addresses:
          regular-address:
            address: fc00:0:e::1
            prefix-length: '128'
            zone: '0'
  - active: act
    interface-name: MgmtEth0/RP0/CPU0/0
    ipv4-network:
      addresses:
        primary:
          address: 198.18.1.114
          netmask: 255.255.255.0
  - active: act
    description: to pe-win
    interface-name: GigabitEthernet0/0/0/0
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.35
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
  - active: act
    description: to p-bas-1
    interface-name: GigabitEthernet0/0/0/1
    ipv4-network:
      addresses:
        primary:
          address: 10.1.0.36
          netmask: 255.255.255.254
    ipv6-network:
      addresses:
        auto-configuration:
          enable: ''
      unnumbered: Loopback0
