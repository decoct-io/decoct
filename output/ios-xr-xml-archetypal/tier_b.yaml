            - af-name: ipv4
              interface-af-data:
                running: ''
              saf-name: unicast
            - af-name: ipv6
              interface-af-data:
                running: ''
              saf-name: unicast
          interface-name: GigabitEthernet0/0/0/0
          point-to-point: ''
          running: ''
        - interface-afs:
            interface-af:
            - af-name: ipv4
              interface-af-data:
                running: ''
              saf-name: unicast
            - af-name: ipv6
              interface-af-data:
                running: ''
              saf-name: unicast
