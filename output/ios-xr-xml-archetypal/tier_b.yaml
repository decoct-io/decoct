          ipv4-address: 198.18.1.1
          protocol:
            no-tls: ''
            protocol: grpc
  sensor-groups:
    sensor-group:
    - sensor-group-identifier: SG-BGP-NEIGHBORS
      sensor-paths:
        sensor-path:
          telemetry-sensor-path: Cisco-IOS-XR-ipv4-bgp-oper:bgp/instances/instance/instance-active/default-vrf/neighbors/neighbor
    - sensor-group-identifier: SG-INTF-COUNTERS
      sensor-paths:
        sensor-path:
          telemetry-sensor-path: Cisco-IOS-XR-infra-statsd-oper:infra-statistics/interfaces/interface/latest/generic-counters
    - sensor-group-identifier: SG-ISIS-NEIGHBORS
      sensor-paths:
        sensor-path:
          telemetry-sensor-path: Cisco-IOS-XR-clns-isis-oper:isis/instances/instance/neighbors/neighbor
  subscriptions:
    subscription:
    - destination-profiles:
        destination-profile:
          destination-id: DG-COLLECTOR
      sensor-profiles:
        sensor-profile:
          sample-interval: '60000'
          sensorgroupid: SG-BGP-NEIGHBORS
      subscription-identifier: SUB-BGP-NEIGHBORS
    - destination-profiles:
        destination-profile:
          destination-id: DG-COLLECTOR
      sensor-profiles:
        sensor-profile:
          sample-interval: '30000'
          sensorgroupid: SG-INTF-COUNTERS
      subscription-identifier: SUB-INTF-COUNTERS
    - destination-profiles:
        destination-profile:
          destination-id: DG-COLLECTOR
      sensor-profiles:
        sensor-profile:
          sample-interval: '60000'
          sensorgroupid: SG-ISIS-NEIGHBORS
      subscription-identifier: SUB-ISIS-NEIGHBORS
