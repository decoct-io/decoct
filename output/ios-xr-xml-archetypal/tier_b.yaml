Cisco-ios-xr-ipv4-acl-cfg:ipv4-acl-and-prefix-list:
  accesses:
    access:
      access-list-entries:
        access-list-entry:
        - remark: Permit management subnet
          sequence-number: '10'
          sequence-str: '10'
        - grant: permit
          sequence-number: '20'
          sequence-str: '20'
          source-network:
            source-address: 198.18.1.0
            source-wild-card-bits: 0.0.0.255
        - remark: Permit loopback subnet
          sequence-number: '30'
          sequence-str: '30'
        - grant: permit
          sequence-number: '40'
          sequence-str: '40'
          source-network:
            source-address: 10.0.0.0
            source-wild-card-bits: 0.0.0.255
        - remark: Deny all other traffic
          sequence-number: '50'
          sequence-str: '50'
        - grant: deny
          log-option: log
          sequence-number: '60'
          sequence-str: '60'
          source-network:
            source-address: 0.0.0.0
            source-wild-card-bits: 255.255.255.255
      access-list-name: ACL-MGMT-IN
