# Redis Configuration — master
# Meridian Manufacturing — redis-primary

bind 10.4.1.40
port 6379
requirepass R3d1s_Mrdn_Xk7

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 4gb
maxmemory-policy allkeys-lru

# ── Persistence (Master) ─────────────────────────────────────────────────────
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /var/lib/redis
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Network ───────────────────────────────────────────────────────────────────
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled yes
syslog-ident redis-master
