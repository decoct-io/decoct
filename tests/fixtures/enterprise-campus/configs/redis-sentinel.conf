# Redis Configuration — sentinel
# Meridian Manufacturing — redis-sentinel

bind 10.4.1.42
port 26379
requirepass R3d1s_S3nt_Mrdn_Lm9

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy noeviction

# ── Sentinel ──────────────────────────────────────────────────────────────────
sentinel monitor meridian-master 10.4.1.40 6379 2
sentinel auth-pass meridian-master R3d1s_S3nt_Mrdn_Lm9
sentinel down-after-milliseconds meridian-master 5000
sentinel failover-timeout meridian-master 60000
sentinel parallel-syncs meridian-master 1

# ── Network ───────────────────────────────────────────────────────────────────
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled yes
syslog-ident redis-sentinel
