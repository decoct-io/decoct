# Redis Configuration — replica
# Meridian Manufacturing — redis-replica-1

bind 10.4.1.41
port 6379
requirepass R3d1s_Mrdn_Xk7
masterauth R3d1s_Mrdn_Xk7

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 4gb
maxmemory-policy volatile-lru

# ── Replication ───────────────────────────────────────────────────────────────
replicaof 10.4.1.40 6379
replica-read-only yes
save 900 1
save 300 10
dbfilename dump.rdb
dir /var/lib/redis

# ── Network ───────────────────────────────────────────────────────────────────
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled yes
syslog-ident redis-replica
