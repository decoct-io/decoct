# Netplan Configuration — app-server-02
# Meridian Manufacturing — netplan-app-02

network:
  version: 2
  renderer: networkd
  ethernets:
    eno1:
      mtu: 9000
    eno2:
      mtu: 9000
  bonds:
    bond0:
      interfaces:
        - eno1
        - eno2
      mtu: 9000
      parameters:
        mode: 802.3ad
        lacp-rate: fast
        mii-monitor-interval: 100
        transmit-hash-policy: layer3+4
  vlans:
    vlan100:
      id: 100
      link: bond0
      mtu: 9000
      addresses:
        - 10.4.1.14/24
      routes:
        - to: default
          via: 10.4.1.1
      nameservers:
        addresses:
          - 10.4.1.10
          - 10.4.1.11
        search:
          - meridian-mfg.com
