# Palo Alto Firewall Configuration — hq
# Meridian Manufacturing — pa-fw-hq-gp

system:
  hostname: "hq-pa-gp-01"
  model: "PA-820"
  panos_version: "11.1.2"
  management:
    ip: "10.1.10.62"
    netmask: 255.255.255.0
    default_gw: "10.1.10.1"
  admin:
    password_hash: "Qx4rSvHy8zA1bCeF"
  api_key: "$PA_API_hqgp_Pq3rS7"
  dns:
    primary: 10.4.1.10
    secondary: 10.4.1.11
  ntp:
    primary: 10.4.1.20
    secondary: 10.4.1.21
  domain: meridian-mfg.com
  timezone: America/Detroit
  logging:
    syslog:
      - server: 10.4.1.50
        port: 514
        facility: LOG_USER

zones:
  - name: "trust"
    type: layer3
    protection_profile: default
  - name: "untrust"
    type: layer3
    protection_profile: strict
  - name: "vpn"
    type: layer3
    protection_profile: default

security_rules:
  - name: "vpn-to-corp"
    action: "permit"
    application: any
    service: any
    source_zone: "vpn"
    destination_zone: "corp"
    source_address: any
    destination_address: any
    log_start: false
    log_end: true
    log_forwarding: syslog-profile
  - name: "corp-to-vpn"
    action: "permit"
    application: any
    service: any
    source_zone: "corp"
    destination_zone: "vpn"
    source_address: any
    destination_address: any
    log_start: false
    log_end: true
    log_forwarding: syslog-profile

nat_rules:
  - name: "gp-nat"
    type: "dynamic-ip-port"

globalprotect:
  portal:
    enabled: true
    address: "10.1.10.62"
  gateway:
    enabled: true
    pre_shared_key: "GP_PSK_hq_Mn4wQ8"
    tunnel_mode: ssl
    ip_pool_start: 10.100.0.1
    ip_pool_end: 10.100.0.254
    split_tunnel:
      include:
        - 10.0.0.0/8
      exclude:
        - 10.5.0.0/16

threat_prevention:
  antivirus: enabled
  anti_spyware: enabled
  vulnerability: enabled
  file_blocking: enabled
  wildfire: enabled

ssl_decryption:
  enabled: true
  ca_cert: /etc/paloalto/certs/decrypt-ca.pem
  exclude_categories:
    - financial-services
    - health-and-medicine

high_availability:
  mode: active-passive
  group_id: 1
  peer_ip: "10.1.10.63"
  heartbeat_interval: 1000
  preemptive: false
