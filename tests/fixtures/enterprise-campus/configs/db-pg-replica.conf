# PostgreSQL Configuration — replica
# Meridian Manufacturing — db-pg-replica

# ── Connection Settings ────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3
password_encryption = scram-sha-256
authentication_timeout = 60s

# ── Authentication ─────────────────────────────────────────────────────────────
# superuser password: PG_sup3r_Mrdn_Xk7
# replication password: PG_r3pl_Mrdn_Lm9

# ── SSL ────────────────────────────────────────────────────────────────────────
ssl = on
ssl_cert_file = '/etc/postgresql/certs/server.crt'
ssl_key_file = '/etc/postgresql/certs/server.key'
ssl_ca_file = '/etc/postgresql/certs/root.crt'
ssl_prefer_server_ciphers = on
ssl_min_protocol_version = TLSv1.2
ssl_passphrase_command = 'echo PG_SSL_Mrdn_Qx4'

# ── Memory ─────────────────────────────────────────────────────────────────────
shared_buffers = 8GB
work_mem = 256MB
maintenance_work_mem = 1GB
effective_cache_size = 24GB
huge_pages = try

# ── WAL Settings ──────────────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 4GB
min_wal_size = 1GB
wal_buffers = 64MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# ── Replication ───────────────────────────────────────────────────────────────
hot_standby = on
hot_standby_feedback = on
primary_conninfo = 'host=10.4.1.11 port=5432 user=replicator password=PG_r3pl_Mrdn_Lm9'

# ── Logging ───────────────────────────────────────────────────────────────────
log_destination = 'syslog'
logging_collector = on
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 1000
log_connections = on
log_disconnections = on
log_lock_waits = on
log_checkpoints = on

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
