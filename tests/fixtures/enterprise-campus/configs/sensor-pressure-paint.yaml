# Sensor Network Configuration — pressure (paint-booth)
# Meridian Manufacturing — sensor-pressure-paint

sensor_type: "pressure"
zone: "paint-booth"
sensor_count: 2

sampling:
  rate_hz: 10
  resolution_bits: 16
  buffer_size: 64
  batch_transmit: false
  batch_interval_ms: 1000

communication:
  protocol: "mqtt"
  gateway: "10.5.2.202"
  mqtt_topic: "plant/paint-booth/pressure"
  qos: 1

sensors:
  - id: "press-paint-01"
    measurement: "spray-gun"
    enabled: true
    unit: bar
    range_min: 0.0
    range_max: 10.0
    alarm_threshold: 8.0
    warning_threshold: 7.0
  - id: "press-paint-02"
    measurement: "booth-air"
    enabled: true
    unit: bar
    range_min: 0.0
    range_max: 10.0
    alarm_threshold: 8.0
    warning_threshold: 7.0

calibration:
  interval_days: 90
  last_calibrated: "2025-09-15"
  certificate: /etc/sensors/cal/pressure-paint-booth.pdf

diagnostics:
  self_test_interval_s: 3600
  health_topic: "plant/paint-booth/pressure/health"
  battery_monitoring: false
