# Meridian Background Worker
# Meridian Manufacturing — systemd-app-worker

[Unit]
Description=Meridian Background Worker
After=network.target redis.service

[Service]
Type=simple
User=meridian
Group=meridian
ExecStart=/opt/meridian/bin/worker --queues default high --concurrency 4
Restart=always
RestartSec=5
Environment="DB_HOST=10.4.1.11"
Environment="DB_PORT=5432"
Environment="REDIS_URL=redis://10.4.1.40:6379"
Environment="REDIS_AUTH=R3d1s_Mrdn_Xk7"
LimitNOFILE=65535

[Install]
WantedBy=multi-user.target
