# Sensor Network Configuration — vibration (weld-cells)
# Meridian Manufacturing — sensor-vibration-weld

sensor_type: "vibration"
zone: "weld-cells"
sensor_count: 4

sampling:
  rate_hz: 1000
  resolution_bits: 16
  buffer_size: 4096
  batch_transmit: true
  batch_interval_ms: 100

communication:
  protocol: "mqtt"
  gateway: "10.5.1.200"
  mqtt_topic: "plant/weld-cells/vibration"
  qos: 1

sensors:
  - id: "vib-weld-01"
    measurement: "X-axis"
    enabled: true
    unit: mm/s
    range_min: 0.0
    range_max: 50.0
    alarm_threshold: 25.0
    warning_threshold: 15.0
  - id: "vib-weld-02"
    measurement: "Y-axis"
    enabled: true
    unit: mm/s
    range_min: 0.0
    range_max: 50.0
    alarm_threshold: 25.0
    warning_threshold: 15.0
  - id: "vib-weld-03"
    measurement: "Z-axis"
    enabled: true
    unit: mm/s
    range_min: 0.0
    range_max: 50.0
    alarm_threshold: 25.0
    warning_threshold: 15.0
  - id: "vib-weld-04"
    measurement: "triaxial"
    enabled: true
    unit: mm/s
    range_min: 0.0
    range_max: 50.0
    alarm_threshold: 25.0
    warning_threshold: 15.0

calibration:
  interval_days: 90
  last_calibrated: "2025-09-15"
  certificate: /etc/sensors/cal/vibration-weld-cells.pdf

diagnostics:
  self_test_interval_s: 3600
  health_topic: "plant/weld-cells/vibration/health"
  battery_monitoring: false
