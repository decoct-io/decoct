# Edge Compute Node — defect-detect-02
# Meridian Manufacturing — edge-node-defect-2

node:
  name: "defect-detect-02"
  function: "defect-detection"
  model_version: "v2.1"
  api_token: "Edge_AP1_Def2_Lm9"

hardware:
  gpu: "nvidia-t4"
  memory_gb: 16
  storage_gb: 256
  network:
    data_interface: eth0
    management_interface: eth1

inference:
  interval_ms: 100
  batch_size: 1
  precision: fp16
  models:
    - name: "yolov8-defect"
      version: "v2.1"
      input_size: "640x640"
      path: /opt/models/yolov8-defect/v2.1/model.onnx
      signing_key: "Mdl_S1gn_Mrdn_yolo_Pk7"
      warm_up: true
    - name: "classifier-scratch"
      version: "v1.2"
      input_size: "224x224"
      path: /opt/models/classifier-scratch/v1.2/model.onnx
      signing_key: "Mdl_S1gn_Mrdn_clas_Pk7"
      warm_up: true

mqtt:
  broker: 10.5.0.50
  port: 8883
  client_id: "defect-detect-02"
  publish_topic: "plant/vision/inference/defect-detect-02"
  subscribe_topic: "plant/vision/inference/defect-detect-02/command"
  tls: true
  qos: 1

alerting:
  enabled: true
  thresholds:
    defect_confidence: 0.85
    max_defects_per_minute: 5
  notification:
    mqtt_topic: plant/alerts/defect-detection
    severity: critical

telemetry:
  enabled: true
  interval_s: 30
  metrics:
    - inference_latency_ms
    - gpu_utilization_percent
    - gpu_temperature_c
    - memory_used_mb
    - model_accuracy

logging:
  level: info
  file: /var/log/edge-compute/defect-detect-02.log
  max_size_mb: 200
  rotate: 5
