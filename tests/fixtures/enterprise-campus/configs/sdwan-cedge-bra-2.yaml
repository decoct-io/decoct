# SD-WAN cEdge Configuration — bra
# Meridian Manufacturing — sdwan-cedge-bra-2

system:
  hostname: "bra-cedge-02"
  system-ip: "10.255.0.4"
  site-id: 200
  organization-name: "MeridianMfg"
  admin-tech-on-failure: true
  sp-organization-name: "MeridianMfg"
  console-baud-rate: 115200
  vbond:
    address: 10.255.255.1
    port: 12346
    local: false

omp:
  graceful-restart: true
  send-path-limit: 4
  ecmp-limit: 4
  shutdown: false
  timers:
    holdtime: 60
    advertisement-interval: 1
    graceful-restart-timer: 43200
    eor-timer: 300
  authentication:
    key: "OmpK3y_bra_Mn4w"
    type: ah-sha1-hmac

bfd:
  color-default:
    multiplier: 6
    poll-interval: 300000
  app-route:
    multiplier: 6
    poll-interval: 600000

security:
  ipsec:
    authentication-type: sha1-hmac-sha256
    integrity-type: ip-udp-esp
    pre-shared-key: "IPsec_bra2_Lk3tV"
    ike-version: 2
  rekey-interval: 86400

transport:
  - type: "inet1"
    address: "198.51.100.11"
    color: "public-internet"
    encapsulation: ipsec
    weight: 1
    restrict: false
  - type: "inet2"
    address: "203.0.113.11"
    color: "public-internet"
    encapsulation: ipsec
    weight: 1
    restrict: false

vpn:
  - id: 0
    name: "mgmt"
    dns:
      primary: 10.4.1.10
      secondary: 10.4.1.11
  - id: 1
    name: "corp"
  - id: 10
    name: "guest"


logging:
  server:
    - address: 10.4.1.50
      vpn: 1
      source-interface: Loopback0
      priority: informational
  disk:
    enable: true
    file-size: 10
    file-rotate: 5

ntp:
  server:
    - address: 10.4.1.20
      vpn: 0
      version: 4
      source-interface: Loopback0
