# Certbot Certificate Renewal Timer
# Meridian Manufacturing — systemd-certbot-renew

[Unit]
Description=Certbot Certificate Renewal Timer
After=network.target

[Service]
Type=oneshot
User=root
Group=root
ExecStart=/usr/bin/certbot renew --quiet --deploy-hook /usr/local/bin/reload-services.sh

[Install]
WantedBy=multi-user.target
