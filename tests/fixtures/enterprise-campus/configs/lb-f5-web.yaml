# Load Balancer Configuration — dc1-f5-web
# Meridian Manufacturing — lb-f5-web

name: "dc1-f5-web"
type: "f5-bigip"
site: "dc1"

virtual_server:
  name: "vs-dc1-f5-web"
  address: "198.51.100.50"
  port: 443
  ssl:
    enabled: true
    certificate: /etc/ssl/certs/dc1-f5-web.pem
    key: /etc/ssl/private/dc1-f5-web-key.pem
    protocols:
      - TLSv1.2
      - TLSv1.3
    ciphers: ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
  profiles:
    - http
    - tcp-optimized
    - oneconnect

pool:
  name: "pool-dc1-f5-web"
  lb_method: round-robin
  members:
    - address: "10.4.2.15"
      port: 8080
      state: enabled
      priority: 1
    - address: "10.4.2.16"
      port: 8080
      state: enabled
      priority: 1

health_monitor:
  type: "https"
  path: "/health"
  interval: 10
  timeout: 5
  retries: 3
  expected_status: 200

persistence:
  type: "cookie"
  cookie_name: "SRV_DC1_F5_WEB"
  cookie_expiry: 3600

irules:
  - name: redirect-http
    content: "when HTTP_REQUEST { HTTP::redirect https://[HTTP::host][HTTP::uri] }"

logging:
  level: info
  destination: syslog
  syslog_server: 10.4.1.50
