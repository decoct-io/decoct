# Sensor Network Configuration — temperature (paint-booth)
# Meridian Manufacturing — sensor-temp-paint

sensor_type: "temperature"
zone: "paint-booth"
sensor_count: 3

sampling:
  rate_hz: 1
  resolution_bits: 16
  buffer_size: 64
  batch_transmit: false
  batch_interval_ms: 1000

communication:
  protocol: "mqtt"
  gateway: "10.5.2.201"
  mqtt_topic: "plant/paint-booth/temperature"
  qos: 1

sensors:
  - id: "temp-paint-01"
    measurement: "booth-air"
    enabled: true
    unit: degC
    range_min: -10.0
    range_max: 500.0
    alarm_threshold: 200.0
    warning_threshold: 150.0
  - id: "temp-paint-02"
    measurement: "oven-zone1"
    enabled: true
    unit: degC
    range_min: -10.0
    range_max: 500.0
    alarm_threshold: 200.0
    warning_threshold: 150.0
  - id: "temp-paint-03"
    measurement: "oven-zone2"
    enabled: true
    unit: degC
    range_min: -10.0
    range_max: 500.0
    alarm_threshold: 200.0
    warning_threshold: 150.0

calibration:
  interval_days: 90
  last_calibrated: "2025-09-15"
  certificate: /etc/sensors/cal/temperature-paint-booth.pdf

diagnostics:
  self_test_interval_s: 3600
  health_topic: "plant/paint-booth/temperature/health"
  battery_monitoring: false
