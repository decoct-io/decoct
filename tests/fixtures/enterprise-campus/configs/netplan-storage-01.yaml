# Netplan Configuration — storage-node-01
# Meridian Manufacturing — netplan-storage-01

network:
  version: 2
  renderer: networkd
  ethernets:
    eno1:
      mtu: 9000
    eno2:
      mtu: 9000
    eno3:
      mtu: 9000
    eno4:
      mtu: 9000
  bonds:
    bond0:
      interfaces:
        - eno1
        - eno2
      mtu: 9000
      parameters:
        mode: 802.3ad
        lacp-rate: fast
        mii-monitor-interval: 100
        transmit-hash-policy: layer3+4
    bond1:
      interfaces:
        - eno3
        - eno4
      mtu: 9000
      parameters:
        mode: 802.3ad
        lacp-rate: fast
        mii-monitor-interval: 100
        transmit-hash-policy: layer3+4
  vlans:
    vlan100:
      id: 100
      link: bond0
      mtu: 9000
      addresses:
        - 10.4.1.17/24
      routes:
        - to: default
          via: 10.4.3.1
      nameservers:
        addresses:
          - 10.4.1.10
          - 10.4.1.11
        search:
          - meridian-mfg.com
    vlan300:
      id: 300
      link: bond0
      mtu: 9000
      addresses:
        - 10.4.3.17/24
