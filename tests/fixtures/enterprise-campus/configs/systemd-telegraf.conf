# Telegraf Metrics Collector
# Meridian Manufacturing — systemd-telegraf

[Unit]
Description=Telegraf Metrics Collector
After=network.target

[Service]
Type=simple
User=telegraf
Group=telegraf
ExecStart=/usr/bin/telegraf --config /etc/telegraf/telegraf.conf
Restart=always
RestartSec=5
Environment="INFLUX_TOKEN=Infl_Tk_Mrdn_Mn4wQ8"
LimitNOFILE=32768

[Install]
WantedBy=multi-user.target
