# nginx site configuration — nrt static
# ArcticCache CDN — nginx-nrt-static

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/static-access.log main;
    error_log /var/log/nginx/static-error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_max_body_size 50m;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/s;

    # Cache path
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:100m max_size=10g inactive=24h use_temp_path=off;

    # SSL defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name static.nrt.arcticcache.net;

        ssl_certificate /etc/ssl/certs/nrt-rsa.pem;
        ssl_certificate_key /etc/ssl/private/nrt-rsa-key.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Pop "nrt" always;
        add_header X-Cache-Status "$upstream_cache_status" always;

        location / {
            proxy_cache static_cache;
            proxy_cache_valid 200 24h;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;

            root /var/www/static;
            index index.html;
            try_files $uri $uri/ =404;

            limit_req zone=static_limit burst=50 nodelay;

            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        location /assets/ {
            alias /var/www/static/assets/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # HTTP redirect
    server {
        listen 80;
        server_name static.nrt.arcticcache.net;
        return 301 https://$host$request_uri;
    }
}
