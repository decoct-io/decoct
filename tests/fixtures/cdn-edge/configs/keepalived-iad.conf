# Keepalived Configuration — iad
# ArcticCache CDN — keepalived-iad

global_defs {
    router_id CDN_IAD
    enable_script_security
    script_user root
}

vrrp_script chk_nginx {
    script "/usr/local/bin/check_nginx.sh"
    interval 2
    weight 2
    fall 3
    rise 2
}

vrrp_instance VI_CDN_IAD {
    state MASTER
    interface eth0
    virtual_router_id 54
    priority 100
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass vrrp_iad_Yp6c
    }

    virtual_ipaddress {
        10.4.1.100/24
    }

    track_script {
        chk_nginx
    }

    notify /usr/local/bin/notify-failover.sh
}
