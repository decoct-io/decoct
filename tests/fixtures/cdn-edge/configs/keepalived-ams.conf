# Keepalived Configuration — ams
# ArcticCache CDN — keepalived-ams

global_defs {
    router_id CDN_AMS
    enable_script_security
    script_user root
}

vrrp_script chk_nginx {
    script "/usr/local/bin/check_nginx.sh"
    interval 2
    weight 2
    fall 3
    rise 2
}

vrrp_instance VI_CDN_AMS {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass vrrp_ams_Kx9m
    }

    virtual_ipaddress {
        10.1.1.100/24
    }

    track_script {
        chk_nginx
    }

}
