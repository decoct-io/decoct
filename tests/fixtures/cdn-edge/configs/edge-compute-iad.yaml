# Edge Compute Configuration — iad
# ArcticCache CDN — edge-compute-iad

runtime:
  engine: wasmtime
  num_workers: 5
  max_memory_mb: 128
  max_cpu_time_ms: 50
  signing_key: "wasm_sign_iad_Yp6cD4gA1sE9"

modules:
  - name: geo-redirect
    version: "v2.1.0"
    path: /opt/edge-compute/modules/geo-redirect/v2.1.0/module.wasm
    enabled: true
  - name: ab-testing
    version: "v1.4.0"
    path: /opt/edge-compute/modules/ab-testing/v1.4.0/module.wasm
    enabled: true
  - name: image-resize
    version: "v3.0.1"
    path: /opt/edge-compute/modules/image-resize/v3.0.1/module.wasm
    enabled: true
  - name: header-inject
    version: "v1.0.0"
    path: /opt/edge-compute/modules/header-inject/v1.0.0/module.wasm
    enabled: true
  - name: rate-limiter
    version: "v2.0.0"
    path: /opt/edge-compute/modules/rate-limiter/v2.0.0/module.wasm
    enabled: true

routing:
  - pattern: "/geo/*"
    module: geo-redirect
  - pattern: "/api/ab/*"
    module: ab-testing
  - pattern: "/images/*"
    module: image-resize
  - pattern: "/*"
    module: header-inject

logging:
  level: info
  output: /var/log/edge-compute/worker.log
  format: json

metrics:
  enabled: true
  port: 9300
  path: /metrics

limits:
  max_request_body_bytes: 1048576
  max_response_body_bytes: 10485760
  max_headers: 100
  request_timeout_ms: 30000
