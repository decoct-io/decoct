# Keepalived Configuration — syd
# ArcticCache CDN — keepalived-syd

global_defs {
    router_id CDN_SYD
    enable_script_security
    script_user root
}

vrrp_script chk_nginx {
    script "/usr/local/bin/check_nginx.sh"
    interval 2
    weight 2
    fall 3
    rise 2
}

vrrp_instance VI_CDN_SYD {
    state MASTER
    interface eth0
    virtual_router_id 57
    priority 50
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass vrrp_syd_Jk5m
    }

    virtual_ipaddress {
        10.7.1.100/24
    }

    track_script {
        chk_nginx
    }

}
