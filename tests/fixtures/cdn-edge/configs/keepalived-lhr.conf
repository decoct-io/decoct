# Keepalived Configuration — lhr
# ArcticCache CDN — keepalived-lhr

global_defs {
    router_id CDN_LHR
    enable_script_security
    script_user root
}

vrrp_script chk_nginx {
    script "/usr/local/bin/check_nginx.sh"
    interval 2
    weight 2
    fall 3
    rise 2
}

vrrp_instance VI_CDN_LHR {
    state MASTER
    interface eth0
    virtual_router_id 53
    priority 50
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass vrrp_lhr_Mn4w
    }

    virtual_ipaddress {
        10.3.1.100/24
    }

    track_script {
        chk_nginx
    }

}
