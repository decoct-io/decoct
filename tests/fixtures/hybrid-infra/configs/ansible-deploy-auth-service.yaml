---
# Deploy Auth Service
# Ridgeline Data — ansible-deploy-auth-service

- name: Deploy Auth Service
  hosts: app_servers
  become: false
  gather_facts: true
  any_errors_fatal: false
  ignore_errors: false
  check_mode: false
  no_log: false
  run_once: false
  order: inventory

  vars:
    app_version: "1.8.0"
    app_port: "8001"
    db_password: "AuthP@ssw0rd"
    jwt_secret: "xK9mPqR7vL2nW5jF8hT3yB6cD4gA1sE"

  tasks:
    - name: Install Python dependencies
      ansible.builtin.pip:
        requirements: /opt/ridgeline/{{ app_name | default('app') }}/requirements.txt
        virtualenv: /opt/ridgeline/{{ app_name | default('app') }}/venv
        state: present
        editable: false
        break_system_packages: false
        virtualenv_site_packages: false
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: false

    - name: Deploy templated configuration
      ansible.builtin.template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "0644"
        backup: false
        follow: false
        force: true
        lstrip_blocks: false
        trim_blocks: true
        unsafe_writes: false
        output_encoding: utf-8
      loop:
        - { src: "templates/app.conf.j2", dest: "/etc/ridgeline/app.conf" }
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: false

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service_name | default('ridgeline') }}"
        state: started
        enabled: true
        daemon_reload: false
        daemon_reexec: false
        no_block: false
        scope: system
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: false

    - name: Wait for service to be ready
      ansible.builtin.wait_for:
        port: "{{ app_port | default('8000') }}"
        host: 127.0.0.1
        connect_timeout: 5
        delay: 0
        sleep: 1
        state: started
        timeout: 300
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: false

    - name: Verify service health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port | default('8000') }}/health"
        method: GET
        follow_redirects: safe
        force: false
        force_basic_auth: false
        return_content: false
        timeout: 30
        use_proxy: true
        validate_certs: true
        status_code: 200
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: false

  handlers:
    - name: restart_auth_service
      ansible.builtin.systemd:
        name: "{{ service_name | default('ridgeline') }}"
        state: restarted
        daemon_reload: false
        daemon_reexec: false
        no_block: false
        scope: system
