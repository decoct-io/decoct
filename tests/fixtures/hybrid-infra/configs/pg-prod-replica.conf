# PostgreSQL Configuration — replica (prod)
# Ridgeline Data — pg-prod-replica
# Server: db-prod-replica

# ── Connection Settings ────────────────────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200
reserved_connections = 0
superuser_reserved_connections = 3
bonjour = off
tcp_keepalives_idle = 0
tcp_keepalives_interval = 0
tcp_keepalives_count = 0
tcp_user_timeout = 0
client_connection_check_interval = 0

# ── Authentication ─────────────────────────────────────────────────────────────
authentication_timeout = 1min
password_encryption = scram-sha-256
scram_iterations = 4096
krb_caseins_users = off
gss_accept_delegation = off

# ── SSL ────────────────────────────────────────────────────────────────────────
ssl = off
ssl_prefer_server_ciphers = on
ssl_min_protocol_version = TLSv1.2
ssl_passphrase_command_supports_reload = off

# ── Memory ─────────────────────────────────────────────────────────────────────
shared_buffers = 256MB
huge_pages = try
huge_page_size = 0
temp_buffers = 8MB
max_prepared_transactions = 0
work_mem = 4MB
hash_mem_multiplier = 2.0
maintenance_work_mem = 64MB
autovacuum_work_mem = -1
vacuum_buffer_usage_limit = 2MB
logical_decoding_work_mem = 64MB
max_stack_depth = 2MB
temp_file_limit = -1
max_files_per_process = 1000

# ── Cost-Based Vacuum Delay ───────────────────────────────────────────────────
vacuum_cost_delay = 0
vacuum_cost_page_hit = 1
vacuum_cost_page_miss = 2
vacuum_cost_page_dirty = 20
vacuum_cost_limit = 200

# ── Background Writer ─────────────────────────────────────────────────────────
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# ── Asynchronous Behaviour ────────────────────────────────────────────────────
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2
max_parallel_workers = 8
parallel_leader_participation = on
backend_flush_after = 0

# ── WAL Settings ──────────────────────────────────────────────────────────────
wal_level = replica
fsync = on
synchronous_commit = on
full_page_writes = on
wal_log_hints = off
wal_compression = off
wal_init_zero = on
wal_recycle = on
wal_buffers = -1
wal_writer_delay = 200ms
wal_writer_flush_after = 1MB
wal_skip_threshold = 2MB
commit_delay = 0
commit_siblings = 5

# ── Checkpoints ───────────────────────────────────────────────────────────────
checkpoint_timeout = 5min
checkpoint_completion_target = 0.9
checkpoint_warning = 30s
max_wal_size = 1GB
min_wal_size = 80MB

# ── Archiving ─────────────────────────────────────────────────────────────────
archive_mode = off
archive_timeout = 0

# ── Replication — Sending ─────────────────────────────────────────────────────
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 0
max_slot_wal_keep_size = -1
wal_sender_timeout = 60s
track_commit_timestamp = off

# ── Replication — Standby ─────────────────────────────────────────────────────
hot_standby = on
max_standby_archive_delay = 30s
max_standby_streaming_delay = 30s
wal_receiver_create_temp_slot = off
wal_receiver_status_interval = 10s
hot_standby_feedback = off
wal_receiver_timeout = 60s
wal_retrieve_retry_interval = 5s
recovery_min_apply_delay = 0
sync_replication_slots = off

# ── Replication — Subscribers ─────────────────────────────────────────────────
max_logical_replication_workers = 4
max_sync_workers_per_subscription = 2
max_parallel_apply_workers_per_subscription = 2

# ── Planner Cost Constants ────────────────────────────────────────────────────
seq_page_cost = 1.0
random_page_cost = 4.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025
parallel_setup_cost = 1000
parallel_tuple_cost = 0.1
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 512kB
effective_cache_size = 4GB
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000

# ── Genetic Query Optimiser ───────────────────────────────────────────────────
geqo = on
geqo_threshold = 12
geqo_effort = 5
geqo_pool_size = 0
geqo_generations = 0
geqo_selection_bias = 2.0
geqo_seed = 0

# ── Other Planner Options ────────────────────────────────────────────────────
default_statistics_target = 100
constraint_exclusion = partition
cursor_tuple_fraction = 0.1
from_collapse_limit = 8
jit = on
join_collapse_limit = 8
plan_cache_mode = auto
recursive_worktable_factor = 10.0
enable_partitionwise_join = off
enable_partitionwise_aggregate = off

# ── Logging — Where ──────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_file_mode = 0600
syslog_facility = LOCAL0
syslog_ident = postgres
syslog_sequence_numbers = on
syslog_split_messages = on

# ── Logging — When ───────────────────────────────────────────────────────────
log_min_messages = WARNING
log_min_error_statement = ERROR
log_min_duration_statement = -1
log_min_duration_sample = -1
log_statement_sample_rate = 1.0
log_transaction_sample_rate = 0
log_startup_progress_interval = 10s

# ── Logging — What ───────────────────────────────────────────────────────────
log_autovacuum_min_duration = 10min
log_checkpoints = on
log_connections = off
log_disconnections = off
log_duration = off
log_error_verbosity = DEFAULT
log_hostname = off
log_lock_waits = off
log_recovery_conflict_waits = off
log_parameter_max_length = -1
log_parameter_max_length_on_error = 0
log_statement = 'none'
log_replication_commands = off
log_temp_files = -1
log_timezone = 'GMT'
log_rotation_age = 24h
log_rotation_size = 10MB
log_truncate_on_rotation = off

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_insert_threshold = 1000
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_vacuum_insert_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = -1

# ── WAL Recovery ──────────────────────────────────────────────────────────────
recovery_prefetch = try
wal_decode_buffer_size = 512kB
recovery_target_inclusive = on
recovery_target_timeline = latest
recovery_target_action = pause

# ── WAL Summarisation ─────────────────────────────────────────────────────────
summarize_wal = off
