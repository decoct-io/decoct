# Docker Compose — compose-monitoring-prod
# Ridgeline Data — B2B Analytics Platform

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    restart: "unless-stopped"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    ports:
      - "9090:9090"
    volumes:
      - /opt/ridgeline/prometheus:/etc/prometheus
      - prom-data:/prometheus
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 15s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 2g
    cpus: 1.0
  grafana:
    image: grafana/grafana:10.4.0
    restart: "unless-stopped"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "Gr@fanaAdm1n!"
      GF_SERVER_ROOT_URL: "https://grafana.ridgeline.io"
    volumes:
      - grafana-data:/var/lib/grafana
    labels:
      traefik.enable: "true"
      traefik.http.routers.grafana.rule: "Host(`grafana.ridgeline.io`)"
    networks:
      - monitoring
      - edge-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 15s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 1g
    cpus: 0.5
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: "unless-stopped"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    ports:
      - "9093:9093"
    environment:
      SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/T00000/B00000/xxxxxxxxxxxx"
    volumes:
      - /opt/ridgeline/alertmanager:/etc/alertmanager
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 0s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 256m
    cpus: 0.25

networks:
  monitoring:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false
  edge-network:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false

volumes:
  prom-data:
    external: false
  grafana-data:
    external: false
