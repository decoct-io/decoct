---
# Base Server Provisioning
# Ridgeline Data — ansible-base-server

- name: Base Server Provisioning
  hosts: all
  become: true
  become_user: root
  gather_facts: true
  any_errors_fatal: false
  ignore_errors: false
  check_mode: false
  no_log: false
  run_once: false
  order: inventory

  vars:
    packages: "htop"

  tasks:
    - name: Install packages via apt
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
        update_cache: false
        force: false
        purge: false
        autoremove: false
        autoclean: false
        only_upgrade: false
        force_apt_get: false
        allow_unauthenticated: false
        allow_downgrade: false
        fail_on_autoremove: false
        lock_timeout: 60
        cache_valid_time: 0
      loop:
        - htop
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: true

    - name: Create application user
      ansible.builtin.user:
        name: ridgeline
        state: present
        system: false
        create_home: true
        append: false
        force: false
        generate_ssh_key: false
        move_home: false
        non_unique: false
        remove: false
        update_password: always
        shell: /bin/bash
        home: /opt/ridgeline
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: true

    - name: Copy configuration files
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: root
        group: root
        mode: "0644"
        backup: false
        decrypt: true
        follow: false
        force: true
        remote_src: false
        unsafe_writes: false
      loop:
        - { src: "files/config.conf", dest: "/etc/ridgeline/config.conf" }
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: true

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service_name | default('ridgeline') }}"
        state: started
        enabled: true
        daemon_reload: false
        daemon_reexec: false
        no_block: false
        scope: system
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: true

    - name: Set file permissions
      ansible.builtin.file:
        path: /opt/ridgeline
        state: directory
        owner: ridgeline
        group: ridgeline
        mode: "0755"
        follow: true
        force: false
        recurse: false
        unsafe_writes: false
      ignore_errors: false
      check_mode: false
      no_log: false
      run_once: false
      become: true

  handlers:
    - name: restart_sshd
      ansible.builtin.systemd:
        name: "{{ service_name | default('ridgeline') }}"
        state: restarted
        daemon_reload: false
        daemon_reexec: false
        no_block: false
        scope: system
