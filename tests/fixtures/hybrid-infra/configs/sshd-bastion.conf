# sshd_config — bastion (prod)
# Ridgeline Data — sshd-bastion

# ── Connection & Network ──────────────────────────────────────────────────────
Port 2222
AddressFamily inet
TCPKeepAlive yes
ClientAliveInterval 120
ClientAliveCountMax 2
LoginGraceTime 30
MaxAuthTries 3
MaxSessions 1
GatewayPorts no
PermitTunnel no

# ── Authentication ────────────────────────────────────────────────────────────
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
PermitEmptyPasswords no
KbdInteractiveAuthentication no
HostbasedAuthentication no
IgnoreRhosts yes
IgnoreUserKnownHosts no
KerberosAuthentication no
StrictModes yes

# ── Session & Environment ─────────────────────────────────────────────────────
PrintMotd no
PrintLastLog yes
PermitUserRC no
PermitUserEnvironment no

# ── Forwarding ────────────────────────────────────────────────────────────────
AllowTcpForwarding yes
AllowStreamLocalForwarding no
AllowAgentForwarding yes

# ── X11 ───────────────────────────────────────────────────────────────────────
X11Forwarding no
X11DisplayOffset 10
X11UseLocalhost yes

# ── Logging ───────────────────────────────────────────────────────────────────
LogLevel VERBOSE
SyslogFacility AUTH

# ── Crypto & Security ─────────────────────────────────────────────────────────
Compression no
FingerprintHash sha256
ExposeAuthInfo no

# ── Access Control ────────────────────────────────────────────────────────────
AllowUsers deploy ops
Banner /etc/ssh/banner.txt
