# Docker Compose — compose-cron-prod
# Ridgeline Data — B2B Analytics Platform

services:
  db-backup:
    image: ridgeline/db-backup:1.0.0
    restart: "no"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    command: /scripts/backup-all.sh
    environment:
      PGPASSWORD: "Sup3rS3cretDB"
      MYSQL_PWD: "M@riaDBr00t!"
      BACKUP_ENCRYPTION_KEY: "Bkup3ncryptK3y!"
    volumes:
      - /opt/ridgeline/backups:/backups
    networks:
      - app-network
    healthcheck:
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 0s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 2g
    cpus: 1.0
  log-rotator:
    image: ridgeline/log-rotator:1.0.0
    restart: "no"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    command: /scripts/rotate-logs.sh
    volumes:
      - /var/log/ridgeline:/logs
    networks:
      - app-network
    healthcheck:
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 0s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 256m
    cpus: 0.1

networks:
  app-network:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false

