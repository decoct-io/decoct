# Ridgeline Legacy Dashboard (Flask)
# Ridgeline Data — systemd-legacy-dashboard

[Unit]
Description=Ridgeline Legacy Dashboard (Flask)
After=network.target mariadb.service
Wants=mariadb.service

[Service]
Type=simple
WorkingDirectory=/opt/ridgeline/legacy-dashboard
User=ridgeline
Group=ridgeline
ExecStart=/opt/ridgeline/legacy-dashboard/venv/bin/gunicorn -w 4 -b 0.0.0.0:5000 dashboard.app:app
Restart=always
RestartSec=5
TimeoutStartSec=60
TimeoutStopSec=30
Environment="DATABASE_URL=mysql://legacy:L3gacyDBp@ss@db-legacy-01:3306/dashboard"
Environment="SECRET_KEY=flask-s3cret-k3y-d0nt-t3ll"
LimitNOFILE=65535
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
