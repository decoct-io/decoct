# Ridgeline Billing API Service
# Ridgeline Data — systemd-billing-api

[Unit]
Description=Ridgeline Billing API Service
After=network.target mariadb.service
Wants=mariadb.service

[Service]
Type=simple
WorkingDirectory=/opt/ridgeline/billing-api
User=ridgeline
Group=ridgeline
ExecStart=/opt/ridgeline/billing-api/venv/bin/uvicorn billing.main:app --host 0.0.0.0 --port 8002
Restart=on-failure
RestartSec=5
TimeoutStartSec=90
TimeoutStopSec=90
Environment="DATABASE_URL=mysql://billing:B1llingS3cret@db-legacy-01:3306/billing"
Environment="STRIPE_API_KEY=sk_live_4eC39HqLyjWDarjtT1zdp7dc"
LimitNOFILE=65535
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
