# Ridgeline DB Backup Service
# Ridgeline Data — systemd-backup-svc

[Unit]
Description=Ridgeline DB Backup Service
After=postgresql.service

[Service]
Type=oneshot
WorkingDirectory=/opt/ridgeline/scripts
User=root
Group=root
ExecStart=/opt/ridgeline/scripts/backup-all-dbs.sh
TimeoutStartSec=600
TimeoutStopSec=120
RemainAfterExit=yes
Environment="BACKUP_ENCRYPTION_KEY=Bkup3ncryptK3y!"
LimitNOFILE=65535
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
