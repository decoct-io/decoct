---
# Ansible Inventory — prod
# Ridgeline Data — ansible-inventory-prod

all:
  vars:
    ansible_user: deploy
    ntp_server: ntp.ubuntu.com
    dns_servers:
      - 8.8.8.8
      - 8.8.4.4

  children:
    app_servers:
      hosts:
        app-prod-01:
          ansible_host: app-prod-01.ridgeline.internal
        app-prod-02:
          ansible_host: app-prod-02.ridgeline.internal
        app-prod-03:
          ansible_host: app-prod-03.ridgeline.internal

    web_servers:
      hosts:
        app-prod-02:
          ansible_host: app-prod-02.ridgeline.internal

    db_servers:
      hosts:
        db-prod-01:
          ansible_host: db-prod-01.ridgeline.internal
        db-prod-02:
          ansible_host: db-prod-02.ridgeline.internal
        db-prod-03:
          ansible_host: db-prod-03.ridgeline.internal

    legacy_db_servers:
      hosts:
        db-legacy-01:
          ansible_host: db-legacy-01.ridgeline.internal

    edge_servers:
      hosts:
        edge-prod-01:
          ansible_host: edge-prod-01.ridgeline.internal

    monitoring_servers:
      hosts:
        mon-prod-01:
          ansible_host: mon-prod-01.ridgeline.internal

    worker_servers:
      hosts:
        worker-prod-01:
          ansible_host: worker-prod-01.ridgeline.internal
