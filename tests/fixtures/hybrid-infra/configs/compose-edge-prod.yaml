# Docker Compose — compose-edge-prod
# Ridgeline Data — B2B Analytics Platform

services:
  traefik:
    image: traefik:v3.0
    restart: "always"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      TRAEFIK_API_KEY: "Tr@efikAPI_K3y"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/ridgeline/traefik:/etc/traefik
      - acme-data:/acme
    networks:
      - edge-network
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 10s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 512m
    cpus: 0.5
  docs-site:
    image: ridgeline/docs-site:latest
    restart: "no"
    privileged: false
    read_only: true
    stdin_open: false
    tty: false
    init: false
    ports:
      - "8080:80"
    volumes:
      - docs-html:/usr/share/nginx/html:ro
    labels:
      traefik.enable: "true"
      traefik.http.routers.docs.rule: "Host(`docs.ridgeline.io`)"
    networks:
      - edge-network
    healthcheck:
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 0s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 128m
    cpus: 0.1

networks:
  edge-network:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false
  app-network:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false

volumes:
  acme-data:
    external: false
  docs-html:
    external: false
