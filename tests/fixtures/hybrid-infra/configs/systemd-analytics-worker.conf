# Ridgeline Analytics Worker
# Ridgeline Data — systemd-analytics-worker

[Unit]
Description=Ridgeline Analytics Worker
After=network.target redis.service
Wants=redis.service

[Service]
Type=simple
WorkingDirectory=/opt/ridgeline/analytics
User=ridgeline
Group=ridgeline
ExecStart=/opt/ridgeline/analytics/venv/bin/celery -A analytics.tasks worker --loglevel=info --concurrency=4
Restart=on-failure
RestartSec=10
TimeoutStartSec=120
TimeoutStopSec=120
Environment="DATABASE_URL=postgresql://analytics:An@lyticsDB@db-prod-03:5432/analytics"
Environment="REDIS_PASSWORD=R3disP@ss!"
LimitNOFILE=65535
LimitNPROC=8192

[Install]
WantedBy=multi-user.target
