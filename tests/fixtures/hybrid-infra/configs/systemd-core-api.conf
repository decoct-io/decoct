# Ridgeline Core API Service
# Ridgeline Data — systemd-core-api

[Unit]
Description=Ridgeline Core API Service
After=network.target postgresql.service
Wants=postgresql.service

[Service]
Type=simple
WorkingDirectory=/opt/ridgeline/core-api
User=ridgeline
Group=ridgeline
ExecStart=/opt/ridgeline/core-api/venv/bin/uvicorn core_api.main:app --host 0.0.0.0 --port 8000
Restart=on-failure
RestartSec=5
TimeoutStartSec=90
TimeoutStopSec=90
Environment="DATABASE_URL=postgresql://core:Sup3rS3cretDB@db-prod-01:5432/core"
LimitNOFILE=65535
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
