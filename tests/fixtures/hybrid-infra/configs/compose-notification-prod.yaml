# Docker Compose — compose-notification-prod
# Ridgeline Data — B2B Analytics Platform

services:
  notification-svc:
    image: ridgeline/notification-svc:1.2.0
    restart: "always"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    ports:
      - "8003:8003"
    environment:
      SMTP_HOST: "smtp.sendgrid.net"
      SMTP_PASSWORD: "SmtpP@ss123"
      SENDGRID_API_KEY: "SG.xxxxxxxxxxxxxxxxx"
      TWILIO_AUTH_TOKEN: "tw_auth_t0ken_secret"
    depends_on:
      redis:
        condition: service_started
        required: true
        restart: true
    labels:
      traefik.enable: "true"
      traefik.http.routers.notif.rule: "Host(`notify.ridgeline.io`)"
    networks:
      - app-network
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 10s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 2
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 512m
    cpus: 0.5
  redis:
    image: redis:7-alpine
    restart: "unless-stopped"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    environment:
      REDIS_PASSWORD: "R3disP@ss!"
    volumes:
      - redis-notif-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 0s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 256m
    cpus: 0.25

networks:
  app-network:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false
  monitoring:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false

volumes:
  redis-notif-data:
    external: false
