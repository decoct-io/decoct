# Docker Compose — compose-app-prod-03
# Ridgeline Data — B2B Analytics Platform

services:
  admin-panel:
    image: ridgeline/admin-panel:1.0.0
    restart: "always"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    ports:
      - "8005:8005"
    environment:
      DATABASE_URL: "postgresql://admin:Adm1nDBp@ss@db-prod-01:5432/admin"
      ADMIN_SECRET: "Adm1nS3cretK3y"
    labels:
      traefik.enable: "true"
      traefik.http.routers.admin.rule: "Host(`admin.ridgeline.io`)"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8005/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 0s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 512m
    cpus: 0.25
  legacy-dashboard:
    image: ridgeline/legacy-dashboard:latest
    restart: "always"
    privileged: false
    read_only: false
    stdin_open: false
    tty: false
    init: false
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "mysql://legacy:L3gacyDBp@ss@db-legacy-01:3306/dashboard"
      SECRET_KEY: "flask-s3cret-k3y-d0nt-t3ll"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 0s
      start_interval: 5s
    logging:
      driver: json-file
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        max_attempts: 0
      update_config:
        parallelism: 1
        order: stop-first
      rollback_config:
        parallelism: 1
        order: stop-first
    mem_limit: 1g
    cpus: 0.5

networks:
  app-network:
    driver: bridge
    external: false
    internal: false
    attachable: false
    enable_ipv6: false

