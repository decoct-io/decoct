# Ridgeline Report Generator
# Ridgeline Data — systemd-report-gen-svc

[Unit]
Description=Ridgeline Report Generator
After=postgresql.service

[Service]
Type=oneshot
WorkingDirectory=/opt/ridgeline/report-gen
User=ridgeline
Group=ridgeline
ExecStart=/opt/ridgeline/report-gen/venv/bin/python -m report_gen.main
TimeoutStartSec=300
TimeoutStopSec=60
RemainAfterExit=yes
Environment="DATABASE_URL=postgresql://reports:R3portDB@db-prod-01:5432/reports"
LimitNOFILE=65535
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
