# Ridgeline Auth Service
# Ridgeline Data — systemd-auth-service

[Unit]
Description=Ridgeline Auth Service
After=network.target postgresql.service
Wants=postgresql.service

[Service]
Type=simple
WorkingDirectory=/opt/ridgeline/auth-service
User=ridgeline
Group=ridgeline
ExecStart=/opt/ridgeline/auth-service/venv/bin/uvicorn auth_svc.main:app --host 0.0.0.0 --port 8001
Restart=always
RestartSec=10
TimeoutStartSec=90
TimeoutStopSec=90
Environment="DATABASE_URL=postgresql://auth:AuthP@ssw0rd@db-prod-01:5432/auth"
Environment="JWT_SECRET=xK9mPqR7vL2nW5jF8hT3"
LimitNOFILE=65535
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
