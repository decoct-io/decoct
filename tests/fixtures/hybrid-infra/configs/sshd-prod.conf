# sshd_config — production (prod)
# Ridgeline Data — sshd-prod

# ── Connection & Network ──────────────────────────────────────────────────────
Port 22
AddressFamily any
TCPKeepAlive yes
ClientAliveInterval 300
ClientAliveCountMax 3
LoginGraceTime 60
MaxAuthTries 3
MaxSessions 2
GatewayPorts no
PermitTunnel no

# ── Authentication ────────────────────────────────────────────────────────────
PermitRootLogin no
PasswordAuthentication no
PubkeyAuthentication yes
PermitEmptyPasswords no
KbdInteractiveAuthentication no
HostbasedAuthentication no
IgnoreRhosts yes
IgnoreUserKnownHosts no
KerberosAuthentication no
StrictModes yes

# ── Session & Environment ─────────────────────────────────────────────────────
PrintMotd no
PrintLastLog yes
PermitUserRC no
PermitUserEnvironment no

# ── Forwarding ────────────────────────────────────────────────────────────────
AllowTcpForwarding no
AllowStreamLocalForwarding no
AllowAgentForwarding no

# ── X11 ───────────────────────────────────────────────────────────────────────
X11Forwarding no
X11DisplayOffset 10
X11UseLocalhost yes

# ── Logging ───────────────────────────────────────────────────────────────────
LogLevel VERBOSE
SyslogFacility AUTH

# ── Crypto & Security ─────────────────────────────────────────────────────────
Compression no
FingerprintHash sha256
ExposeAuthInfo no

# ── Access Control ────────────────────────────────────────────────────────────
AllowUsers deploy ops admins
Banner /etc/ssh/banner.txt
