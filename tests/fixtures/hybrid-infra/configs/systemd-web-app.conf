# Ridgeline Web App (Node.js SSR)
# Ridgeline Data — systemd-web-app

[Unit]
Description=Ridgeline Web App (Node.js SSR)
After=network.target

[Service]
Type=simple
WorkingDirectory=/opt/ridgeline/web-app
User=ridgeline
Group=ridgeline
ExecStart=/usr/bin/node /opt/ridgeline/web-app/server.js
Restart=on-failure
RestartSec=5
TimeoutStartSec=30
TimeoutStopSec=30
Environment="NODE_ENV=production"
Environment="PORT=3000"
LimitNOFILE=65535
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
