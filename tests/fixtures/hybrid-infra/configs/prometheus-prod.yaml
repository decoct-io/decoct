# ── Remote Write ───────────────────────────────────────────────────────────────
remote_write:
  - url: http://remote-write.ridgeline.io/api/v1/write
    remote_timeout: 30s
    send_exemplars: false
    send_native_histograms: false
    follow_redirects: true
    enable_http2: false
    queue_config:
      capacity: 10000
      max_shards: 50
      min_shards: 1
      max_samples_per_send: 2000
      batch_send_deadline: 5s
      min_backoff: 30ms
      max_backoff: 5s
      retry_on_http_429: false
    metadata_config:
      send: true
      send_interval: 1m
      max_samples_per_send: 2000
