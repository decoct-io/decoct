# Prometheus Configuration — prod
# Ridgeline Data — prometheus-prod

# ── Global ─────────────────────────────────────────────────────────────────────
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  body_size_limit: 0
  sample_limit: 0
  label_limit: 0
  label_name_length_limit: 0
  label_value_length_limit: 0
  target_limit: 0
  keep_dropped_targets: 0
  scrape_native_histograms: false
  external_labels:
    env: prod
    cluster: ridgeline-prod

# ── Rule Files ─────────────────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/rules/*.yaml"

# ── Alerting ───────────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - scheme: http
      timeout: 10s
      api_version: v2
      follow_redirects: true
      enable_http2: true
      static_configs:
        - targets:
            - mon-prod-01:9093

# ── Scrape Configs ─────────────────────────────────────────────────────────────
scrape_configs:
  - job_name: prometheus
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    honor_labels: false
    honor_timestamps: true
    track_timestamps_staleness: false
    enable_compression: true
    follow_redirects: true
    enable_http2: true
    body_size_limit: 0
    sample_limit: 0
    label_limit: 0
    label_name_length_limit: 0
    label_value_length_limit: 0
    target_limit: 0
    keep_dropped_targets: 0
    static_configs:
      - targets:
