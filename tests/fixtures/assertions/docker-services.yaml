assertions:
  - id: docker-no-latest
    assert: Image tags must be pinned to specific versions
    match:
      path: services.*.image
      pattern: "^(?!.*:latest$)"
    rationale: Pinned versions ensure reproducible deployments
    severity: must
    example: "nginx:1.25.3"

  - id: docker-healthcheck
    assert: All application containers must have health checks
    rationale: Health checks enable proper orchestration and monitoring
    severity: must
    source: Enable infrastructure standards

  - id: docker-logging
    assert: Containers should use json-file logging with size limits
    match:
      path: services.*.logging.driver
      value: json-file
    rationale: Consistent logging prevents disk exhaustion
    severity: should
    related:
      - docker-healthcheck
