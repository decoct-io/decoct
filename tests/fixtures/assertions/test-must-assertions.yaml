assertions:
  - id: logging-driver
    assert: Containers must use json-file logging driver
    match:
      path: services.*.logging.driver
      value: json-file
    rationale: Consistent logging
    severity: must

  - id: restart-policy
    assert: Containers must use unless-stopped restart policy
    match:
      path: services.*.restart
      value: unless-stopped
    rationale: Proper restart behavior
    severity: must

  - id: no-latest
    assert: Image tags must not use latest
    match:
      path: services.*.image
      pattern: "^(?!.*:latest$)"
    rationale: Reproducible deployments
    severity: must

  - id: healthcheck-required
    assert: All containers should have health checks
    rationale: Monitoring
    severity: should
