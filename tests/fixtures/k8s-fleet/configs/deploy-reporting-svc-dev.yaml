# Kubernetes Deployment — reporting-svc (dev)
# WavePoint Financial — deploy-reporting-svc-dev
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-svc
  namespace: wavepoint-dev
  labels:
    app: reporting-svc
    env: dev
    team: platform
    version: "1.5.0-dev"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/ephemeral: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: reporting-svc
      env: dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: reporting-svc
        env: dev
        version: "1.5.0-dev"
    spec:
      serviceAccountName: reporting-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: reporting-svc
          image: registry.wavepoint.io/reporting-svc:1.5.0-dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          env:
            - name: APP_ENV
              value: "dev"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SERVICE_NAME
              value: "reporting-svc"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://report_user:D3vRpt@db-dev.wavepoint.internal:5432/reporting_dev"
            - name: REPORT_BUCKET
              value: "dev-reports"
            - name: SCHEDULE
              value: "0 */2 * * *"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: reporting-svc-config
