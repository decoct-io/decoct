# Kubernetes Deployment — ledger-svc (dev)
# WavePoint Financial — deploy-ledger-svc-dev
apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: ledger-svc
  namespace: wavepoint-dev
  labels:
    app: ledger-svc
    env: dev
    team: platform
    version: "3.1.0-dev"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/ephemeral: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ledger-svc
      env: dev
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ledger-svc
        env: dev
        version: "3.1.0-dev"
    spec:
      serviceAccountName: ledger-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: ledger-svc
          image: registry.wavepoint.io/ledger-svc:3.1.0-dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          env:
            - name: APP_ENV
              value: "dev"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SERVICE_NAME
              value: "ledger-svc"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://ledger_user:D3vL3dg#r@db-dev.wavepoint.internal:5432/ledger_dev"
            - name: DB_POOL_SIZE
              value: "50"
            - name: CONSISTENCY_MODE
              value: "eventual"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: ledger-svc-config
