# Kubernetes NetworkPolicy — allow-payment (prod)
# WavePoint Financial — netpol-allow-payment-prod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-payment
  namespace: wavepoint-prod
  labels:
    app.kubernetes.io/name: allow-payment
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    networkpolicy.kubernetes.io/managed-by: gitops
    wavepoint.io/compliance: pci-dss
spec:
  podSelector:
    matchLabels:
      app: payment-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway-api
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app: risk-engine
      ports:
        - protocol: TCP
          port: 8080
