# Kubernetes Deployment — auth-svc (staging)
# WavePoint Financial — deploy-auth-svc-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-svc
  namespace: wavepoint-staging
  labels:
    app: auth-svc
    env: staging
    team: platform
    version: "1.8.2"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: auth-svc
      env: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: auth-svc
        env: staging
        version: "1.8.2"
    spec:
      serviceAccountName: auth-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: auth-svc
          image: registry.wavepoint.io/auth-svc:1.8.2
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "auth-svc"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://auth_user:St4g1ng#Pw@db-staging.wavepoint.internal:5432/auth_stg"
            - name: API_KEY
              value: "sk_stg_auth_Jk5mNx8wPq2r"
            - name: DB_POOL_SIZE
              value: "50"
            - name: OAUTH_PROVIDER
              value: "staging-keycloak"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: auth-svc-config
