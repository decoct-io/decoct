# Kubernetes NetworkPolicy — default-deny (staging)
# WavePoint Financial — netpol-default-deny-staging
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: wavepoint-staging
  labels:
    app.kubernetes.io/name: default-deny
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    networkpolicy.kubernetes.io/managed-by: gitops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
