# Kubernetes Deployment — payment-api (prod)
# WavePoint Financial — deploy-payment-api-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: wavepoint-prod
  labels:
    app: payment-api
    env: prod
    team: platform
    version: "2.3.0"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/pci-scope: "true"
    wavepoint.io/oncall-team: payments-platform
spec:
  replicas: 5
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: payment-api
      env: prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: payment-api
        env: prod
        version: "2.3.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      nodeSelector:
        tier: compute
      tolerations:
        - key: high-cpu
          operator: Exists
          effect: true:NoSchedule
      serviceAccountName: payment-api
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: payment-api
      containers:
        - name: payment-api
          image: registry.wavepoint.io/payment-api:2.3.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "prod"
            - name: LOG_LEVEL
              value: "WARN"
            - name: SERVICE_NAME
              value: "payment-api"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://pay_user:Kx9mPqR7vL2n@db-prod-primary.wavepoint.internal:5432/payments"
            - name: API_KEY
              value: "sk_prod_pay_Yp6cD4gA1sE9"
            - name: JWT_SECRET
              value: "jwt_prod_Hf7gB2kL9mNx"
            - name: DB_POOL_SIZE
              value: "50"
            - name: ENABLE_SANDBOX
              value: "false"
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: payment-api-config
        - name: tls-certs
          secret:
            secretName: payment-api-tls
