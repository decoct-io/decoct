# Kubernetes Ingress — healthcheck (prod)
# WavePoint Financial — ingress-healthcheck-prod
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcheck-ingress
  namespace: wavepoint-prod
  labels:
    app.kubernetes.io/name: healthcheck-ingress
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRule REQUEST_HEADERS:Content-Type "text/plain" "id:1,phase:1,deny,status:403"
    nginx.ingress.kubernetes.io/server-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Strict-Transport-Security: max-age=63072000";
spec:
  tls:
    - hosts:
        - health.wavepoint.io
      secretName: prod-tls-secret
  rules:
    - host: health.wavepoint.io
      http:
        paths:
          - path: /status/*
            pathType: Prefix
            backend:
              service:
                name: healthcheck-api
                port:
                  number: 80
