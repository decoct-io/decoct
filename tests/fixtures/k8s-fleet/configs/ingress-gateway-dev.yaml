# Kubernetes Ingress — gateway (dev)
# WavePoint Financial — ingress-gateway-dev
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gateway-ingress
  namespace: wavepoint-dev
  labels:
    app.kubernetes.io/name: gateway-ingress
    env: dev
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: gateway.dev.wavepoint.internal
      http:
        paths:
          - path: /api/*
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 80
          - path: /auth/*
            pathType: Prefix
            backend:
              service:
                name: auth-svc
                port:
                  number: 80
