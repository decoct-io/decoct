# Kubernetes Deployment — audit-log (dev)
# WavePoint Financial — deploy-audit-log-dev
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-log
  namespace: wavepoint-dev
  labels:
    app: audit-log
    env: dev
    team: platform
    version: "1.0.3-dev"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/ephemeral: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: audit-log
      env: dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: audit-log
        env: dev
        version: "1.0.3-dev"
    spec:
      serviceAccountName: audit-log
      terminationGracePeriodSeconds: 30
      containers:
        - name: audit-log
          image: registry.wavepoint.io/audit-log:1.0.3-dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP
          env:
            - name: APP_ENV
              value: "dev"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SERVICE_NAME
              value: "audit-log"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://audit_user:D3vAud1t@db-dev.wavepoint.internal:5432/audit_dev"
            - name: RETENTION_DAYS
              value: "30"
            - name: COMPRESSION
              value: "false"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: audit-log-config
