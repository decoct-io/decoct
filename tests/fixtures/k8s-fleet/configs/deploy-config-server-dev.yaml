# Kubernetes Deployment — config-server (dev)
# WavePoint Financial — deploy-config-server-dev
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: wavepoint-dev
  labels:
    app: config-server
    env: dev
    team: platform
    version: "1.3.0-dev"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/ephemeral: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: config-server
      env: dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: config-server
        env: dev
        version: "1.3.0-dev"
    spec:
      serviceAccountName: config-server
      terminationGracePeriodSeconds: 30
      containers:
        - name: config-server
          image: registry.wavepoint.io/config-server:1.3.0-dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8888
              protocol: TCP
          env:
            - name: APP_ENV
              value: "dev"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SERVICE_NAME
              value: "config-server"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GIT_REPO
              value: "https://github.com/wavepoint/config-repo.git"
            - name: GIT_BRANCH
              value: "dev"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: config-server-config
