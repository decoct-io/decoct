# Kubernetes Service — rate-limiter (prod)
# WavePoint Financial — svc-rate-limiter-prod
apiVersion: v1
kind: Service
metadata:
  name: rate-limiter
  namespace: wavepoint-prod
  labels:
    app: rate-limiter
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    service.kubernetes.io/topology-aware-hints: auto
spec:
  type: ClusterIP
  selector:
    app: rate-limiter
    env: prod
  sessionAffinity: None
  ports:
    - name: http
      protocol: TCP
      port: 6379
      targetPort: 6379
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
