# Kubernetes Ingress — payment (staging)
# WavePoint Financial — ingress-payment-staging
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: payment-ingress
  namespace: wavepoint-staging
  labels:
    app.kubernetes.io/name: payment-ingress
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - payment.staging.wavepoint.io
      secretName: staging-tls-secret
  rules:
    - host: payment.staging.wavepoint.io
      http:
        paths:
          - path: /v1/*
            pathType: Prefix
            backend:
              serviceName: payment-api
              servicePort: 80
          - path: /webhooks/*
            pathType: Prefix
            backend:
              serviceName: payment-api
              servicePort: 80
