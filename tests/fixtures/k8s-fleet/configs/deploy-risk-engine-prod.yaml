# Kubernetes Deployment — risk-engine (prod)
# WavePoint Financial — deploy-risk-engine-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: wavepoint-prod
  labels:
    app: risk-engine
    env: prod
    team: platform
    version: "0.8.1"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/pci-scope: "true"
    wavepoint.io/oncall-team: payments-platform
spec:
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: risk-engine
      env: prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: risk-engine
        env: prod
        version: "0.8.1"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: /metrics
    spec:
      nodeSelector:
        tier: compute
      tolerations:
        - key: high-cpu
          operator: Exists
          effect: true:NoSchedule
      serviceAccountName: risk-engine
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: risk-engine
      containers:
        - name: risk-engine
          image: registry.wavepoint.io/risk-engine:0.8.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "prod"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SERVICE_NAME
              value: "risk-engine"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://risk_user:PrdR1sk#Xm9@db-prod-primary.wavepoint.internal:5432/risk"
            - name: API_KEY
              value: "sk_prod_risk_Yp9cD2gA"
            - name: MODEL_VERSION
              value: "v2.0"
            - name: SCORE_THRESHOLD
              value: "0.8"
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: risk-engine-config
        - name: tls-certs
          secret:
            secretName: risk-engine-tls
