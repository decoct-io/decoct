# Kubernetes ServiceAccount — payment-api (dev)
# WavePoint Financial — sa-payment-api-dev
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-api
  namespace: wavepoint-dev
  labels:
    app: payment-api
    env: dev
    team: platform
    part-of: wavepoint
    cost-center: "dev"
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::111111111111:role/dev-wildcard-role
    serviceaccount.kubernetes.io/managed-by: gitops
automountServiceAccountToken: true
