# Kubernetes Deployment — ledger-svc (staging)
# WavePoint Financial — deploy-ledger-svc-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-svc
  namespace: wavepoint-staging
  labels:
    app: ledger-svc
    env: staging
    team: platform
    version: "3.0.4"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ledger-svc
      env: staging
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ledger-svc
        env: staging
        version: "3.0.4"
    spec:
      serviceAccountName: ledger-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: ledger-svc
          image: registry.wavepoint.io/ledger-svc:3.0.4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "ledger-svc"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://ledger_user:StgL3dg#r@db-staging.wavepoint.internal:5432/ledger_stg"
            - name: DB_POOL_SIZE
              value: "50"
            - name: CONSISTENCY_MODE
              value: "strong"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: ledger-svc-config
