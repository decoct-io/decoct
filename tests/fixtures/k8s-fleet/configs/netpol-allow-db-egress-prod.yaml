# Kubernetes NetworkPolicy — allow-db-egress (prod)
# WavePoint Financial — netpol-allow-db-egress-prod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-egress
  namespace: wavepoint-prod
  labels:
    app.kubernetes.io/name: allow-db-egress
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    networkpolicy.kubernetes.io/managed-by: gitops
    wavepoint.io/compliance: pci-dss
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 5432
