# Kubernetes HorizontalPodAutoscaler — auth-svc (dev)
# WavePoint Financial — hpa-auth-svc-dev
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-svc-hpa
  namespace: wavepoint-dev
  labels:
    app: auth-svc
    env: dev
    team: platform
    part-of: wavepoint
  annotations:
    autoscaling.kubernetes.io/managed-by: gitops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-svc
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
