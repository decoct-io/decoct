# Kubernetes NetworkPolicy — allow-payment (staging)
# WavePoint Financial — netpol-allow-payment-staging
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-payment
  namespace: wavepoint-staging
  labels:
    app.kubernetes.io/name: allow-payment
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    networkpolicy.kubernetes.io/managed-by: gitops
spec:
  podSelector:
    matchLabels:
      app: payment-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway-api
      ports:
        - protocol: TCP
          port: 8080
