# Kubernetes ServiceAccount — auth-svc (prod)
# WavePoint Financial — sa-auth-svc-prod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-svc
  namespace: wavepoint-prod
  labels:
    app: auth-svc
    env: prod
    team: platform
    part-of: wavepoint
    cost-center: "identity"
    pci-scope: "true"
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::333333333333:role/prod-auth-svc-role
    serviceaccount.kubernetes.io/managed-by: gitops
    wavepoint.io/last-audit: "2026-01-15"
    wavepoint.io/compliance: pci-dss
automountServiceAccountToken: true
secrets:
  - name: auth-svc-token
imagePullSecrets:
  - name: registry-credentials
