# Kubernetes Service — payment-api (prod)
# WavePoint Financial — svc-payment-api-prod
apiVersion: v1
kind: Service
metadata:
  name: payment-api
  namespace: wavepoint-prod
  labels:
    app: payment-api
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    service.kubernetes.io/topology-aware-hints: auto
spec:
  type: ClusterIP
  selector:
    app: payment-api
    env: prod
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
