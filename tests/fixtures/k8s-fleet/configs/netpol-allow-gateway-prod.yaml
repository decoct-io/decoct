# Kubernetes NetworkPolicy — allow-gateway (prod)
# WavePoint Financial — netpol-allow-gateway-prod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway
  namespace: wavepoint-prod
  labels:
    app.kubernetes.io/name: allow-gateway
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    networkpolicy.kubernetes.io/managed-by: gitops
    wavepoint.io/compliance: pci-dss
spec:
  podSelector:
    matchLabels:
      app: gateway-api
  policyTypes:
    - Ingress
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 443
