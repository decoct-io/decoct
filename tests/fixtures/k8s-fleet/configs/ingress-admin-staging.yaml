# Kubernetes Ingress — admin (staging)
# WavePoint Financial — ingress-admin-staging
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: admin-ingress
  namespace: wavepoint-staging
  labels:
    app.kubernetes.io/name: admin-ingress
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "30"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - admin.staging.wavepoint.io
      secretName: staging-tls-secret
  rules:
    - host: admin.staging.wavepoint.io
      http:
        paths:
          - path: /admin/*
            pathType: Prefix
            backend:
              serviceName: gateway-api
              servicePort: 80
          - path: /dashboard/*
            pathType: Prefix
            backend:
              serviceName: reporting-svc
              servicePort: 80
