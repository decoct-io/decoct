# Kubernetes NetworkPolicy — default-deny (dev)
# WavePoint Financial — netpol-default-deny-dev
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: wavepoint-dev
  labels:
    app.kubernetes.io/name: default-deny
    env: dev
    team: platform
    part-of: wavepoint
  annotations:
    networkpolicy.kubernetes.io/managed-by: gitops
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
