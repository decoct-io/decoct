# Kubernetes ConfigMap — cors-config (prod)
# WavePoint Financial — cm-cors-config-prod
apiVersion: v1
kind: ConfigMap
metadata:
  name: cors-config
  namespace: wavepoint-prod
  labels:
    app.kubernetes.io/name: cors-config
    app.kubernetes.io/instance: cors-config-prod
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    configmap.kubernetes.io/managed-by: gitops
    wavepoint.io/change-control: required
data:
  ALLOWED_ORIGINS: "https://app.wavepoint.io"
  ALLOWED_METHODS: "GET"
