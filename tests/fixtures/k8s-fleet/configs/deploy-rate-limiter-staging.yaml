# Kubernetes Deployment — rate-limiter (staging)
# WavePoint Financial — deploy-rate-limiter-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter
  namespace: wavepoint-staging
  labels:
    app: rate-limiter
    env: staging
    team: platform
    version: "0.5.4"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: rate-limiter
      env: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: rate-limiter
        env: staging
        version: "0.5.4"
    spec:
      serviceAccountName: rate-limiter
      terminationGracePeriodSeconds: 30
      containers:
        - name: rate-limiter
          image: registry.wavepoint.io/rate-limiter:0.5.4
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 6379
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "rate-limiter"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_URL
              value: "redis://redis-staging.wavepoint.internal:6379/0"
            - name: ALGORITHM
              value: "sliding-window"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: rate-limiter-config
