# Kubernetes Service — gateway-api (staging)
# WavePoint Financial — svc-gateway-api-staging
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: wavepoint-staging
  labels:
    app: gateway-api
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    service.kubernetes.io/topology-aware-hints: auto
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: gateway-api
    env: staging
  sessionAffinity: None
  externalTrafficPolicy: Local
  healthCheckNodePort: 8080
  ports:
    - name: http
      protocol: TCP
      port: 443
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
