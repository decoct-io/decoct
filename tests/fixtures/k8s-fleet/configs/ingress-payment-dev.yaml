# Kubernetes Ingress — payment (dev)
# WavePoint Financial — ingress-payment-dev
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-ingress
  namespace: wavepoint-dev
  labels:
    app.kubernetes.io/name: payment-ingress
    env: dev
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: payment.dev.wavepoint.internal
      http:
        paths:
          - path: /v1/*
            pathType: Prefix
            backend:
              service:
                name: payment-api
                port:
                  number: 80
          - path: /webhooks/*
            pathType: Prefix
            backend:
              service:
                name: payment-api
                port:
                  number: 80
