# Kubernetes Deployment — audit-log (staging)
# WavePoint Financial — deploy-audit-log-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-log
  namespace: wavepoint-staging
  labels:
    app: audit-log
    env: staging
    team: platform
    version: "1.0.2"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: audit-log
      env: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: audit-log
        env: staging
        version: "1.0.2"
    spec:
      serviceAccountName: audit-log
      terminationGracePeriodSeconds: 30
      containers:
        - name: audit-log
          image: registry.wavepoint.io/audit-log:1.0.2
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "audit-log"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://audit_user:StgAud#3@db-staging.wavepoint.internal:5432/audit_stg"
            - name: RETENTION_DAYS
              value: "90"
            - name: COMPRESSION
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: audit-log-config
