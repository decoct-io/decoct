# Kubernetes Deployment — risk-engine (dev)
# WavePoint Financial — deploy-risk-engine-dev
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: wavepoint-dev
  labels:
    app: risk-engine
    env: dev
    team: platform
    version: "0.8.3-dev"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/ephemeral: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: risk-engine
      env: dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: risk-engine
        env: dev
        version: "0.8.3-dev"
    spec:
      serviceAccountName: risk-engine
      terminationGracePeriodSeconds: 30
      containers:
        - name: risk-engine
          image: registry.wavepoint.io/risk-engine:0.8.3-dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          env:
            - name: APP_ENV
              value: "dev"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SERVICE_NAME
              value: "risk-engine"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://risk_user:D3vR1sk@db-dev.wavepoint.internal:5432/risk_dev"
            - name: API_KEY
              value: "sk_dev_risk_Mn7pQx2rKv"
            - name: MODEL_VERSION
              value: "v2.1-experimental"
            - name: SCORE_THRESHOLD
              value: "0.5"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: risk-engine-config
