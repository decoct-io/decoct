# Kubernetes Deployment — risk-engine (staging)
# WavePoint Financial — deploy-risk-engine-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: wavepoint-staging
  labels:
    app: risk-engine
    env: staging
    team: platform
    version: "0.8.1"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: risk-engine
      env: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: risk-engine
        env: staging
        version: "0.8.1"
    spec:
      serviceAccountName: risk-engine
      terminationGracePeriodSeconds: 30
      containers:
        - name: risk-engine
          image: registry.wavepoint.io/risk-engine:0.8.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "risk-engine"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://risk_user:StgR1sk#4@db-staging.wavepoint.internal:5432/risk_stg"
            - name: API_KEY
              value: "sk_stg_risk_Wx8jT5hK"
            - name: MODEL_VERSION
              value: "v2.0"
            - name: SCORE_THRESHOLD
              value: "0.7"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: risk-engine-config
