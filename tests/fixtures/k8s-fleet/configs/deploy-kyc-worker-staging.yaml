# Kubernetes Deployment — kyc-worker (staging)
# WavePoint Financial — deploy-kyc-worker-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kyc-worker
  namespace: wavepoint-staging
  labels:
    app: kyc-worker
    env: staging
    team: platform
    version: "1.1.3"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: kyc-worker
      env: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kyc-worker
        env: staging
        version: "1.1.3"
    spec:
      serviceAccountName: kyc-worker
      terminationGracePeriodSeconds: 30
      containers:
        - name: kyc-worker
          image: registry.wavepoint.io/kyc-worker:1.1.3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "kyc-worker"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://kyc_user:StgKyc#3@db-staging.wavepoint.internal:5432/kyc_stg"
            - name: API_KEY
              value: "sk_stg_kyc_Pq6rS3vW"
            - name: QUEUE_URL
              value: "sqs://staging-kyc-queue"
            - name: BATCH_SIZE
              value: "10"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: kyc-worker-config
