# Kubernetes Deployment — gateway-api (prod)
# WavePoint Financial — deploy-gateway-api-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-api
  namespace: wavepoint-prod
  labels:
    app: gateway-api
    env: prod
    team: platform
    version: "4.0.2"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/pci-scope: "true"
    wavepoint.io/oncall-team: payments-platform
spec:
  replicas: 5
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: gateway-api
      env: prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: gateway-api
        env: prod
        version: "4.0.2"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      nodeSelector:
        tier: compute
      tolerations:
        - key: high-cpu
          operator: Exists
          effect: true:NoSchedule
      serviceAccountName: gateway-api
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: gateway-api
      containers:
        - name: gateway-api
          image: registry.wavepoint.io/gateway-api:4.0.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "prod"
            - name: LOG_LEVEL
              value: "WARN"
            - name: SERVICE_NAME
              value: "gateway-api"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: API_KEY
              value: "sk_prod_gw_Yp3cD6gA"
            - name: JWT_SECRET
              value: "jwt_prod_gw_Hf8gB1"
            - name: RATE_LIMIT
              value: "10000"
            - name: CORS_ORIGINS
              value: "https://app.wavepoint.io"
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: gateway-api-config
        - name: tls-certs
          secret:
            secretName: gateway-api-tls
