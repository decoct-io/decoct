# Kubernetes ConfigMap — cors-config (staging)
# WavePoint Financial — cm-cors-config-staging
apiVersion: v1
kind: ConfigMap
metadata:
  name: cors-config
  namespace: wavepoint-staging
  labels:
    app.kubernetes.io/name: cors-config
    app.kubernetes.io/instance: cors-config-staging
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    configmap.kubernetes.io/managed-by: gitops
data:
  ALLOWED_ORIGINS: "https://staging.wavepoint.io"
  ALLOWED_METHODS: "GET"
