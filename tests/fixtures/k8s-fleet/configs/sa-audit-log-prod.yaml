# Kubernetes ServiceAccount — audit-log (prod)
# WavePoint Financial — sa-audit-log-prod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-log
  namespace: wavepoint-prod
  labels:
    app: audit-log
    env: prod
    team: platform
    part-of: wavepoint
    cost-center: "compliance"
    pci-scope: "true"
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::333333333333:role/prod-audit-log-role
    serviceaccount.kubernetes.io/managed-by: gitops
    wavepoint.io/last-audit: "2026-01-15"
    wavepoint.io/compliance: pci-dss
automountServiceAccountToken: true
secrets:
  - name: audit-log-token
imagePullSecrets:
  - name: registry-credentials
