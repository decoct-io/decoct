# Kubernetes Deployment — auth-svc (prod)
# WavePoint Financial — deploy-auth-svc-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-svc
  namespace: wavepoint-prod
  labels:
    app: auth-svc
    env: prod
    team: platform
    version: "1.8.2"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/pci-scope: "true"
    wavepoint.io/oncall-team: payments-platform
spec:
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: auth-svc
      env: prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: auth-svc
        env: prod
        version: "1.8.2"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: /metrics
    spec:
      nodeSelector:
        tier: compute
      tolerations:
        - key: high-cpu
          operator: Exists
          effect: true:NoSchedule
      serviceAccountName: auth-svc
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth-svc
      containers:
        - name: auth-svc
          image: registry.wavepoint.io/auth-svc:1.8.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "prod"
            - name: LOG_LEVEL
              value: "WARN"
            - name: SERVICE_NAME
              value: "auth-svc"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://auth_user:Pr0d#Scr3t@db-prod-primary.wavepoint.internal:5432/auth"
            - name: API_KEY
              value: "sk_prod_auth_Vt6wXy9zAb3c"
            - name: DB_POOL_SIZE
              value: "50"
            - name: OAUTH_PROVIDER
              value: "prod-keycloak"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: auth-svc-config
        - name: tls-certs
          secret:
            secretName: auth-svc-tls
