# Kubernetes Deployment — payment-api (dev)
# WavePoint Financial — deploy-payment-api-dev
apiVersion: apps/v1beta1
kind: Deployment
metadata:
  name: payment-api
  namespace: wavepoint-dev
  labels:
    app: payment-api
    env: dev
    team: platform
    version: "2.4.1-dev"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/ephemeral: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: payment-api
      env: dev
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: payment-api
        env: dev
        version: "2.4.1-dev"
    spec:
      serviceAccountName: payment-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: payment-api
          image: registry.wavepoint.io/payment-api:2.4.1-dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_ENV
              value: "dev"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SERVICE_NAME
              value: "payment-api"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://pay_user:dkP9x#mQ2v@db-dev.wavepoint.internal:5432/payments_dev"
            - name: API_KEY
              value: "sk_dev_pay_Rj7xMq2vK9nL"
            - name: JWT_SECRET
              value: "jwt_dev_Xm4pQ8rT2wYz"
            - name: DB_POOL_SIZE
              value: "50"
            - name: ENABLE_SANDBOX
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: payment-api-config
