# Kubernetes Ingress — admin (dev)
# WavePoint Financial — ingress-admin-dev
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-ingress
  namespace: wavepoint-dev
  labels:
    app.kubernetes.io/name: admin-ingress
    env: dev
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: admin.dev.wavepoint.internal
      http:
        paths:
          - path: /admin/*
            pathType: Prefix
            backend:
              service:
                name: gateway-api
                port:
                  number: 80
          - path: /dashboard/*
            pathType: Prefix
            backend:
              service:
                name: reporting-svc
                port:
                  number: 80
