# Kubernetes Service — auth-svc (staging)
# WavePoint Financial — svc-auth-svc-staging
apiVersion: v1
kind: Service
metadata:
  name: auth-svc
  namespace: wavepoint-staging
  labels:
    app: auth-svc
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    service.kubernetes.io/topology-aware-hints: auto
spec:
  type: ClusterIP
  selector:
    app: auth-svc
    env: staging
  sessionAffinity: None
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8081
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
