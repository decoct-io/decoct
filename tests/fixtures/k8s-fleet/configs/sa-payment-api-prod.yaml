# Kubernetes ServiceAccount — payment-api (prod)
# WavePoint Financial — sa-payment-api-prod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-api
  namespace: wavepoint-prod
  labels:
    app: payment-api
    env: prod
    team: platform
    part-of: wavepoint
    cost-center: "payments"
    pci-scope: "true"
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::333333333333:role/prod-payment-api-role
    serviceaccount.kubernetes.io/managed-by: gitops
    wavepoint.io/last-audit: "2026-01-15"
    wavepoint.io/compliance: pci-dss
automountServiceAccountToken: true
secrets:
  - name: payment-api-token
imagePullSecrets:
  - name: registry-credentials
