# Kubernetes Ingress — reporting (staging)
# WavePoint Financial — ingress-reporting-staging
apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: reporting-ingress
  namespace: wavepoint-staging
  labels:
    app.kubernetes.io/name: reporting-ingress
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
    - hosts:
        - reporting.staging.wavepoint.io
      secretName: staging-tls-secret
  rules:
    - host: reporting.staging.wavepoint.io
      http:
        paths:
          - path: /reports/*
            pathType: Prefix
            backend:
              serviceName: reporting-svc
              servicePort: 80
