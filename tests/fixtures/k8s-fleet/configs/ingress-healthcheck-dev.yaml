# Kubernetes Ingress — healthcheck (dev)
# WavePoint Financial — ingress-healthcheck-dev
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthcheck-ingress
  namespace: wavepoint-dev
  labels:
    app.kubernetes.io/name: healthcheck-ingress
    env: dev
    team: platform
    part-of: wavepoint
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: health.dev.wavepoint.internal
      http:
        paths:
          - path: /status/*
            pathType: Prefix
            backend:
              service:
                name: healthcheck-api
                port:
                  number: 80
