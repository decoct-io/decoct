# Kubernetes Deployment — notification-svc (staging)
# WavePoint Financial — deploy-notification-svc-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-svc
  namespace: wavepoint-staging
  labels:
    app: notification-svc
    env: staging
    team: platform
    version: "2.0.0"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: notification-svc
      env: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-svc
        env: staging
        version: "2.0.0"
    spec:
      serviceAccountName: notification-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: notification-svc
          image: registry.wavepoint.io/notification-svc:2.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8085
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "notification-svc"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: API_KEY
              value: "sk_stg_notify_Ab8cDe2f"
            - name: SMTP_HOST
              value: "smtp.staging.wavepoint.internal"
            - name: SMTP_PORT
              value: "587"
            - name: SNS_TOPIC
              value: "staging-notifications"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: notification-svc-config
