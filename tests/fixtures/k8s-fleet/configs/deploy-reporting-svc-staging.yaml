# Kubernetes Deployment — reporting-svc (staging)
# WavePoint Financial — deploy-reporting-svc-staging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-svc
  namespace: wavepoint-staging
  labels:
    app: reporting-svc
    env: staging
    team: platform
    version: "1.4.1"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: reporting-svc
      env: staging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: reporting-svc
        env: staging
        version: "1.4.1"
    spec:
      serviceAccountName: reporting-svc
      terminationGracePeriodSeconds: 30
      containers:
        - name: reporting-svc
          image: registry.wavepoint.io/reporting-svc:1.4.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "staging"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SERVICE_NAME
              value: "reporting-svc"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DATABASE_URL
              value: "postgresql://report_user:StgRpt#2@db-staging.wavepoint.internal:5432/reporting_stg"
            - name: REPORT_BUCKET
              value: "staging-reports"
            - name: SCHEDULE
              value: "0 */4 * * *"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: reporting-svc-config
