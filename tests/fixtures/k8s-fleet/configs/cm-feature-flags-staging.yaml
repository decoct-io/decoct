# Kubernetes ConfigMap — feature-flags (staging)
# WavePoint Financial — cm-feature-flags-staging
apiVersion: v1
kind: ConfigMap
metadata:
  name: feature-flags
  namespace: wavepoint-staging
  labels:
    app.kubernetes.io/name: feature-flags
    app.kubernetes.io/instance: feature-flags-staging
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    configmap.kubernetes.io/managed-by: gitops
data:
  ENABLE_NEW_CHECKOUT: "true"
  ENABLE_RISK_V2: "true"
  ENABLE_DARK_MODE: "false"
  ENABLE_BETA_API: "false"
  MAINTENANCE_MODE: "false"
  MAX_RETRY_COUNT: "5"
