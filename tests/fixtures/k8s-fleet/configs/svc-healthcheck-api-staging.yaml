# Kubernetes Service — healthcheck-api (staging)
# WavePoint Financial — svc-healthcheck-api-staging
apiVersion: v1
kind: Service
metadata:
  name: healthcheck-api
  namespace: wavepoint-staging
  labels:
    app: healthcheck-api
    env: staging
    team: platform
    part-of: wavepoint
  annotations:
    service.kubernetes.io/topology-aware-hints: auto
spec:
  type: ClusterIP
  selector:
    app: healthcheck-api
    env: staging
  sessionAffinity: None
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8090
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
