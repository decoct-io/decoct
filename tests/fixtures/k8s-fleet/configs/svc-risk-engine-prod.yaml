# Kubernetes Service — risk-engine (prod)
# WavePoint Financial — svc-risk-engine-prod
apiVersion: v1
kind: Service
metadata:
  name: risk-engine
  namespace: wavepoint-prod
  labels:
    app: risk-engine
    env: prod
    team: platform
    part-of: wavepoint
  annotations:
    service.kubernetes.io/topology-aware-hints: auto
spec:
  type: ClusterIP
  selector:
    app: risk-engine
    env: prod
  sessionAffinity: None
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8083
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
