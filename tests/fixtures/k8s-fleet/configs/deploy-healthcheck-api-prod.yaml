# Kubernetes Deployment — healthcheck-api (prod)
# WavePoint Financial — deploy-healthcheck-api-prod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcheck-api
  namespace: wavepoint-prod
  labels:
    app: healthcheck-api
    env: prod
    team: platform
    version: "0.2.5"
    part-of: wavepoint
  annotations:
    deployment.kubernetes.io/revision: "1"
    kubectl.kubernetes.io/last-applied-configuration: managed-by-gitops
    wavepoint.io/pci-scope: "true"
    wavepoint.io/oncall-team: payments-platform
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: healthcheck-api
      env: prod
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: healthcheck-api
        env: prod
        version: "0.2.5"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: healthcheck-api
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: healthcheck-api
      containers:
        - name: healthcheck-api
          image: registry.wavepoint.io/healthcheck-api:0.2.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: APP_ENV
              value: "prod"
            - name: LOG_LEVEL
              value: "WARN"
            - name: SERVICE_NAME
              value: "healthcheck-api"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: CHECK_INTERVAL
              value: "15s"
            - name: TARGETS
              value: "payment-api"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: config-volume
          configMap:
            name: healthcheck-api-config
        - name: tls-certs
          secret:
            secretName: healthcheck-api-tls
