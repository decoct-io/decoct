platform: docker-compose
source: Docker Compose specification v3.8
confidence: authoritative
defaults:
  services.*.restart: "no"
  services.*.network_mode: bridge
  services.*.privileged: false
  services.*.read_only: false
  services.*.stdin_open: false
  services.*.tty: false
drop_patterns:
  - "**.uuid"
  - "**.managedFields"
system_managed:
  - "**.creationTimestamp"
  - "**.resourceVersion"
