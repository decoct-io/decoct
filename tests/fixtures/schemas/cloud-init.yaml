platform: cloud-init
source: cloud-init upstream JSON Schema (schema-cloud-config-v1.json)
confidence: authoritative
defaults:
  # Package management
  package_update: false
  package_upgrade: false
  package_reboot_if_required: false

  # SSH
  ssh.emit_keys_to_console: true
  ssh_deletekeys: true
  allow_public_ssh_keys: true
  disable_root: true
  ssh_quiet_keygen: false

  # User defaults
  users.*.lock_passwd: true
  users.*.no_create_home: false
  users.*.no_log_init: false
  users.*.no_user_group: false
  users.*.create_groups: true
  users.*.system: false
  users.*.ssh_redirect_user: false

  # Disk / filesystem
  growpart.mode: auto
  growpart.ignore_growroot_disabled: false
  disk_setup.*.table_type: mbr
  disk_setup.*.layout: false
  disk_setup.*.overwrite: false

  # NTP
  ntp.ntp_client: auto
  ntp.enabled: true

  # APT
  apt.preserve_sources_list: false
  apt.sources.*.append: true
  apt_pipelining: os

  # Hostname / networking
  manage_etc_hosts: false
  preserve_hostname: false
  manage_resolv_conf: false
  disable_ec2_metadata: false

  # Power state
  power_state.delay: now
  power_state.timeout: 30
  power_state.condition: true

  # Write files defaults
  write_files.*.permissions: "0644"
  write_files.*.append: false
  write_files.*.defer: false

  # CA certificates
  ca_certs.remove_defaults: false

  # Puppet
  puppet.install: true
  puppet.install_type: packages
  puppet.cleanup: true
  puppet.exec: false
  puppet.start_service: true

  # Ansible
  ansible.install_method: distro
  ansible.package_name: ansible

  # Chef
  chef.exec: false
  chef.force_install: false
  chef.install_type: packages
  chef.show_time: true
  chef.log_level: ":info"
  chef.omnibus_url_retries: 5
  chef.environment: _default

  # Phone home
  phone_home.tries: 10

  # Ubuntu Pro
  ubuntu_pro.features.disable_auto_attach: false

  # Alpine APK
  apk_repos.alpine_repo.community_enabled: false
  apk_repos.alpine_repo.testing_enabled: false
  apk_repos.preserve_repositories: false
drop_patterns: []
system_managed: []
