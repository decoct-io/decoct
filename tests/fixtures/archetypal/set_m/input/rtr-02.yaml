service_config:
  service_policy:
    interval: 60
    retry: 3
    telemetry:
      interval: 30
      protocol: grpc
      encoding: json
      collectors:
      - 10.0.0.1
      - 10.0.0.2
      auth:
        method: certificate
        ca: /etc/pki/ca.pem
        verify: true
    logging:
      interval: 60
      facility: local6
      severity: informational
export_policy:
  service_policy:
    netflow:
      interval: 30
      protocol: grpc
      encoding: gpb
