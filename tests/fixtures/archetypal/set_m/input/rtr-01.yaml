service_config:
  service_policy:
    interval: 60
    retry: 3
    telemetry:
      interval: 30
      protocol: grpc
      encoding: gpb
      collectors:
      - 10.0.0.3
      - 10.0.0.4
      - 10.0.0.5
    logging:
      interval: 60
      facility: local6
      severity: informational
export_policy:
  service_policy:
    sflow:
      interval: 30
      protocol: grpc
      encoding: gpb
