monitor_target:
  polling_interval: 300
  timeout: 10
  retries: 3
  threshold_warn: 75
  threshold_crit: 95
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
  dependency_check: true
service_policy:
  snmp_polling:
    community: MONITOR_RO
    interval: 300
    target: 10.0.4.1
