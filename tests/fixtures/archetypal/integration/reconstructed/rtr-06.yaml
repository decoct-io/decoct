alert_targets:
  auto_ticket: true
  correlation_id: auto
  dependency_check: true
  escalation_group: tier2
  polling_interval: 300
  retries: 3
  suppress_flap: true
  threshold_crit: 95
  threshold_info: 50
  threshold_warn: 75
  timeout: 10
auth_methods:
  max_retries: 3
  method: radius
  mfa_enabled: true
  timeout: 30
bgp_neighbors:
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.16.1.1
  peer_name: PE-01
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.16.1.2
  peer_name: PE-02
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.16.1.3
  peer_name: PE-03
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
fabric_interfaces:
- admin_state: up
  duplex: full
  ipv4_address: 10.16.0.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/0
  speed: 100g
- admin_state: up
  duplex: full
  ipv4_address: 10.16.1.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/1
  speed: 100g
- admin_state: up
  duplex: full
  ipv4_address: 10.16.2.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/2
  speed: 100g
- admin_state: up
  duplex: full
  ipv4_address: 10.16.3.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/3
  speed: 100g
isis_config:
  auth_password: ISIS_KEY_1
  auth_type: md5
  is_type: level-2-only
  lsp_gen_interval: 5
  lsp_lifetime: 1200
  max_lsp_lifetime: 65535
  metric_style: wide
  net_address: 49.0001.0100.0000.0006.00
  net_area: '49.0001'
  process_id: 1
  spf_initial_wait: 50
loopback0:
  admin_state: up
  bfd_enabled: true
  description: Router-ID
  interface_type: Loopback
  ipv4_address: 10.255.0.6
  isis_metric: 10
  isis_passive: true
  mpls_ldp: true
  mpls_te: false
  mtu: 1500
  vrf: default
path_export:
  export_policy:
    mirror_export:
      encoding: gpb
      interval: 30
      protocol: grpc
policy_maps:
  policy:
    default_action: deny
    match:
      as_path: CORE-ASPATH
      community: CORE-COMM
      prefix_list: CORE-PREFIXES
    name: CORE-RM
    set:
      community: 65000:100
      local_pref: 200
      med: 100
routing_policy:
  address_family: ipv6-unicast
  asn: 65100
  bestpath: as-path-multipath-relax
  bfd_enabled: true
  bfd_interval: 150
  graceful_restart: true
  graceful_restart_time: 300
  max_paths_ebgp: 16
  router_id_source: loopback1
system_base:
  aaa_enable: LOCAL
  aaa_login: RADIUS_AUTH
  log_buffer: 1048576
  log_facility: local6
  log_host: 10.100.2.1
  log_port: 514
  log_protocol: tcp
  log_severity: informational
  ntp_auth_algo: md5
  ntp_auth_enabled: true
  ntp_auth_key_id: 42
  ntp_primary: 10.100.1.1
  ntp_secondary: 10.100.1.2
  ntp_source: Loopback0
  radius_host_1: 10.100.3.1
  snmp_community: INTEG_RO
  snmp_location: site-06
telemetry_stack:
  collectors:
  - 10.200.0.1
  - 10.200.0.2
  global_interval: 30
  logging:
    facility: local7
    interval: 60
    severity: warning
  retry: 3
  transport:
    port: 50051
    protocol: grpc
    tls:
      cipher: aes-256-gcm
      enabled: true
vendor_extensions:
  circuit_id: true
  server_ip: 10.100.10.7
  vrf: MGMT
vrf_routing:
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:700
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: CUST-A
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:800
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: CUST-B
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:900
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: MGMT
