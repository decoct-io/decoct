access_control:
  default_action: deny
  icmp_allow: true
  log_denied: true
  policy_name: BASELINE-FW
  rate_limit: 1000pps
  snmp_allow: true
  ssh_allow: true
  timeout: 30
alert_targets:
  auto_ticket: true
  correlation_id: auto
  dependency_check: true
  escalation_group: tier2
  polling_interval: 300
  retries: 3
  severity_override: major
  suppress_flap: true
  threshold_crit: 95
  threshold_info: 50
  threshold_warn: 75
  timeout: 10
auth_methods:
  max_retries: 3
  method: radius
  mfa_enabled: 'on'
  timeout: 30
bgp_neighbors:
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.17.1.1
  peer_name: PE-01
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.17.1.2
  peer_name: PE-02
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.17.1.3
  peer_name: PE-03
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
change_procedures:
  approval_required: true
  max_duration_hours: 4
  steps:
  - drain_traffic
  - snapshot_config
  - backup_database
  - health_check_pre
  - apply_patches
  - restart_services
  - validate_routing
  - run_smoke_tests
  - restore_traffic
  - health_check_post
  - notify_stakeholders
  - close_ticket
isis_config:
  auth_password: ISIS_KEY_1
  auth_type: md5
  is_type: level-2-only
  lsp_gen_interval: 5
  lsp_lifetime: 1200
  lsp_refresh: 900
  max_lsp_lifetime: 65535
  metric_style: wide
  net_address: 49.0001.0100.0000.0007.00
  net_area: '49.0001'
  process_id: 1
  spf_initial_wait: 50
  spf_interval: 10
loopback0:
  admin_state: up
  bfd_enabled: true
  description: Router-ID
  interface_type: Loopback
  ipv4_address: 10.255.0.7
  isis_metric: 10
  isis_passive: true
  mpls_ldp: true
  mpls_te: false
  mtu: 1500
  vrf: default
path_export:
  export_policy:
    span_export:
      encoding: gpb
      interval: 30
      protocol: grpc
policy_maps:
  policy:
    default_action: permit
    match:
      as_path: CORE-ASPATH
      community: CORE-COMM
      prefix_list: CORE-PREFIXES
    name: CORE-RM
    set:
      local_pref: 300
      med: 100
routing_policy:
  address_family: vpnv4-unicast
  asn: 65000
  bestpath: compare-routerid
  confederation_id: 100
  confederation_peers:
  - 65001
  - 65002
  graceful_restart: false
  max_paths_ebgp: 2
  router_id_source: loopback0
  soo_enabled: true
system_base:
  aaa_enable: LOCAL
  aaa_login: RADIUS_AUTH
  log_buffer: 1048576
  log_facility: local6
  log_host: 10.100.2.1
  log_port: 514
  log_protocol: tcp
  log_severity: informational
  ntp_auth_algo: md5
  ntp_auth_enabled: true
  ntp_auth_key_id: 42
  ntp_primary: 10.100.1.1
  ntp_secondary: 10.100.1.2
  ntp_source: Loopback0
  radius_host_1: 10.100.3.1
  snmp_community: INTEG_RO
  snmp_location: site-07
telemetry_stack:
  collectors:
  - 10.200.0.1
  - 10.200.0.2
  global_interval: 30
  logging:
    facility: local7
    interval: 60
    severity: warning
  retry: 3
  transport:
    port: 50051
    protocol: grpc
    tls:
      cipher: aes-256-gcm
      enabled: true
vendor_extensions:
  domain_name: archetypal.lab
  primary: 10.100.10.8
  secondary: 10.100.10.9
vrf_routing:
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:800
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: CUST-A
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:900
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: CUST-B
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:1000
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: MGMT
