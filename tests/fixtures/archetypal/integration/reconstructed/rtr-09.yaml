alert_targets:
  auto_ticket: true
  correlation_id: auto
  dependency_check: true
  escalation_group: tier2
  notification_channel: slack
  polling_interval: 300
  retries: 3
  runbook_url: https://wiki.lab/alerts
  severity_override: major
  suppress_flap: true
  threshold_crit: 95
  threshold_info: 50
  threshold_warn: 75
  timeout: 10
auth_methods:
  max_retries: 3
  method: radius
  mfa_enabled: 0
  timeout: 30
bgp_neighbors:
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.19.1.1
  peer_name: PE-01
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.19.1.2
  peer_name: PE-02
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
- afi:
    ipv4_unicast: true
    vpnv4: false
  peer_address: 10.19.1.3
  peer_name: PE-03
  remote_as: 65001
  timers:
    connect_retry: 10
    hold: 90
    keepalive: 30
  transport:
    md5_auth: true
    port: 179
    protocol: tcp
    ttl_security: 1
change_procedures:
  approval_required: true
  max_duration_hours: 4
  steps:
  - drain_traffic
  - snapshot_config
  - backup_database
  - health_check_pre
  - apply_patches
  - restart_services
  - validate_routing
  - run_smoke_tests
  - restore_traffic
  - health_check_post
  - notify_stakeholders
  - close_ticket
fabric_interfaces:
- admin_state: up
  duplex: full
  ipv4_address: 10.19.0.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/0
  speed: 100g
- admin_state: up
  duplex: full
  ipv4_address: 10.19.1.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/1
  speed: 100g
- admin_state: up
  duplex: full
  ipv4_address: 10.19.2.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/2
  speed: 100g
- admin_state: up
  duplex: full
  ipv4_address: 10.19.3.1
  isis_metric: 10
  mtu: 9216
  name: HuGigE0/0/0/3
  speed: 100g
isis_config:
  auth_password: ISIS_KEY_1
  auth_type: md5
  is_type: level-2-only
  lsp_gen_interval: 5
  lsp_lifetime: 1200
  lsp_refresh: 900
  max_lsp_lifetime: 65535
  metric_style: wide
  net_address: 49.0001.0100.0000.0009.00
  net_area: '49.0001'
  process_id: 1
  spf_initial_wait: 50
  spf_interval: 10
loopback0:
  admin_state: up
  bfd_enabled: true
  description: Router-ID
  interface_type: Loopback
  ipv4_address: 10.255.0.9
  isis_metric: 10
  isis_passive: true
  mpls_ldp: true
  mpls_te: false
  mtu: 1500
  vrf: default
path_export:
  export_policy:
    pcap_export:
      encoding: gpb
      interval: 30
      protocol: grpc
policy_maps:
  policy:
    default_action: deny
    match:
      as_path: CORE-ASPATH
      community: CORE-COMM
      prefix_list: CORE-PREFIXES
    name: CORE-RM
    set:
      community: 65000:100
      local_pref: 200
      med: 100
routing_policy:
  address_family: l2vpn-evpn
  arp_suppress: true
  asn: 65200
  bestpath: compare-routerid
  mac_ip_routes: true
  nd_suppress: true
  route_type_5: true
  router_id_source: loopback2
system_base:
  aaa_enable: LOCAL
  aaa_login: RADIUS_AUTH
  log_buffer: 1048576
  log_facility: local6
  log_host: 10.100.2.1
  log_port: 514
  log_protocol: tcp
  log_severity: informational
  ntp_auth_algo: md5
  ntp_auth_enabled: true
  ntp_auth_key_id: 42
  ntp_primary: 10.100.1.1
  ntp_secondary: 10.100.1.2
  ntp_source: Loopback0
  radius_host_1: 10.100.3.1
  snmp_community: INTEG_RO
  snmp_location: site-09
telemetry_stack:
  collectors:
  - 10.200.0.1
  - 10.200.0.2
  global_interval: 30
  logging:
    facility: local7
    interval: 60
    severity: warning
  retry: 3
  transport:
    port: 50051
    protocol: grpc
    tls:
      cipher: aes-256-gcm
      enabled: true
vendor_extensions:
  holdtime: 120
  reinit: 2
  timer: 30
vrf_routing:
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:1000
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: CUST-A
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:1100
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: CUST-B
- export_policy: VRF-EXPORT
  import_policy: VRF-IMPORT
  rd_format: type0
  rd_value: 65000:1200
  route_limit: 10000
  route_warning_pct: 80
  vrf_name: MGMT
