system_base:
  _class: SystemBase
  snmp_location: site-07
access_control:
  _class: AccessPolicy
  _remove:
  - tacacs_allow
  - bfd_allow
  - rsvp_allow
  - ldp_allow
  - bgp_allow
  - ntp_allow
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
  dependency_check: true
  auto_ticket: true
  severity_override: major
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.7
change_procedures:
  _class: ChangeProcedure
telemetry_stack:
  _class: TelemetryStack
routing_policy:
  _class: RoutingPolicyVpn
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0007.00
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:800
  - vrf_name: CUST-B
    rd_value: 65000:900
  - vrf_name: MGMT
    rd_value: 65000:1000
policy_maps:
  _class: PolicyMap
  'policy.default_action': permit
  'policy.set.local_pref': 300
  _remove:
  - policy.set.community
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.17.1.1
  - peer_name: PE-02
    peer_address: 10.17.1.2
  - peer_name: PE-03
    peer_address: 10.17.1.3
auth_methods:
  mfa_enabled: 'on'
  timeout: 30
  max_retries: 3
  method: radius
vendor_extensions:
  primary: 10.100.10.8
  secondary: 10.100.10.9
  domain_name: archetypal.lab
path_export:
  export_policy:
    span_export:
      interval: 30
      protocol: grpc
      encoding: gpb
