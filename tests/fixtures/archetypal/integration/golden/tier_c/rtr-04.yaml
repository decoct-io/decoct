system_base:
  _class: SystemBase
  snmp_location: site-04
access_control:
  _class: AccessPolicy
  _remove:
  - tacacs_allow
  - bfd_allow
  - rsvp_allow
  - ldp_allow
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.4
change_procedures:
  _class: ChangeProcedure
fabric_interfaces:
  _class: FabricInterface
  instances:
  - name: HuGigE0/0/0/0
    ipv4_address: 10.14.0.1
  - name: HuGigE0/0/0/1
    ipv4_address: 10.14.1.1
  - name: HuGigE0/0/0/2
    ipv4_address: 10.14.2.1
  - name: HuGigE0/0/0/3
    ipv4_address: 10.14.3.1
telemetry_stack:
  _class: TelemetryStack
  'global_interval': 60
  'collectors':
  - 10.200.0.9
  _remove:
  - transport.tls.cipher
routing_policy:
  _class: RoutingPolicyVpn
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0004.00
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:500
  - vrf_name: CUST-B
    rd_value: 65000:600
  - vrf_name: MGMT
    rd_value: 65000:700
    _remove:
    - route_warning_pct
policy_maps:
  _class: PolicyMap
  'policy.match.prefix_list': EDGE-PREFIXES
  'policy.dampening.half_life': 15
  'policy.dampening.reuse': 750
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.14.1.1
    'afi.vpnv4': true
  - peer_name: PE-02
    peer_address: 10.14.1.2
  - peer_name: PE-03
    peer_address: 10.14.1.3
auth_methods:
  mfa_enabled: true
  timeout: 30
  max_retries: 3
  method: 'RADIUS'
vendor_extensions:
  host: 10.100.10.5
  port: 162
  community: TRAP_RO
  version: 2c
  timeout: 5
path_export:
  export_policy:
    streaming_export:
      interval: 30
      protocol: grpc
      encoding: gpb
