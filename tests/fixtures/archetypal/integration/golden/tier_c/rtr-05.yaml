system_base:
  _class: SystemBase
  snmp_location: site-05
access_control:
  _class: AccessPolicy
  _remove:
  - tacacs_allow
  - bfd_allow
  - rsvp_allow
  - ldp_allow
  - bgp_allow
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
  dependency_check: true
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.5
change_procedures:
  approval_required: true
  max_duration_hours: 4
  steps:
  - drain_traffic
  - snapshot_config
  - backup_database
  - health_check_pre
  - restart_services
  - apply_patches
  - validate_routing
  - run_smoke_tests
  - restore_traffic
  - health_check_post
  - notify_stakeholders
  - close_ticket
telemetry_stack:
  _class: TelemetryStack
routing_policy:
  _class: RoutingPolicyVpn
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0005.00
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:600
  - vrf_name: CUST-B
    rd_value: 65000:700
  - vrf_name: MGMT
    rd_value: 65000:800
policy_maps:
  _class: PolicyMap
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.15.1.1
  - peer_name: PE-02
    peer_address: 10.15.1.2
  - peer_name: PE-03
    peer_address: 10.15.1.3
auth_methods:
  mfa_enabled: 'yes'
  timeout: 30
  max_retries: 3
  method: radius
vendor_extensions:
  destination: 10.100.10.6
  port: 9995
  version: 9
  source_intf: Loopback0
path_export:
  export_policy:
    tap_export:
      interval: 30
      protocol: grpc
      encoding: gpb
