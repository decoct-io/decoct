system_base:
  _class: SystemBase
  snmp_location: site-08
access_control:
  _class: AccessPolicy
  _remove:
  - tacacs_allow
  - bfd_allow
  - rsvp_allow
  - ldp_allow
  - bgp_allow
  - ntp_allow
  - snmp_allow
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
  dependency_check: true
  auto_ticket: true
  severity_override: major
  notification_channel: slack
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.8
change_procedures:
  _class: ChangeProcedure
fabric_interfaces:
  _class: FabricInterface
  instances:
  - name: HuGigE0/0/0/0
    ipv4_address: 10.18.0.1
  - name: HuGigE0/0/0/1
    ipv4_address: 10.18.1.1
  - name: HuGigE0/0/0/2
    ipv4_address: 10.18.2.1
  - name: HuGigE0/0/0/3
    ipv4_address: 10.18.3.1
    _remove:
    - isis_metric
telemetry_stack:
  _class: TelemetryStack
routing_policy:
  _class: RoutingPolicyVpn
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0008.00
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:900
  - vrf_name: CUST-B
    rd_value: 65000:1000
  - vrf_name: MGMT
    rd_value: 65000:1100
policy_maps:
  _class: PolicyMap
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.18.1.1
  - peer_name: PE-02
    peer_address: 10.18.1.2
    _remove:
    - timers.hold
  - peer_name: PE-03
    peer_address: 10.18.1.3
auth_methods:
  mfa_enabled: true
  timeout: 30
  max_retries: 3
  method: radius
vendor_extensions:
  interval: 150
  min_rx: 150
  multiplier: 3
path_export:
  export_policy:
    erspan_export:
      interval: 30
      protocol: grpc
      encoding: gpb
