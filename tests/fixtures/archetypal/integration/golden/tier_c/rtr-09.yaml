system_base:
  _class: SystemBase
  snmp_location: site-09
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
  dependency_check: true
  auto_ticket: true
  severity_override: major
  notification_channel: slack
  runbook_url: https://wiki.lab/alerts
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.9
change_procedures:
  _class: ChangeProcedure
fabric_interfaces:
  _class: FabricInterface
  instances:
  - name: HuGigE0/0/0/0
    ipv4_address: 10.19.0.1
  - name: HuGigE0/0/0/1
    ipv4_address: 10.19.1.1
  - name: HuGigE0/0/0/2
    ipv4_address: 10.19.2.1
  - name: HuGigE0/0/0/3
    ipv4_address: 10.19.3.1
telemetry_stack:
  _class: TelemetryStack
routing_policy:
  asn: 65200
  router_id_source: loopback2
  address_family: l2vpn-evpn
  bestpath: compare-routerid
  route_type_5: true
  arp_suppress: true
  mac_ip_routes: true
  nd_suppress: true
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0009.00
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:1000
  - vrf_name: CUST-B
    rd_value: 65000:1100
  - vrf_name: MGMT
    rd_value: 65000:1200
policy_maps:
  _class: PolicyMap
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.19.1.1
  - peer_name: PE-02
    peer_address: 10.19.1.2
  - peer_name: PE-03
    peer_address: 10.19.1.3
auth_methods:
  mfa_enabled: 0
  timeout: 30
  max_retries: 3
  method: radius
vendor_extensions:
  holdtime: 120
  timer: 30
  reinit: 2
path_export:
  export_policy:
    pcap_export:
      interval: 30
      protocol: grpc
      encoding: gpb
