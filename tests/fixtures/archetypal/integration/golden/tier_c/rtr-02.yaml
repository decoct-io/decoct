system_base:
  _class: SystemBase
  snmp_location: site-02
access_control:
  _class: AccessPolicy
  _remove:
  - tacacs_allow
  - bfd_allow
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.2
change_procedures:
  _class: ChangeProcedure
fabric_interfaces:
  _class: FabricInterface
  instances:
  - name: HuGigE0/0/0/0
    ipv4_address: 10.12.0.1
  - name: HuGigE0/0/0/1
    ipv4_address: 10.12.1.1
  - name: HuGigE0/0/0/2
    ipv4_address: 10.12.2.1
    speed: 10g
  - name: HuGigE0/0/0/3
    ipv4_address: 10.12.3.1
telemetry_stack:
  _class: TelemetryStack
  'transport.tls.cipher': aes-128-gcm
routing_policy:
  _class: RoutingPolicyCore
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0002.00
  _remove:
  - auth_password
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:300
  - vrf_name: CUST-B
    rd_value: 65000:400
  - vrf_name: MGMT
    rd_value: 65000:500
policy_maps:
  _class: PolicyMap
  _remove:
  - policy.set.med
  'policy.set.weight': 200
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.12.1.1
  - peer_name: PE-02
    peer_address: 10.12.1.2
  - peer_name: PE-03
    peer_address: 10.12.1.3
    _remove:
    - timers.connect_retry
auth_methods:
  mfa_enabled: true
  timeout: '30'
  max_retries: 3
  method: radius
vendor_extensions:
  host: 10.100.10.3
  port: 514
  protocol: tcp
  facility: local6
  severity: info
path_export:
  export_policy:
    netflow_export:
      interval: 30
      protocol: grpc
      encoding: gpb
