system_base:
  _class: SystemBase
  snmp_location: site-06
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
  dependency_check: true
  auto_ticket: true
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.6
fabric_interfaces:
  _class: FabricInterface
  instances:
  - name: HuGigE0/0/0/0
    ipv4_address: 10.16.0.1
  - name: HuGigE0/0/0/1
    ipv4_address: 10.16.1.1
  - name: HuGigE0/0/0/2
    ipv4_address: 10.16.2.1
  - name: HuGigE0/0/0/3
    ipv4_address: 10.16.3.1
telemetry_stack:
  _class: TelemetryStack
routing_policy:
  asn: 65100
  router_id_source: loopback1
  address_family: ipv6-unicast
  bestpath: as-path-multipath-relax
  graceful_restart: true
  graceful_restart_time: 300
  max_paths_ebgp: 16
  bfd_enabled: true
  bfd_interval: 150
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0006.00
  _remove:
  - spf_interval
  - lsp_refresh
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:700
  - vrf_name: CUST-B
    rd_value: 65000:800
  - vrf_name: MGMT
    rd_value: 65000:900
policy_maps:
  _class: PolicyMap
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.16.1.1
  - peer_name: PE-02
    peer_address: 10.16.1.2
  - peer_name: PE-03
    peer_address: 10.16.1.3
auth_methods:
  mfa_enabled: true
  timeout: 30
  max_retries: 3
  method: radius
vendor_extensions:
  server_ip: 10.100.10.7
  vrf: MGMT
  circuit_id: true
path_export:
  export_policy:
    mirror_export:
      interval: 30
      protocol: grpc
      encoding: gpb
