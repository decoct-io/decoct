system_base:
  _class: SystemBase
  snmp_location: site-03
access_control:
  _class: AccessPolicy
  _remove:
  - tacacs_allow
  - bfd_allow
  - rsvp_allow
alert_targets:
  _class: AlertTarget
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
loopback0:
  _class: Loopback0Config
  ipv4_address: 10.255.0.3
fabric_interfaces:
  _class: FabricInterface
  instances:
  - name: HuGigE0/0/0/0
    ipv4_address: 10.13.0.1
  - name: HuGigE0/0/0/1
    ipv4_address: 10.13.1.1
  - name: HuGigE0/0/0/2
    ipv4_address: 10.13.2.1
  - name: HuGigE0/0/0/3
    ipv4_address: 10.13.3.1
telemetry_stack:
  _class: TelemetryStack
  _remove:
  - logging
routing_policy:
  _class: RoutingPolicyCore
isis_config:
  _class: IsisConfig
  net_address: 49.0001.0100.0000.0003.00
  metric_style: narrow
vrf_routing:
  _class: VrfConfig
  instances:
  - vrf_name: CUST-A
    rd_value: 65000:400
  - vrf_name: CUST-B
    rd_value: 65000:500
    route_limit: 5000
  - vrf_name: MGMT
    rd_value: 65000:600
policy_maps:
  _class: PolicyMap
bgp_neighbors:
  _class: BgpNeighborConfig
  instances:
  - peer_name: PE-01
    peer_address: 10.13.1.1
  - peer_name: PE-02
    peer_address: 10.13.1.2
  - peer_name: PE-03
    peer_address: 10.13.1.3
auth_methods:
  mfa_enabled: 1
  timeout: 30
  max_retries: '3'
  method: radius
vendor_extensions:
  key_id: 1
  algorithm: md5
  key_value: NTP_AUTH_1
  trusted: true
path_export:
  export_policy:
    ipfix_export:
      interval: 30
      protocol: grpc
      encoding: gpb
