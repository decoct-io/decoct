system_base:
  ntp_primary: 10.100.1.1
  ntp_secondary: 10.100.1.2
  ntp_source: Loopback0
  ntp_auth_enabled: true
  ntp_auth_key_id: 42
  ntp_auth_algo: md5
  log_host: 10.100.2.1
  log_protocol: tcp
  log_port: 514
  log_facility: local6
  log_severity: informational
  log_buffer: 1048576
  aaa_login: RADIUS_AUTH
  aaa_enable: LOCAL
  radius_host_1: 10.100.3.1
  snmp_community: INTEG_RO
  snmp_location: site-06
alert_targets:
  polling_interval: 300
  timeout: 10
  retries: 3
  threshold_warn: 75
  threshold_crit: 95
  threshold_info: 50
  escalation_group: tier2
  suppress_flap: true
  correlation_id: auto
  dependency_check: true
  auto_ticket: true
loopback0:
  interface_type: Loopback
  description: Router-ID
  mtu: 1500
  admin_state: up
  vrf: default
  isis_passive: true
  isis_metric: 10
  mpls_ldp: true
  mpls_te: false
  bfd_enabled: true
  ipv4_address: 10.255.0.6
fabric_interfaces:
- name: HuGigE0/0/0/0
  ipv4_address: 10.16.0.1
  mtu: 9216
  speed: 100g
  duplex: full
  admin_state: up
  isis_metric: 10
- name: HuGigE0/0/0/1
  ipv4_address: 10.16.1.1
  mtu: 9216
  speed: 100g
  duplex: full
  admin_state: up
  isis_metric: 10
- name: HuGigE0/0/0/2
  ipv4_address: 10.16.2.1
  mtu: 9216
  speed: 100g
  duplex: full
  admin_state: up
  isis_metric: 10
- name: HuGigE0/0/0/3
  ipv4_address: 10.16.3.1
  mtu: 9216
  speed: 100g
  duplex: full
  admin_state: up
  isis_metric: 10
telemetry_stack:
  global_interval: 30
  retry: 3
  transport:
    protocol: grpc
    port: 50051
    tls:
      enabled: true
      cipher: aes-256-gcm
  collectors:
  - 10.200.0.1
  - 10.200.0.2
  logging:
    interval: 60
    facility: local7
    severity: warning
routing_policy:
  asn: 65100
  router_id_source: loopback1
  address_family: ipv6-unicast
  bestpath: as-path-multipath-relax
  graceful_restart: true
  graceful_restart_time: 300
  max_paths_ebgp: 16
  bfd_enabled: true
  bfd_interval: 150
isis_config:
  process_id: 1
  is_type: level-2-only
  metric_style: wide
  net_area: '49.0001'
  auth_type: md5
  auth_password: ISIS_KEY_1
  lsp_gen_interval: 5
  lsp_lifetime: 1200
  spf_initial_wait: 50
  max_lsp_lifetime: 65535
  net_address: 49.0001.0100.0000.0006.00
vrf_routing:
- vrf_name: CUST-A
  rd_value: 65000:700
  rd_format: type0
  import_policy: VRF-IMPORT
  export_policy: VRF-EXPORT
  route_limit: 10000
  route_warning_pct: 80
- vrf_name: CUST-B
  rd_value: 65000:800
  rd_format: type0
  import_policy: VRF-IMPORT
  export_policy: VRF-EXPORT
  route_limit: 10000
  route_warning_pct: 80
- vrf_name: MGMT
  rd_value: 65000:900
  rd_format: type0
  import_policy: VRF-IMPORT
  export_policy: VRF-EXPORT
  route_limit: 10000
  route_warning_pct: 80
policy_maps:
  policy:
    name: CORE-RM
    default_action: deny
    match:
      prefix_list: CORE-PREFIXES
      community: CORE-COMM
      as_path: CORE-ASPATH
    set:
      local_pref: 200
      med: 100
      community: 65000:100
bgp_neighbors:
- peer_address: 10.16.1.1
  peer_name: PE-01
  remote_as: 65001
  transport:
    protocol: tcp
    port: 179
    md5_auth: true
    ttl_security: 1
  timers:
    keepalive: 30
    hold: 90
    connect_retry: 10
  afi:
    ipv4_unicast: true
    vpnv4: false
- peer_address: 10.16.1.2
  peer_name: PE-02
  remote_as: 65001
  transport:
    protocol: tcp
    port: 179
    md5_auth: true
    ttl_security: 1
  timers:
    keepalive: 30
    hold: 90
    connect_retry: 10
  afi:
    ipv4_unicast: true
    vpnv4: false
- peer_address: 10.16.1.3
  peer_name: PE-03
  remote_as: 65001
  transport:
    protocol: tcp
    port: 179
    md5_auth: true
    ttl_security: 1
  timers:
    keepalive: 30
    hold: 90
    connect_retry: 10
  afi:
    ipv4_unicast: true
    vpnv4: false
auth_methods:
  mfa_enabled: true
  timeout: 30
  max_retries: 3
  method: radius
vendor_extensions:
  server_ip: 10.100.10.7
  vrf: MGMT
  circuit_id: true
path_export:
  export_policy:
    mirror_export:
      interval: 30
      protocol: grpc
      encoding: gpb
