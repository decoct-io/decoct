# RAN Policy — admission-ctrl-01
# SpectrumOne 5G RAN — ran-policy-admission-ctrl-01

policy:
  name: "admission-ctrl-01"
  type: "admission-control"
  enabled: true
  priority: 10

parameters:
  priority_threshold: 5
  slice_aware: false
  max_bearers_per_cell: 64
  congestion_action: "reject-low-priority"
  preemption_enabled: false
  reservation_pct: 0

scope:
  applies_to: "all-cells"
  frequency_scope: "all-frequencies"

monitoring:
  kpi_enabled: true
  log_decisions: true
  reporting_interval_s: 15
