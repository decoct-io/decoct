# Network Slice Definition — embb-premium
# SpectrumOne 5G RAN — slice-embb-premium

slice_identity:
  slice_id: "embb-premium"
  s_nssai:
    sst: 1
    sd: "000002"
  slice_type: "eMBB"
  plmn:
    mcc: "310"
    mnc: "260"

qos_profile:
  five_qi: 6
  priority_level: 30
  preemption_capability: "shall-not-preempt"
  preemption_vulnerability: "preemptable"
  resource_type: "non-gbr"
  packet_delay_budget_ms: 10
  packet_error_rate: 0.0001

capacity:
  max_ue: 10000
  bandwidth_guarantee_mbps: 100
  isolation_level: "dedicated"

admission_control:
  enabled: true
  max_pdu_sessions: 20000
  congestion_threshold_pct: 80

ue_ambr:
  downlink_mbps: 100
  uplink_mbps: 50

monitoring:
  kpi_reporting: true
  reporting_interval_s: 15
  sla_tracking: true
  alarm_on_sla_breach: true
