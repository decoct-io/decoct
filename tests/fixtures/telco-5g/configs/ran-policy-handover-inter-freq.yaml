# RAN Policy — handover-inter-freq
# SpectrumOne 5G RAN — ran-policy-handover-inter-freq

policy:
  name: "handover-inter-freq"
  type: "handover"
  enabled: true
  priority: 30

parameters:
  measurement_event: "A5"
  a3_offset_db: 3
  hysteresis_db: 2
  time_to_trigger_ms: 480
  threshold_rsrp_dbm: -115
  threshold_rsrq_db: -14
  filter_coefficient_rsrp: 4
  filter_coefficient_rsrq: 4
  report_interval_ms: 480
  report_amount: "infinity"
  max_report_cells: 8

scope:
  applies_to: "all-cells"
  frequency_scope: "inter-frequency"

monitoring:
  kpi_enabled: true
  log_decisions: true
  reporting_interval_s: 15
