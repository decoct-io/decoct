---
- name: Configure web servers
  hosts: webservers
  become: false
  gather_facts: true
  any_errors_fatal: false
  ignore_errors: false

  tasks:
    - name: Install nginx
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: false
        force: false
        purge: false
        autoremove: false
        lock_timeout: 60
      become: true
      ignore_errors: false
      no_log: false

    - name: Copy nginx config
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        owner: root
        group: root
        mode: "0644"
        backup: false
        follow: false
        force: true
        trim_blocks: true
        output_encoding: utf-8
      become: true

    - name: Ensure nginx is running
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true
        daemon_reload: false
        daemon_reexec: false
        no_block: false
        scope: system

    - name: Create deploy user
      ansible.builtin.user:
        name: deploy
        state: present
        system: false
        create_home: true
        shell: /bin/bash
        groups: sudo
        append: false
        force: false
        generate_ssh_key: false
        move_home: false
        remove: false
        update_password: always
      become: true

    - name: Clone application repo
      ansible.builtin.git:
        repo: https://github.com/example/app.git
        dest: /opt/app
        version: v2.4.1
        bare: false
        clone: true
        force: false
        recursive: true
        remote: origin
        track_submodules: false
        update: true
        verify_commit: false
        accept_hostkey: false
