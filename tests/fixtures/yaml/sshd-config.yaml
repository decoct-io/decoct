# YAML representation of sshd_config (as managed by config management tools)
Port: 22
AddressFamily: any
TCPKeepAlive: yes
ClientAliveInterval: 300
ClientAliveCountMax: 3
LoginGraceTime: 120
MaxAuthTries: 6
MaxSessions: 10
GatewayPorts: no
PermitTunnel: no
PermitRootLogin: no
PasswordAuthentication: no
PubkeyAuthentication: yes
PermitEmptyPasswords: no
KbdInteractiveAuthentication: no
HostbasedAuthentication: no
IgnoreRhosts: yes
IgnoreUserKnownHosts: no
KerberosAuthentication: no
StrictModes: yes
PrintMotd: no
PrintLastLog: yes
PermitUserRC: yes
PermitUserEnvironment: no
AllowTcpForwarding: no
AllowStreamLocalForwarding: yes
AllowAgentForwarding: yes
X11Forwarding: no
X11DisplayOffset: 10
X11UseLocalhost: yes
LogLevel: VERBOSE
SyslogFacility: AUTH
Compression: yes
FingerprintHash: sha256
ExposeAuthInfo: no
