name: deviant-stack

services:
  # Fully conformant service
  api:
    image: acme-api:3.1.0
    container_name: deviant-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    networks:
      - app-net

  # Fully conformant service
  redis:
    image: redis:7-alpine
    container_name: deviant-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    networks:
      - app-net

  # Deviation: uses :latest tag, missing logging options, missing security_opt
  worker:
    image: acme-worker:latest
    container_name: deviant-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "worker"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
    networks:
      - app-net

  # Deviation: missing container_name, restart is "no" (default), no security_opt
  scheduler:
    image: acme-scheduler:1.0.2
    restart: "no"
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
    ipam:
      config:
        - subnet: 198.51.100.0/24
