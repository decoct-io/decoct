# IOS XE RESTCONF-style structured config — mix of defaults and customisations
# Defaults should be stripped; customisations should remain after compression
service:
  timestamps:
    debug: uptime
    log: uptime
  password-encryption: false
  tcp-keepalives-in: true     # CUSTOM — hardened
  tcp-keepalives-out: true    # CUSTOM — hardened
  nagle: false
ip:
  domain-lookup: false         # CUSTOM — disabled for security
  classless: true
  subnet-zero: true
  cef: true
  source-route: false          # CUSTOM — disabled for security
  ssh:
    version: 2                 # CUSTOM — explicit SSHv2
  domain:
    name: example.com          # CUSTOM — set domain
  http:
    server: false
    secure-server: true        # CUSTOM — HTTPS management enabled
  name-server:
    - 10.0.0.53                # CUSTOM — DNS server
    - 10.0.0.54                # CUSTOM — DNS server
interface:
  GigabitEthernet0/0:
    description: "WAN uplink to ISP-A"   # CUSTOM
    shutdown: false                        # CUSTOM — interface is up
    mtu: 1500
    speed: auto
    duplex: auto
    negotiation:
      auto: true
    ip:
      address: 203.0.113.1/30            # CUSTOM — configured IP
      proxy-arp: false                    # CUSTOM — disabled for security
      redirects: false                    # CUSTOM — disabled for security
      unreachables: false                 # CUSTOM — disabled for security
      mtu: 1500
    cdp:
      enable: false                       # CUSTOM — CDP disabled on WAN
    bandwidth: 100000
    load-interval: 300
    keepalive: 10
    arp:
      timeout: 14400
    snmp:
      trap:
        link-status: true
  GigabitEthernet0/1:
    description: "LAN trunk"              # CUSTOM
    shutdown: false                        # CUSTOM — interface is up
    mtu: 9000                             # CUSTOM — jumbo frames
    speed: auto
    duplex: auto
    switchport:
      mode: trunk                         # CUSTOM — trunk mode
    spanning-tree:
      portfast: disable
    cdp:
      enable: true
    bandwidth: 100000
    load-interval: 300
    snmp:
      trap:
        link-status: true
line:
  console:
    "0":
      exec-timeout:
        minutes: 5                        # CUSTOM — shorter timeout
        seconds: 0
      login: local
      logging:
        synchronous: true                 # CUSTOM
  vty:
    "0 4":
      exec-timeout:
        minutes: 10
        seconds: 0
      transport:
        input: ssh                        # CUSTOM — SSH only (default is 'all')
        output: all
      login: local
      access-class:
        in: MGMT-ACCESS                   # CUSTOM — ACL applied
router:
  ospf:
    "1":
      router-id: 10.255.0.1              # CUSTOM — explicit router-id
      auto-cost:
        reference-bandwidth: 10000        # CUSTOM — 10G reference
      maximum-paths: 4
      network:
        - area: 0                         # CUSTOM — OSPF network
          prefix: 10.0.0.0/24
  bgp:
    "65001":
      timers:
        keepalive: 60
        holdtime: 180
      distance:
        external: 20
        internal: 200
        local: 200
      maximum-paths: 2                    # CUSTOM — ECMP
      neighbor:
        "203.0.113.2":
          remote-as: 65002               # CUSTOM
          description: "ISP-A peer"      # CUSTOM
          timers:
            keepalive: 60
            holdtime: 180
spanning-tree:
  mode: rapid-pvst                        # CUSTOM — not default pvst
  priority: 4096                          # CUSTOM — root bridge priority
logging:
  console:
    enabled: true
    severity: 7
  monitor:
    enabled: true
    severity: 7
  buffered:
    enabled: false
  trap: informational
  host:
    - 10.0.0.100                          # CUSTOM — syslog server
ntp:
  server:
    - 10.0.0.10                           # CUSTOM — NTP server
  authenticate: false
