global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  body_size_limit: 0
  sample_limit: 0
  label_limit: 0
  scrape_native_histograms: false

scrape_configs:
  - job_name: prometheus
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http
    honor_labels: false
    honor_timestamps: true
    follow_redirects: true
    enable_http2: true
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http
    honor_labels: false
    honor_timestamps: true
    enable_compression: true
    follow_redirects: true
    static_configs:
      - targets:
          - node01:9100
          - node02:9100
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        action: replace
        separator: ";"

alerting:
  alertmanagers:
    - scheme: http
      timeout: 10s
      api_version: v2
      follow_redirects: true
      enable_http2: true
      static_configs:
        - targets:
            - alertmanager:9093

remote_write:
  - url: http://mimir:9009/api/v1/push
    remote_timeout: 30s
    send_exemplars: false
    follow_redirects: true
    enable_http2: false
    queue_config:
      capacity: 10000
      max_shards: 50
      min_shards: 1
      max_samples_per_send: 2000
      batch_send_deadline: 5s
      min_backoff: 30ms
      max_backoff: 5s
      retry_on_http_429: false
    metadata_config:
      send: true
      send_interval: 1m
      max_samples_per_send: 2000
