global:
  checkNewVersion: true
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"
    forwardedHeaders:
      insecure: false
    transport:
      respondingTimeouts:
        readTimeout: 60s
        writeTimeout: 0s
        idleTimeout: 180s
  websecure:
    address: ":443"
    allowACMEByPass: false
    http2:
      maxConcurrentStreams: 250

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    watch: true
    network: traefik
  file:
    directory: /etc/traefik/dynamic
    watch: true
  providersThrottleDuration: 2s

api:
  dashboard: true
  insecure: false
  debug: false

log:
  level: INFO
  format: common
  noColor: false
  maxSize: 100

accessLog:
  format: json
  bufferingSize: 0
  addInternals: false
  fields:
    defaultMode: keep
    headers:
      defaultMode: drop

serversTransport:
  maxIdleConnsPerHost: 200
  forwardingTimeouts:
    dialTimeout: 30s
    responseHeaderTimeout: 0s
    idleConnTimeout: 90s
  insecureSkipVerify: false
  disableHTTP2: false

ping:
  entryPoint: traefik
  terminatingStatusCode: 503
  manualRouting: false
