version: 1
generated_by: decoct-infer
corpus_description: 'This infrastructure corpus contains 88 Microsoft Entra ID and
  Intune configuration entities across 8 distinct types: 12 application registrations,
  20 conditional access policies, 3 cross-tenant access settings, 25 groups, 6 named
  locations, 4 app protection policies, 10 compliance policies, and 8 device configuration
  profiles.'
how_to_use:
- Start with this Tier A orientation guide for a high-level overview of all 8 
  entity types, their instance counts, class hierarchies, and summaries.
- For detailed class definitions and shared attributes, consult the Tier B file 
  referenced by each type's `tier_b_ref` field (e.g., 
  `entra-conditional-access_classes.yaml`). Classes show attributes common to 
  groups of entities; subclasses refine these with additional shared attributes.
- To inspect per-entity differences and unique attribute values, refer to the 
  Tier C file referenced by each type's `tier_c_ref` field (e.g., 
  `entra-conditional-access_instances.yaml`).
- The `base_only_ratio` in Tier A assertions indicates the fraction of instances
  that only inherit the base class without belonging to a more specific class. A
  ratio of 1.0 means all instances share only the base class attributes, with 
  all variation captured at the instance level in Tier C.
- Types with `composite_templates` in Tier B (such as `intune-compliance` and 
  `intune-device-config`) contain structured sub-objects (e.g., assignment 
  targets) that have been decomposed into reusable templates with per-entity 
  deltas.
type_descriptions:
  entra-application:
    summary: Azure AD application registrations sharing common OAuth and 
      publisher settings. 75% of instances belong to a class configured for 
      single-tenant organizational use.
    key_differentiators:
    - All instances share token version 2, the contoso.com publisher domain, and
      disabled implicit grant flows, forming a consistent application baseline.
    - The dominant class (9 of 12 instances) adds 
      isDeviceOnlyAuthSupported=false and signInAudience=AzureADMyOrg, 
      indicating internal single-tenant applications.
    - Unlike conditional access or compliance types, application entities carry 
      no policy enforcement attributes; they define identity and authentication 
      surface area.
  entra-conditional-access:
    summary: Conditional Access policies governing authentication requirements 
      across the tenant, with class hierarchies for MFA enforcement and legacy 
      authentication blocking.
    key_differentiators:
    - The largest policy type in the corpus (20 instances) with the most complex
      class hierarchy (3 classes, 2 subclasses) and the lowest base_only_ratio 
      (0.1), indicating highly structured policy patterns.
    - One major class (11 instances) targets all applications via browser and 
      mobile/desktop clients, with a subclass (6 instances) enforcing MFA as an 
      enabled policy.
    - A second class (7 instances) targets all users with an OR grant operator, 
      with a subclass (4 instances) blocking legacy authentication protocols 
      (exchangeActiveSync, other).
    - The only type where `sessionControls.disableResilienceDefaults` appears as
      a shared class-level attribute, reflecting tenant-wide session resilience 
      configuration.
  entra-cross-tenant:
    summary: Cross-tenant access policies defining B2B collaboration and direct 
      connect settings. All 3 instances share identical base attributes with no 
      class differentiation.
    key_differentiators:
    - The most homogeneous type in the corpus (base_only_ratio 1.0) with 
      extensive shared configuration covering inbound/outbound B2B collaboration
      and direct connect for all applications and users.
    - All instances explicitly allow B2B collaboration in both directions while 
      setting isServiceProvider=false, establishing a uniform partner access 
      posture.
    - The only type that defines structured list-valued attributes (targets 
      arrays with target/targetType pairs) in its base class, reflecting the 
      Microsoft Graph cross-tenant access schema.
  entra-group:
    summary: Entra ID security and mail groups with a dominant subclass pattern 
      of security-enabled, non-mail-enabled groups that form the majority of the
      fleet.
    key_differentiators:
    - The most populous type (25 instances), with 19 of them falling into a 
      single subclass that sets securityEnabled=true, mailEnabled=false, and 
      hideFromAddressLists=false.
    - All instances share isSubscribedByMail=true as the sole base class 
      attribute, with all other group characteristics determined at the class or
      instance level.
    - Distinguished from other Entra types by its focus on group membership and 
      visibility settings (external senders, auto-subscription, Outlook 
      visibility) rather than authentication or policy enforcement.
  entra-named-location:
    summary: Named location definitions used as conditions in Conditional Access
      policies. All variation exists at the instance level with an empty base 
      class.
    key_differentiators:
    - The only type with a completely empty base class (base_only_ratio 1.0), 
      meaning every attribute is unique to individual instances -- each named 
      location defines distinct IP ranges or country-based boundaries.
    - The smallest Entra type (6 instances) serving as reference data for 
      conditional access policies rather than enforcing policies directly.
    - Unlike all other types in this corpus, named locations carry no boolean 
      flags or enum settings in shared classes; their value lies entirely in 
      their per-instance network or geographic definitions.
  intune-app-protection:
    summary: Intune App Protection policies enforcing mobile application data 
      transfer restrictions and PIN/compliance requirements across all 4 
      instances.
    key_differentiators:
    - All instances share an unusually rich base class with 10 shared attributes
      covering data transfer controls 
      (allowedOutboundDataTransferDestinations=managedApps), clipboard 
      restrictions, and PIN/compliance requirements.
    - The base_only_ratio of 1.0 means all variation is at the instance level, 
      suggesting these policies differ only in which apps or platforms they 
      target.
    - The only Intune type focused on application-level data loss prevention 
      rather than device-level compliance or configuration.
  intune-compliance:
    summary: Intune device compliance policies defining health and security 
      baselines, with a subclass for Windows-specific firewall and anti-spyware 
      settings.
    key_differentiators:
    - Features composite templates for assignment targets (3 distinct group 
      assignment patterns), making it one of only two types with decomposed 
      structured sub-objects.
    - A subclass of 3 instances explicitly disables firewall, anti-spyware, and 
      healthy device report requirements, suggesting policies tailored for 
      non-Windows or less-restricted device categories.
    - The high base_only_ratio (0.7) indicates most compliance policies share 
      only minimal common attributes (`roleScopeTagIds`, `version`), with 
      significant per-policy variation at the instance level.
  intune-device-config:
    summary: Intune device configuration profiles primarily targeting Android 
      devices, with an extensive base class of 25 shared boolean restrictions 
      covering cellular, storage, web browser, and kiosk settings.
    key_differentiators:
    - Has the largest base class in the corpus (25 attributes), predominantly 
      boolean flags set to false, establishing a permissive baseline that 
      individual profiles can selectively tighten.
    - The dominant class (6 of 8 instances) adds compliantAppListType=none and 
      wiFiBlocked=false, indicating standard Android device profiles without app
      compliance list enforcement.
    - Like intune-compliance, includes composite templates for assignment 
      targets (2 distinct group assignment patterns), enabling reuse of 
      targeting configurations across profiles.
    - The only type whose attributes are almost entirely device-restriction 
      booleans, contrasting with compliance policies that focus on health 
      attestation and app-protection policies that focus on data flow controls.
