version: 1
source_type: iosxr-rr
generated_by: decoct-infer
subjects:
- name: device-identity
  description: Core device identification and contact information.
  include_paths:
  - hostname
  - domain.name
  - snmp-server.contact
  - snmp-server.location
  related_paths:
  - path: hostname
    reason: Device identity
  example_questions:
  - What is the domain name and SNMP contact for each router?
  - Where is each device physically located?
  - What are the hostnames in the network?
- name: aaa-security
  description: Authentication, Authorization, and Accounting settings.
  include_paths:
  - aaa.**
  - line.**
  - ssh.**
  - tacacs-server.**
  - control-plane.management-plane.inband.interface.all.allow.SSH
  related_paths:
  - path: hostname
    reason: Device identity
  example_questions:
  - What are the TACACS+ server settings across all devices?
  - Are there any differences in SSH server configurations?
  - What AAA methods are configured for login and command authorization?
- name: management-interfaces
  description: Configuration for management-specific interfaces, including 
