  - Unit.after
  - Unit.wants
  related_paths:
  - path: hostname
    reason: Device identity
  example_questions:
  - What is the description for this systemd unit?
  - Which units does this unit start after?
  - Which units does this unit want to start?
- name: install-settings
  description: Settings related to how the systemd unit is installed and 
    managed.
  include_paths:
  - Install.wantedby
  related_paths:
