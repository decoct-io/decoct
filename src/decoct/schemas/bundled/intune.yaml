  "**.androidCompliancePolicy.deviceThreatProtectionEnabled": false
  "**.androidCompliancePolicy.deviceThreatProtectionRequiredSecurityLevel": unavailable
  "**.androidCompliancePolicy.securityBlockJailbrokenDevices": false
  "**.androidCompliancePolicy.storageRequireEncryption": false
  "**.androidCompliancePolicy.securityRequireSafetyNetAttestationBasicIntegrity": false
  "**.androidCompliancePolicy.securityRequireSafetyNetAttestationCertifiedDevice": false
