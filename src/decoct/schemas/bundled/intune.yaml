  "**.windows10CompliancePolicy.earlyLaunchAntiMalwareDriverEnabled": false
  "**.windows10CompliancePolicy.bitLockerEnabled": false
  "**.windows10CompliancePolicy.secureBootEnabled": false
  "**.windows10CompliancePolicy.codeIntegrityEnabled": false
  "**.windows10CompliancePolicy.storageRequireEncryption": false

  # ── iOS Compliance Policy ──────────────────────────────────────────────
  "**.iosCompliancePolicy.passcodeRequired": false
  "**.iosCompliancePolicy.passcodeBlockSimple": false
  "**.iosCompliancePolicy.passcodeRequiredType": deviceDefault
  "**.iosCompliancePolicy.securityBlockJailbrokenDevices": false
  "**.iosCompliancePolicy.deviceThreatProtectionEnabled": false
