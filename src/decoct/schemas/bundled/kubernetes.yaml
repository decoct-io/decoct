platform: kubernetes
source: Kubernetes API Reference (v1.29+)
confidence: authoritative
defaults:
  # Pod-level (** matches through spec.template.spec for Deployments)
  "**.restartPolicy": Always
  "**.dnsPolicy": ClusterFirst
  "**.terminationGracePeriodSeconds": 30
  "**.schedulerName": default-scheduler
  "**.serviceAccountName": default
  "**.enableServiceLinks": true
  "**.hostNetwork": false
  "**.hostPID": false
  "**.hostIPC": false

  # Container-level
  "**.containers.*.imagePullPolicy": IfNotPresent
  "**.containers.*.terminationMessagePath": /dev/termination-log
  "**.containers.*.terminationMessagePolicy": File
  "**.containers.*.stdin": false
  "**.containers.*.stdinOnce": false
  "**.containers.*.tty": false

  # Container ports
  "**.containers.*.ports.*.protocol": TCP

  # Container security context
  "**.containers.*.securityContext.privileged": false
  "**.containers.*.securityContext.allowPrivilegeEscalation": true
  "**.containers.*.securityContext.readOnlyRootFilesystem": false

  # Liveness probe
  "**.containers.*.livenessProbe.initialDelaySeconds": 0
  "**.containers.*.livenessProbe.timeoutSeconds": 1
  "**.containers.*.livenessProbe.periodSeconds": 10
  "**.containers.*.livenessProbe.successThreshold": 1
  "**.containers.*.livenessProbe.failureThreshold": 3

  # Readiness probe
  "**.containers.*.readinessProbe.initialDelaySeconds": 0
  "**.containers.*.readinessProbe.timeoutSeconds": 1
  "**.containers.*.readinessProbe.periodSeconds": 10
  "**.containers.*.readinessProbe.successThreshold": 1
  "**.containers.*.readinessProbe.failureThreshold": 3

  # Startup probe
  "**.containers.*.startupProbe.initialDelaySeconds": 0
  "**.containers.*.startupProbe.timeoutSeconds": 1
  "**.containers.*.startupProbe.periodSeconds": 10
  "**.containers.*.startupProbe.successThreshold": 1
  "**.containers.*.startupProbe.failureThreshold": 3

  # Init containers (same defaults)
  "**.initContainers.*.imagePullPolicy": IfNotPresent
  "**.initContainers.*.terminationMessagePath": /dev/termination-log
  "**.initContainers.*.terminationMessagePolicy": File

  # Deployment-level
  spec.replicas: 1
  spec.revisionHistoryLimit: 10
  spec.progressDeadlineSeconds: 600
  spec.minReadySeconds: 0
  spec.paused: false
  spec.strategy.type: RollingUpdate
  spec.strategy.rollingUpdate.maxSurge: 25%
  spec.strategy.rollingUpdate.maxUnavailable: 25%

  # Service-level
  spec.type: ClusterIP
  spec.sessionAffinity: None
  spec.internalTrafficPolicy: Cluster
  spec.ipFamilyPolicy: SingleStack
  "**.ports.*.protocol": TCP
drop_patterns: []
system_managed:
  - metadata.uid
  - metadata.resourceVersion
  - metadata.generation
  - metadata.creationTimestamp
  - metadata.managedFields
  - status
