platform: mongodb
source: MongoDB Manual — Configuration File Options (v8.0)
confidence: authoritative
defaults:
  # storage
  storage.dbPath: /data/db
  storage.engine: wiredTiger
  storage.directoryPerDB: false
  storage.journal.commitIntervalMs: 100

  # systemLog
  systemLog.logAppend: false
  systemLog.logRotate: rename
  systemLog.verbosity: 0

  # net
  net.port: 27017
  net.bindIp: "127.0.0.1"
  net.ipv6: false

  # processManagement
  processManagement.fork: false

  # security
  security.authorization: disabled
  security.javascriptEnabled: true

  # operationProfiling
  operationProfiling.mode: "off"
  operationProfiling.slowOpThresholdMs: 100
drop_patterns: []
system_managed: []
