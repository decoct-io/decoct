platform: ansible-playbook
source: Ansible builtin module documentation
confidence: authoritative
defaults:
  # Playbook-level keywords
  "*.gather_facts": true
  "*.become": false
  "*.any_errors_fatal": false
  "*.ignore_errors": false
  "*.ignore_unreachable": false
  "*.check_mode": false
  "*.no_log": false
  "*.run_once": false
  "*.order": inventory

  # Task-level keywords
  "**.tasks.*.ignore_errors": false
  "**.tasks.*.ignore_unreachable": false
  "**.tasks.*.check_mode": false
  "**.tasks.*.no_log": false
  "**.tasks.*.run_once": false
  "**.tasks.*.become": false

  # ansible.builtin.apt
  "**.apt.state": present
  "**.apt.update_cache": false
  "**.apt.force": false
  "**.apt.purge": false
  "**.apt.autoremove": false
  "**.apt.autoclean": false
  "**.apt.only_upgrade": false
  "**.apt.force_apt_get": false
  "**.apt.allow_unauthenticated": false
  "**.apt.allow_downgrade": false
  "**.apt.fail_on_autoremove": false
  "**.apt.lock_timeout": 60
  "**.apt.cache_valid_time": 0

  # ansible.builtin.dnf / yum
  "**.dnf.state": present
  "**.dnf.update_cache": false
  "**.dnf.allow_downgrade": false
  "**.dnf.autoremove": false
  "**.dnf.disable_gpg_check": false
  "**.dnf.download_only": false
  "**.dnf.install_weak_deps": true
  "**.dnf.lock_timeout": 30
  "**.dnf.security": false
  "**.dnf.skip_broken": false
  "**.dnf.sslverify": true
  "**.dnf.update_only": false
  "**.dnf.validate_certs": true
  "**.yum.state": present
  "**.yum.update_cache": false
  "**.yum.disable_gpg_check": false
  "**.yum.validate_certs": true
  "**.yum.lock_timeout": 30

  # ansible.builtin.systemd
  "**.systemd.daemon_reload": false
  "**.systemd.daemon_reexec": false
  "**.systemd.no_block": false
  "**.systemd.scope": system

  # ansible.builtin.copy
  "**.copy.backup": false
  "**.copy.decrypt": true
  "**.copy.follow": false
  "**.copy.force": true
  "**.copy.remote_src": false
  "**.copy.unsafe_writes": false

  # ansible.builtin.file
  "**.file.follow": true
  "**.file.force": false
  "**.file.recurse": false
  "**.file.unsafe_writes": false

  # ansible.builtin.template
  "**.template.backup": false
  "**.template.follow": false
  "**.template.force": true
  "**.template.lstrip_blocks": false
  "**.template.trim_blocks": true
  "**.template.unsafe_writes": false
  "**.template.output_encoding": utf-8

  # ansible.builtin.user
  "**.user.state": present
  "**.user.system": false
  "**.user.create_home": true
  "**.user.append": false
  "**.user.force": false
  "**.user.generate_ssh_key": false
  "**.user.move_home": false
  "**.user.non_unique": false
  "**.user.remove": false
  "**.user.update_password": always

  # ansible.builtin.group
  "**.group.state": present
  "**.group.system": false
  "**.group.force": false
  "**.group.non_unique": false

  # ansible.builtin.lineinfile
  "**.lineinfile.state": present
  "**.lineinfile.create": false
  "**.lineinfile.backup": false
  "**.lineinfile.backrefs": false
  "**.lineinfile.firstmatch": false
  "**.lineinfile.unsafe_writes": false

  # ansible.builtin.pip
  "**.pip.state": present
  "**.pip.editable": false
  "**.pip.break_system_packages": false
  "**.pip.virtualenv_site_packages": false

  # ansible.builtin.git
  "**.git.bare": false
  "**.git.clone": true
  "**.git.force": false
  "**.git.recursive": true
  "**.git.remote": origin
  "**.git.track_submodules": false
  "**.git.update": true
  "**.git.verify_commit": false
  "**.git.version": HEAD
  "**.git.accept_hostkey": false

  # ansible.builtin.get_url
  "**.get_url.backup": false
  "**.get_url.force": false
  "**.get_url.force_basic_auth": false
  "**.get_url.timeout": 10
  "**.get_url.unsafe_writes": false
  "**.get_url.use_proxy": true
  "**.get_url.validate_certs": true

  # ansible.builtin.uri
  "**.uri.method": GET
  "**.uri.follow_redirects": safe
  "**.uri.force": false
  "**.uri.force_basic_auth": false
  "**.uri.return_content": false
  "**.uri.timeout": 30
  "**.uri.use_proxy": true
  "**.uri.validate_certs": true

  # ansible.builtin.cron
  "**.cron.state": present
  "**.cron.backup": false
  "**.cron.disabled": false

  # ansible.builtin.stat
  "**.stat.follow": false
  "**.stat.get_attributes": true
  "**.stat.get_checksum": true
  "**.stat.get_mime": true

  # ansible.builtin.unarchive
  "**.unarchive.remote_src": false
  "**.unarchive.keep_newer": false
  "**.unarchive.list_files": false
  "**.unarchive.validate_certs": true

  # ansible.builtin.wait_for
  "**.wait_for.connect_timeout": 5
  "**.wait_for.delay": 0
  "**.wait_for.sleep": 1
  "**.wait_for.state": started
  "**.wait_for.timeout": 300
drop_patterns: []
system_managed: []
