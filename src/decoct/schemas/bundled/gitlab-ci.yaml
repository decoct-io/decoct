platform: gitlab-ci
source: GitLab CI/CD YAML syntax reference + CI/CD settings documentation
confidence: authoritative
defaults:
  # Job-level defaults
  "*.when": on_success
  "*.allow_failure": false
  "*.interruptible": false

  # Retry
  "*.retry": 0
  "*.retry.max": 0

  # Artifacts
  "*.artifacts.when": on_success
  "*.artifacts.expire_in": 30 days
  "*.artifacts.public": true
  "*.artifacts.access": all

  # Cache
  "*.cache.key": default
  "*.cache.policy": pull-push
  "*.cache.when": on_success
  "*.cache.untracked": false
  "*.cache.unprotect": false
  "*.cache.fallback_keys": []

  # Strategy
  "*.strategy.fail-fast": true

  # Services
  "*.services.*.pull_policy": always

  # Environment
  "*.environment.action": start
  "*.environment.auto_stop_in": never

  # Coverage
  "*.coverage": ""

  # Pages
  "*.pages.publish": public

  # Release
  "*.release.tag_message": ""

  # Trigger
  "*.trigger.strategy": depend

  # Inherit
  "*.inherit.default": true
  "*.inherit.variables": true
drop_patterns: []
system_managed: []
