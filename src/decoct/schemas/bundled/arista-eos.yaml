platform: arista-eos
source: Arista EOS Configuration Guide (4.32.x) + show running-config all analysis + OpenConfig YANG augmentations
confidence: high
defaults:
  # Interface defaults
  interface.*.shutdown: true
  interface.*.mtu: 1500
  interface.*.speed: auto
  interface.*.duplex: auto
  interface.*.switchport: enabled
  interface.*.switchport.mode: access
  interface.*.spanning-tree.portfast: disabled
  interface.*.spanning-tree.bpduguard: disabled
  interface.*.spanning-tree.bpdufilter: disabled
  interface.*.spanning-tree.guard: none
  interface.*.flowcontrol.receive: off
  interface.*.flowcontrol.send: off
  interface.*.snmp.trap.link-status: true
  interface.*.load-interval: 300
  interface.*.ip.proxy-arp: false
  interface.*.ip.local-proxy-arp: false
  interface.*.ip.directed-broadcast: false
  interface.*.lldp.transmit: true
  interface.*.lldp.receive: true
  interface.*.arp.aging.timeout: 14400

  # Ethernet interface defaults (9214 MTU on some platforms)
  interface.Ethernet.*.channel-group.mode: "on"
  interface.Ethernet.*.lacp.rate: normal

  # BGP defaults
  router.bgp.*.timers.keepalive: 60
  router.bgp.*.timers.holdtime: 180
  router.bgp.*.maximum-paths: 1
  router.bgp.*.maximum-paths.ecmp: 1
  router.bgp.*.distance.external: 20
  router.bgp.*.distance.internal: 200
  router.bgp.*.distance.local: 200
  router.bgp.*.bestpath.as-path.multipath-relax: disabled
  router.bgp.*.bestpath.compare-routerid: false
  router.bgp.*.bestpath.med.missing-as-worst: false
  router.bgp.*.graceful-restart: disabled
  router.bgp.*.graceful-restart.restart-time: 300
  router.bgp.*.graceful-restart.stalepath-time: 300
  router.bgp.*.neighbor.*.timers.keepalive: 60
  router.bgp.*.neighbor.*.timers.holdtime: 180
  router.bgp.*.neighbor.*.send-community: false
  router.bgp.*.neighbor.*.next-hop-self: false
  router.bgp.*.neighbor.*.passive: false
  router.bgp.*.log-neighbor-changes: false

  # OSPF defaults
  # OSPF auto-cost reference-bandwidth is not set by default; flat cost of 10 for all Ethernet
  router.ospf.*.timers.throttle.spf: "0 5000 5000"
  router.ospf.*.timers.throttle.lsa: "0 5000 5000"
  router.ospf.*.max-lsa: 12000
  router.ospf.*.maximum-paths: 128
  router.ospf.*.distance: 110
  "**.ospf.*.hello-interval": 10
  "**.ospf.*.dead-interval": 40
  "**.ospf.*.retransmit-interval": 5
  "**.ospf.*.transmit-delay": 1
  "**.ospf.*.cost": 10

  # Spanning-tree defaults
  spanning-tree.mode: mstp
  spanning-tree.priority: 32768
  spanning-tree.hello-time: 2
  spanning-tree.forward-time: 15
  spanning-tree.max-age: 20
  spanning-tree.mst.0.priority: 32768

  # MLAG defaults
  mlag.heartbeat-interval: 4000
  mlag.reload-delay.mode: none
  mlag.reload-delay.non-mlag: 0
  mlag.reload-delay.mlag: 0
  mlag.peer-link: none
  mlag.dual-primary-detection: disabled

  # Global routing defaults
  ip.routing: disabled
  ipv6.unicast-routing: disabled
  service.routing.protocols.model: multi-agent
  ip.virtual-router.mac-address: none
  ip.hardware.fib.next-hop-group.sharing: false

  # LLDP defaults
  lldp.run: false
  lldp.timer: 30
  lldp.hold-time: 120
  lldp.reinit: 2
  lldp.management-address: all
  lldp.tlv-select.link-aggregation: true
  lldp.tlv-select.management-address: true
  lldp.tlv-select.port-description: true
  lldp.tlv-select.port-vlan: true
  lldp.tlv-select.system-capabilities: true
  lldp.tlv-select.system-description: true
  lldp.tlv-select.system-name: true

  # Logging defaults
  logging.console: errors
  logging.monitor: debugging
  logging.buffered.severity: warnings
  logging.buffered.size: 32
  logging.synchronous.level: errors
  logging.trap: informational

  # AAA defaults
  aaa.authorization.exec.default: local

  # Management API defaults
  management.api.http-commands: disabled
  management.api.http-commands.protocol.https: true
  management.api.http-commands.protocol.http: false

  # NTP defaults
  ntp.authenticate: false
  ntp.local-interface: none

  # SNMP defaults
  snmp-server.contact: ""
  snmp-server.location: ""
  snmp-server.chassis-id: ""

  # ACL defaults
  ip.access-list.*.default-action: deny

  # VXLAN defaults
  interface.Vxlan.*.vxlan.udp-port: 4789
  interface.Vxlan.*.vxlan.flood-vtep: disabled

drop_patterns: []
system_managed:
  - "**.uptime"
  - "**.last-change"
  - "**.counters"
  - "**.input-packets"
  - "**.output-packets"
  - "**.input-errors"
  - "**.output-errors"
  - "**.input-bytes"
  - "**.output-bytes"
  - "**.carrier-transitions"
  - "**.last-clear"
