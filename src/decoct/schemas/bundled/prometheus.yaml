platform: prometheus
source: Prometheus source code (config/config.go) + configuration reference
confidence: authoritative
defaults:
  # Global
  global.scrape_interval: 1m
  global.scrape_timeout: 10s
  global.evaluation_interval: 1m
  global.body_size_limit: 0
  global.sample_limit: 0
  global.label_limit: 0
  global.label_name_length_limit: 0
  global.label_value_length_limit: 0
  global.target_limit: 0
  global.keep_dropped_targets: 0
  global.scrape_native_histograms: false

  # Scrape configs
  scrape_configs.*.scrape_interval: 1m
  scrape_configs.*.scrape_timeout: 10s
  scrape_configs.*.metrics_path: /metrics
  scrape_configs.*.scheme: http
  scrape_configs.*.honor_labels: false
  scrape_configs.*.honor_timestamps: true
  scrape_configs.*.track_timestamps_staleness: false
  scrape_configs.*.enable_compression: true
  scrape_configs.*.follow_redirects: true
  scrape_configs.*.enable_http2: true
  scrape_configs.*.body_size_limit: 0
  scrape_configs.*.sample_limit: 0
  scrape_configs.*.label_limit: 0
  scrape_configs.*.label_name_length_limit: 0
  scrape_configs.*.label_value_length_limit: 0
  scrape_configs.*.target_limit: 0
  scrape_configs.*.keep_dropped_targets: 0

  # Relabel configs
  scrape_configs.*.relabel_configs.*.action: replace
  scrape_configs.*.relabel_configs.*.separator: ";"
  scrape_configs.*.metric_relabel_configs.*.action: replace
  scrape_configs.*.metric_relabel_configs.*.separator: ";"

  # Alerting — alertmanagers
  alerting.alertmanagers.*.scheme: http
  alerting.alertmanagers.*.timeout: 10s
  alerting.alertmanagers.*.api_version: v2
  alerting.alertmanagers.*.follow_redirects: true
  alerting.alertmanagers.*.enable_http2: true
  alerting.alertmanagers.*.relabel_configs.*.action: replace
  alerting.alertmanagers.*.relabel_configs.*.separator: ";"

  # Remote write
  remote_write.*.remote_timeout: 30s
  remote_write.*.send_exemplars: false
  remote_write.*.send_native_histograms: false
  remote_write.*.follow_redirects: true
  remote_write.*.enable_http2: false
  remote_write.*.queue_config.capacity: 10000
  remote_write.*.queue_config.max_shards: 50
  remote_write.*.queue_config.min_shards: 1
  remote_write.*.queue_config.max_samples_per_send: 2000
  remote_write.*.queue_config.batch_send_deadline: 5s
  remote_write.*.queue_config.min_backoff: 30ms
  remote_write.*.queue_config.max_backoff: 5s
  remote_write.*.queue_config.retry_on_http_429: false
  remote_write.*.metadata_config.send: true
  remote_write.*.metadata_config.send_interval: 1m
  remote_write.*.metadata_config.max_samples_per_send: 2000
  remote_write.*.write_relabel_configs.*.action: replace
  remote_write.*.write_relabel_configs.*.separator: ";"

  # Remote read
  remote_read.*.remote_timeout: 1m
  remote_read.*.read_recent: false
  remote_read.*.filter_external_labels: true
  remote_read.*.follow_redirects: true
  remote_read.*.enable_http2: true
drop_patterns: []
system_managed: []
