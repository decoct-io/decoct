platform: grafana
source: Grafana defaults.ini (github.com/grafana/grafana/blob/main/conf/defaults.ini)
confidence: authoritative
defaults:
  # server
  server.protocol: http
  server.http_port: 3000
  server.domain: localhost
  server.enforce_domain: false
  server.serve_from_sub_path: false
  server.router_logging: false
  server.static_root_path: public
  server.enable_gzip: false
  server.socket_gid: -1
  server.socket_mode: "0660"
  server.socket: /tmp/grafana.sock
  server.serve_on_socket: false
  server.read_timeout: 0

  # database
  database.type: sqlite3
  database.host: "127.0.0.1:3306"
  database.name: grafana
  database.user: root
  database.ssl_mode: disable
  database.path: grafana.db
  database.cache_mode: private
  database.wal: false
  database.max_idle_conn: 2
  database.conn_max_lifetime: 14400
  database.migration_locking: true
  database.locking_attempt_timeout_sec: 0
  database.query_retries: 0
  database.transaction_retries: 5
  database.high_availability: true
  database.instrument_queries: false
  database.skip_migrations: false
  database.ensure_default_org_and_user: true

  # remote_cache
  remote_cache.type: database

  # security
  security.disable_initial_admin_creation: false
  security.admin_user: admin
  security.admin_email: admin@localhost
  security.disable_gravatar: false
  security.disable_brute_force_login_protection: false
  security.brute_force_login_protection_max_attempts: 5
  security.disable_username_login_protection: false
  security.disable_ip_address_login_protection: true
  security.cookie_secure: false
  security.cookie_samesite: lax
  security.allow_embedding: false
  security.strict_transport_security: false
  security.strict_transport_security_max_age_seconds: 86400
  security.strict_transport_security_preload: false
  security.strict_transport_security_subdomains: false
  security.x_content_type_options: true
  security.x_xss_protection: true
  security.content_security_policy: false
  security.content_security_policy_report_only: false
  security.csrf_always_check: false

  # snapshots
  snapshots.enabled: true
  snapshots.external_enabled: true
  snapshots.public_mode: false

  # dashboards
  dashboards.versions_to_keep: 20
  dashboards.min_refresh_interval: 5s

  # users
  users.allow_sign_up: false
  users.allow_org_create: false
  users.auto_assign_org: true
  users.auto_assign_org_id: 1
  users.auto_assign_org_role: Viewer
  users.verify_email_enabled: false
  users.default_theme: dark
  users.default_language: en-US
  users.viewers_can_edit: false
  users.user_invite_max_lifetime_duration: 24h
  users.verification_email_max_lifetime_duration: 1h
  users.last_seen_update_interval: 15m

  # auth
  auth.login_cookie_name: grafana_session
  auth.disable_login: false
  auth.token_rotation_interval_minutes: 10
  auth.disable_login_form: false
  auth.disable_signout_menu: false
  auth.oauth_auto_login: false
  auth.oauth_state_cookie_max_age: 600
  auth.api_key_max_seconds_to_live: -1
  auth.sigv4_auth_enabled: false
  auth.sigv4_verbose_logging: false
  auth.azure_auth_enabled: false
  auth.oauth_allow_insecure_email_lookup: false
  auth.id_response_header_enabled: false
  auth.managed_service_accounts_enabled: false

  # auth.anonymous
  auth.anonymous.enabled: false
  auth.anonymous.org_role: Viewer
  auth.anonymous.hide_version: false

  # auth.basic
  auth.basic.enabled: true
  auth.basic.password_policy: false

  # auth.proxy
  auth.proxy.enabled: false
  auth.proxy.header_name: X-WEBAUTH-USER
  auth.proxy.header_property: username
  auth.proxy.auto_sign_up: true
  auth.proxy.sync_ttl: 15
  auth.proxy.headers_encoded: false
  auth.proxy.enable_login_token: false

  # smtp
  smtp.enabled: false
  smtp.host: "localhost:25"
  smtp.skip_verify: false
  smtp.from_address: admin@grafana.localhost
  smtp.from_name: Grafana
  smtp.enable_tracing: false

  # emails
  emails.welcome_email_on_sign_up: false
  emails.content_types: text/html

  # log
  log.level: info
  log.console.format: console
  log.file.format: text
  log.file.log_rotate: true
  log.file.max_lines: 1000000
  log.file.max_size_shift: 28
  log.file.daily_rotate: true
  log.file.max_days: 7

  # alerting (unified)
  unified_alerting.initialization_timeout: 30s
  unified_alerting.admin_config_poll_interval: 60s
  unified_alerting.alertmanager_config_poll_interval: 60s
  unified_alerting.ha_peer_timeout: 15s
  unified_alerting.ha_gossip_interval: 200ms
  unified_alerting.ha_push_pull_interval: 60s
  unified_alerting.ha_single_node_evaluation: false
  unified_alerting.execute_alerts: true
  unified_alerting.evaluation_timeout: 30s
  unified_alerting.max_attempts: 3
  unified_alerting.min_interval: 10s
  unified_alerting.disable_jitter: false
  unified_alerting.notification_log_retention: 5d
  unified_alerting.resolved_alert_retention: 15m
  unified_alerting.screenshots.capture: false
  unified_alerting.screenshots.capture_timeout: 10s
  unified_alerting.screenshots.max_concurrent_screenshots: 5
  unified_alerting.screenshots.upload_external_image_storage: false

  # explore
  explore.enabled: true
  explore.defaultTimeOffset: 1h
  explore.hide_logs_download: false

  # help / profile / query_history
  help.enabled: true
  profile.enabled: true
  query_history.enabled: true

  # metrics
  metrics.enabled: true
  metrics.interval_seconds: 10
  metrics.disable_total_stats: false
  metrics.total_stats_collector_interval_seconds: 1800
  metrics.classic_http_histogram_enabled: true

  # date_formats
  date_formats.full_date: "YYYY-MM-DD HH:mm:ss"
  date_formats.use_browser_locale: false
  date_formats.default_timezone: browser

  # expressions
  expressions.enabled: true

  # panels
  panels.enable_alpha: false
  panels.disable_sanitize_html: false

  # plugins
  plugins.enable_alpha: false
  plugins.app_tls_skip_verify_insecure: false
  plugins.plugin_admin_enabled: true
  plugins.plugin_admin_external_manage_enabled: false
  plugins.log_backend_requests: false
  plugins.public_key_retrieval_disabled: false
  plugins.public_key_retrieval_on_startup: false
  plugins.preinstall_disabled: false
  plugins.preinstall_auto_update: true
  plugins.update_strategy: minor

  # live
  live.max_connections: 100
  live.message_size_limit: 8388608
  live.client_queue_max_size: 4194304

  # paths
  paths.temp_data_lifetime: 24h

  # annotations
  annotations.cleanupjob_batchsize: 100
  annotations.tags_length: 500
drop_patterns: []
system_managed: []
