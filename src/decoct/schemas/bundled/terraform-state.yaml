platform: terraform-state
source: Terraform state file format v4
confidence: authoritative
defaults: {}
drop_patterns: []
system_managed:
  - version
  - serial
  - lineage
  - terraform_version
  - outputs.*.type
  - resources.*.instances.*.schema_version
  - resources.*.instances.*.sensitive_attributes
  - resources.*.instances.*.private
  - resources.*.instances.*.dependencies
