platform: fluent-bit
source: Fluent Bit Official Manual — Service, Input, Output, Filter configuration reference
confidence: authoritative
defaults:
  # SERVICE section
  service.flush: 1
  service.daemon: "off"
  service.log_level: info
  service.grace: 5
  service.http_server: "off"
  service.http_listen: "0.0.0.0"
  service.http_port: 2020
  service.health_check: "off"
  service.hc_errors_count: 5
  service.hc_period: 60
  service.hc_retry_failure_count: 5
  service.hot_reload: "on"
  service.hot_reload.ensure_thread_safety: "on"
  service.hot_reload.timeout: 0
  service.coro_stack_size: 24576
  service.scheduler.base: 5
  service.scheduler.cap: 2000
  service.json.convert_nan_to_null: false
  service.json.escape_unicode: true
  service.sp.convert_from_str_to_num: true
  service.dns.mode: UDP
  service.dns.prefer_ipv4: "off"
  service.dns.prefer_ipv6: "off"
  service.enable_chunk_trace: "off"
  service.multiline_buffer_limit: 2MB
  service.windows.maxstdio: 512

  # Tail input plugin
  pipeline.inputs.*.buffer_chunk_size: 32k
  pipeline.inputs.*.buffer_max_size: 32k
  pipeline.inputs.*.skip_long_lines: false
  pipeline.inputs.*.skip_empty_lines: false
  pipeline.inputs.*.refresh_interval: 60
  pipeline.inputs.*.rotate_wait: 5
  pipeline.inputs.*.read_from_head: false
  pipeline.inputs.*.read_newly_discovered_files_from_head: true
  pipeline.inputs.*.docker_mode: false
  pipeline.inputs.*.docker_mode_flush: 4
  pipeline.inputs.*.db.journal_mode: wal
  pipeline.inputs.*.db.sync: normal
  pipeline.inputs.*.db.locking: false
  pipeline.inputs.*.db.compare_filename: false
  pipeline.inputs.*.exit_on_eof: false
  pipeline.inputs.*.inotify_watcher: true
  pipeline.inputs.*.file_cache_advise: true
  pipeline.inputs.*.threaded: false
  pipeline.inputs.*.truncate_long_lines: false
  pipeline.inputs.*.ignore_active_older_files: false
  pipeline.inputs.*.key: log
  pipeline.inputs.*.event_batch_size: 50M
  pipeline.inputs.*.static_batch_size: 50M
  pipeline.inputs.*.progress_check_interval: 2s
  pipeline.inputs.*.progress_check_interval_nsec: 0
  pipeline.inputs.*.watcher_interval: 2s

  # Output plugin common defaults
  pipeline.outputs.*.retry_limit: 1
  pipeline.outputs.*.workers: 2

  # Forward output
  pipeline.outputs.*.host: "127.0.0.1"
  pipeline.outputs.*.port: 24224
  pipeline.outputs.*.time_as_integer: false
  pipeline.outputs.*.send_options: false
  pipeline.outputs.*.require_ack_response: false
  pipeline.outputs.*.empty_shared_key: false
  pipeline.outputs.*.self_hostname: localhost
  pipeline.outputs.*.tls: "off"
  pipeline.outputs.*.tls.verify: "on"
  pipeline.outputs.*.tls.debug: 1

  # Networking defaults
  pipeline.outputs.*.net.connect_timeout: 10s
  pipeline.outputs.*.net.connect_timeout_log_error: true
  pipeline.outputs.*.net.io_timeout: 0s
  pipeline.outputs.*.net.keepalive: true
  pipeline.outputs.*.net.keepalive_idle_timeout: 30s
  pipeline.outputs.*.net.keepalive_max_recycle: 2000
  pipeline.outputs.*.net.max_worker_connections: 0
  pipeline.outputs.*.net.proxy_env_ignore: false
  pipeline.outputs.*.net.tcp_keepalive: "off"
  pipeline.outputs.*.net.dns.prefer_ipv4: false
  pipeline.outputs.*.net.dns.prefer_ipv6: false
drop_patterns: []
system_managed: []
