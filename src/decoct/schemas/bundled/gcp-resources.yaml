platform: gcp-resources
source: GCP REST API Reference + Google Cloud Documentation
confidence: authoritative
defaults:
  # --- Compute Engine: Instance scheduling ---
  "**.scheduling.automaticRestart": true
  "**.scheduling.onHostMaintenance": MIGRATE
  "**.scheduling.preemptible": false
  "**.scheduling.provisioningModel": STANDARD

  # --- Compute Engine: Instance properties ---
  "**.canIpForward": false
  "**.deletionProtection": false
  "**.startRestricted": false

  # --- Compute Engine: Network interface ---
  "**.networkInterfaces.*.stackType": IPV4_ONLY

  # --- Compute Engine: Attached disks ---
  "**.disks.*.autoDelete": true
  "**.disks.*.mode": READ_WRITE
  "**.disks.*.type": PERSISTENT

  # --- GKE: Cluster ---
  "**.initialNodeCount": 3
  "**.loggingService": logging.googleapis.com/kubernetes
  "**.monitoringService": monitoring.googleapis.com/kubernetes
  "**.enableShieldedNodes": true

  # --- GKE: Cluster addons ---
  "**.addonsConfig.httpLoadBalancing.disabled": false
  "**.addonsConfig.horizontalPodAutoscaling.disabled": false
  "**.addonsConfig.dnsCacheConfig.enabled": false
  "**.addonsConfig.gcePersistentDiskCsiDriverConfig.enabled": true

  # --- GKE: Node pool ---
  "**.nodeConfig.diskType": pd-balanced
  "**.nodeConfig.diskSizeGb": 100
  "**.nodeConfig.imageType": COS_CONTAINERD
  "**.nodeConfig.metadata.disable-legacy-endpoints": "true"
  "**.nodeConfig.oauthScopes": ["https://www.googleapis.com/auth/devstorage.read_only", "https://www.googleapis.com/auth/logging.write", "https://www.googleapis.com/auth/monitoring", "https://www.googleapis.com/auth/servicecontrol", "https://www.googleapis.com/auth/service.management.readonly", "https://www.googleapis.com/auth/trace.append"]
  "**.management.autoRepair": true
  "**.management.autoUpgrade": true
  "**.upgradeSettings.maxSurge": 1
  "**.upgradeSettings.maxUnavailable": 0

  # --- Cloud SQL ---
  "**.settings.activationPolicy": ALWAYS
  "**.settings.diskType": PD_SSD
  "**.settings.diskAutoresize": true
  "**.settings.availabilityType": ZONAL
  "**.settings.pricingPlan": PER_USE

  # --- Cloud Storage: Buckets ---
  "**.storageClass": STANDARD
  "**.iamConfiguration.uniformBucketLevelAccess.enabled": false
  "**.versioning.enabled": false
  "**.location": US

  # --- Cloud Run ---
  "**.template.spec.containerConcurrency": 80
  "**.template.spec.timeoutSeconds": 300
  "**.template.spec.containers.*.ports.*.containerPort": 8080

  # --- Cloud Functions ---
  "**.timeout": 60s
  "**.availableMemoryMb": 256

drop_patterns: []
system_managed:
  - "**.id"
  - "**.selfLink"
  - "**.creationTimestamp"
  - "**.status"
  - "**.fingerprint"
  - "**.zone"
  - "**.labelFingerprint"
