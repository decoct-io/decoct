platform: cisco-ios-xr
source: Cisco IOS XR YANG models (vendor/cisco/xr, 7.x) + IOS XR Configuration Guides
confidence: high
defaults:
  # Interface defaults — note MTU 1514 differs from IOS XE
  interface.*.shutdown: true
  interface.*.mtu: 1514
  interface.*.cdp: enabled
  interface.*.bandwidth: 100000
  interface.*.load-interval: 300
  interface.*.keepalive.interval: 10
  interface.*.dampening.enabled: false
  interface.*.ipv4.directed-broadcast: false
  interface.*.ipv4.icmp.unreachables: true
  interface.*.ipv4.redirects: true
  interface.*.ipv4.mask-reply: false
  interface.*.ipv4.proxy-arp: false
  interface.*.carrier-delay.up: 0
  interface.*.carrier-delay.down: 0
  interface.*.arp.timeout: 14400

  # Bundle/LAG interface defaults
  interface.Bundle-Ether.*.lacp.period: 30
  interface.Bundle-Ether.*.bundle.minimum-active.links: 1
  interface.Bundle-Ether.*.bundle.maximum-active.links: 64
  interface.Bundle-Ether.*.bundle.wait-while: 2000

  # BGP defaults
  router.bgp.*.timers.keepalive: 60
  router.bgp.*.timers.holdtime: 180
  router.bgp.*.maximum-paths.ebgp: 1
  router.bgp.*.maximum-paths.ibgp: 1
  router.bgp.*.default-metric: 0
  router.bgp.*.bestpath.compare-routerid: false
  router.bgp.*.bestpath.med.missing-as-worst: false
  router.bgp.*.bestpath.as-path.multipath-relax: false
  router.bgp.*.distance.external: 20
  router.bgp.*.distance.internal: 200
  router.bgp.*.distance.local: 200
  router.bgp.*.neighbor.*.advertisement-interval: 30
  router.bgp.*.neighbor.*.timers.keepalive: 60
  router.bgp.*.neighbor.*.timers.holdtime: 180
  router.bgp.*.neighbor.*.soft-reconfiguration.inbound: false
  router.bgp.*.nsr: false
  router.bgp.*.graceful-restart: false

  # OSPF defaults
  router.ospf.*.auto-cost.reference-bandwidth: 100
  router.ospf.*.timers.throttle.spf: "50 200 5000"
  router.ospf.*.timers.throttle.lsa.all: "50 200 5000"
  router.ospf.*.distance: 110
  router.ospf.*.maximum-paths: 16
  router.ospf.*.max-lsa: 75000
  "**.ospf.*.hello-interval": 10
  "**.ospf.*.dead-interval": 40
  "**.ospf.*.retransmit-interval": 5
  "**.ospf.*.transmit-delay": 1
  "**.ospf.*.cost": 1
  "**.ospf.*.priority": 1

  # IS-IS defaults
  router.isis.*.metric-style: narrow
  router.isis.*.lsp-mtu: 1497
  router.isis.*.lsp-lifetime: 1200
  router.isis.*.lsp-refresh-interval: 900
  router.isis.*.max-lsp-lifetime: 65535
  "**.isis.*.hello-interval": 10
  "**.isis.*.hello-multiplier": 3
  "**.isis.*.csnp-interval": 10
  "**.isis.*.retransmit-interval": 5
  "**.isis.*.metric": 10

  # MPLS defaults
  mpls.ldp.router-id: "0.0.0.0"
  mpls.ldp.discovery.hello.interval: 5
  mpls.ldp.discovery.hello.hold-time: 15
  mpls.ldp.discovery.targeted-hello.interval: 10
  mpls.ldp.discovery.targeted-hello.hold-time: 90
  mpls.ldp.graceful-restart: false
  mpls.label.protocol: ldp

  # Logging defaults
  logging.console.severity: informational
  logging.monitor.severity: debugging
  logging.trap.severity: informational
  logging.buffered.severity: debugging
  logging.buffered.size: 307200
  logging.source-interface: none
  logging.events.link-status: true

  # SSH / security defaults
  ssh.server.enabled: false
  ssh.server.timeout: 30
  ssh.server.rate-limit: 60
  ssh.server.v2: false
  ssh.server.logging: false

  # AAA defaults
  aaa.accounting.exec.default: none
  aaa.authorization.exec.default: none

  # NTP defaults
  ntp.enabled: false
  ntp.update-calendar: false

  # Control-plane defaults
  control-plane.management-plane.inband.interface.*.allow.all: false

drop_patterns: []
system_managed:
  - "**.last-modified"
  - "**.creation-time"
  - "**.input-packets"
  - "**.output-packets"
  - "**.input-errors"
  - "**.output-errors"
  - "**.state-transitions"
  - "**.uptime"
  - "**.bandwidth-utilization"
  - "**.rate"
