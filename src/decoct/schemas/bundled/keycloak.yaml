platform: keycloak
source: Keycloak Server Administration Guide + REST API (RealmRepresentation, ClientRepresentation) + source code Constants.java
confidence: authoritative
defaults:
  # Realm — general
  enabled: true
  sslRequired: external
  registrationAllowed: false
  registrationEmailAsUsername: false
  editUsernameAllowed: false
  resetPasswordAllowed: false
  rememberMe: false
  verifyEmail: false
  loginWithEmailAllowed: true
  duplicateEmailsAllowed: false
  internationalizationEnabled: false
  userManagedAccessAllowed: false
  organizationsEnabled: false

  # Realm — token lifespans (seconds)
  accessTokenLifespan: 300
  accessTokenLifespanForImplicitFlow: 900
  ssoSessionIdleTimeout: 1800
  ssoSessionMaxLifespan: 36000
  ssoSessionIdleTimeoutRememberMe: 0
  ssoSessionMaxLifespanRememberMe: 0
  offlineSessionIdleTimeout: 2592000
  offlineSessionMaxLifespan: 5184000
  offlineSessionMaxLifespanEnabled: false
  clientSessionIdleTimeout: 0
  clientSessionMaxLifespan: 0
  accessCodeLifespan: 60
  accessCodeLifespanLogin: 1800
  accessCodeLifespanUserAction: 300

  # Realm — action tokens (seconds)
  actionTokenGeneratedByAdminLifespan: 43200
  actionTokenGeneratedByUserLifespan: 300

  # Realm — refresh tokens
  revokeRefreshToken: false
  refreshTokenMaxReuse: 0

  # Realm — brute force protection
  bruteForceProtected: false
  permanentLockout: false
  failureFactor: 30
  waitIncrementSeconds: 60
  minimumQuickLoginWaitSeconds: 60
  quickLoginCheckMilliSeconds: 1000
  maxFailureWaitSeconds: 900
  maxDeltaTimeSeconds: 43200

  # Realm — events
  eventsEnabled: false
  adminEventsEnabled: false
  adminEventsDetailsEnabled: false
  eventsExpiration: 0

  # Realm — OTP policy
  otpPolicyType: totp
  otpPolicyAlgorithm: HmacSHA1
  otpPolicyDigits: 6
  otpPolicyPeriod: 30
  otpPolicyInitialCounter: 0
  otpPolicyLookAheadWindow: 1

  # Client defaults
  clients.*.enabled: true
  clients.*.publicClient: false
  clients.*.bearerOnly: false
  clients.*.consentRequired: false
  clients.*.standardFlowEnabled: true
  clients.*.implicitFlowEnabled: false
  clients.*.directAccessGrantsEnabled: true
  clients.*.serviceAccountsEnabled: false
  clients.*.fullScopeAllowed: true
  clients.*.frontchannelLogout: false
  clients.*.surrogateAuthRequired: false
  clients.*.alwaysDisplayInConsole: false
  clients.*.nodeReRegistrationTimeout: -1

  # Client — protocol
  clients.*.protocol: openid-connect

  # Scope mappings
  scopeMappings.*.consentRequired: false

  # Identity provider defaults
  identityProviders.*.enabled: true
  identityProviders.*.trustEmail: false
  identityProviders.*.storeToken: false
  identityProviders.*.addReadTokenRoleOnCreate: false
  identityProviders.*.linkOnly: false

  # Realm — password policy (empty = no policy)
  passwordPolicy: ""

  # Realm — WebAuthn
  webAuthnPolicyRpEntityName: keycloak
  webAuthnPolicyAttestationConveyancePreference: not specified
  webAuthnPolicyAuthenticatorAttachment: not specified
  webAuthnPolicyRequireResidentKey: not specified
  webAuthnPolicyUserVerificationRequirement: not specified
  webAuthnPolicySignatureAlgorithms:
    - ES256
  webAuthnPolicyCreateTimeout: 0
  webAuthnPolicyAvoidSameAuthenticatorRegister: false
drop_patterns: []
system_managed:
  - "**.id"
  - "**.internalId"
  - "**.containerId"
  - clients.*.registeredNodes
  - clients.*.notBefore
  - notBefore
